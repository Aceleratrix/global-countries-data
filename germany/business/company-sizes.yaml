description: "Company sizes, types, and business structures for German AI First businesses"

# Company Types (Business Entities)
company_types:
  - type: "GmbH (Gesellschaft mit beschränkter Haftung)"
    german_name: "GmbH (Gesellschaft mit beschränkter Haftung)"
    description: "Limited liability company (like US LLC, Japan KK)"
    formation: "Notary deed + Commercial Register (Handelsregister)"
    min_capital_eur: 25000  # €25K minimum!
    paid_up_eur: 12500  # €12.5K must be paid up front
    pros: ["Limited liability (up to capital)", "Most popular form (1M+ companies!)", "Easy to scale"]
    cons: ["Higher setup cost (€1.5K-3K notary + registration)", "More formalities"]
    tax_form: "Corporate tax return (Körperschaftsteuererklärung)"
    tax_rate_percent: 29.9  # Effective (federal 15% + solidarity 0.825% + trade tax ~14%)
    best_for: "Most tech startups, SMEs, foreign companies entering Germany"
    berlin_usage: "90% of Berlin startups (GmbH is standard!)"
    note: "German equivalent of US LLC, Japan KK"
    
  - type: "AG (Aktiengesellschaft)"
    german_name: "AG (Aktiengesellschaft)"
    description: "Stock corporation (like US C-Corp, Japan KK)"
    formation: "Notary deed + Commercial Register + Supervisory Board"
    min_capital_eur: 50000  # €50K minimum!
    pros: ["Can raise capital via shares", "Publicly tradeable (IPO)", "Prestige"]
    cons: ["More complex (3 boards!)", "Higher setup cost (€5K+)", "Strict regulations"]
    tax_form: "Corporate tax return"
    tax_rate_percent: 29.9
    best_for: "Large companies, IPO-bound startups, corps (SAP, Siemens, BMW!)"
    berlin_usage: "10% of startups (usually post-Series B)"
    note: "German equivalent of US C-Corp, Japan KK"
    
  - type: "UG (Unternehmergesellschaft - 'Mini-GmbH')"
    german_name: "UG (Unternehmergesellschaft)"
    description: "Entrepreneurial company (mini-GmbH with €1 minimum!)"
    formation: "Notary deed + Commercial Register"
    min_capital_eur: 1  # €1 minimum (AMAZING!) - but must retain 25% of profits!
    pros: ["€1 minimum capital!", "Limited liability", "Can convert to GmbH later"]
    cons: ["Must retain 25% of profits until €25K (then convert to GmbH)", "Less prestigous"]
    tax_form: "Corporate tax (same as GmbH)"
    tax_rate_percent: 29.9
    best_for: "Bootstrapped startups, entrepreneurs with €1!"
    berlin_usage: "15% of early-stage startups (€1 minimum is attractive!)"
    note: "UNIQUE TO GERMANY! €1 to start a company (cannot do in USA/Japan!)"
    
  - type: "Einzelunternehmen (Sole Proprietorship)"
    german_name: "Einzelunternehmen"
    description: "Sole proprietorship (no legal entity)"
    formation: "Gewerbeanmeldung (business registration) - €20-50!"
    min_capital_eur: 0  # €0 (just register!)
    pros: ["No minimum capital", "Simplest form (€20 registration!)", "Full control"]
    cons: ["Unlimited personal liability!", "Hard to raise capital", "Less crediblity"]
    tax_form: "Personal income tax (Einkommensteuer)"
    tax_rate_percent: [14.0, 45.0]  # Progressive (14-45%)
    best_for: "Freelancers, solo AI consultants, side hustles"
    berlin_usage: "Very common for freelance AI engineers"
    note: "Like US sole proprietorship, but VERY COMMON in Germany (40% of businesses!)"
    
  - type: "GbR (Gesellschaft bürgerlichen Rechts)"
    german_name: "GbR (Gesellschaft bürgerlichen Rechts)"
    description: "General partnership (no minimum capital)"
    formation: "Partnership agreement (no notary needed!)"
    min_capital_eur: 0
    pros: ["No minimum capital", "Simple setup", "Pass-through taxation"]
    cons: ["Unlimited liability for ALL partners!", "Hard to scale"]
    tax_form: "Pass-through to partners (Partnerschaftssteuer)"
    tax_rate_percent: [14.0, 45.0]  # On partners' personal returns
    best_for: "Small partnerships, 2-3 person AI consultancies"
    berlin_usage: "Common for small AI consultancies"
    
  - type: "GmbH & Co. KG"
    german_name: "GmbH & Co. KG"
    description: "Limited partnership with GmbH as general partner (popular in Germany!)"
    formation: "Notary deed + Commercial Register"
    pros: ["Limited liability (via GmbH)", "Tax advantages (pass-through for limited partners)"]
    cons: ["Complex structure", "Requires notary"]
    tax_form: "Mixed (GmbH pays corporate, partners pay personal)"
    best_for: "Family businesses, medium-sized companies (Mittelstand!)"
    note: "UNIQUE TO GERMANY! Popular in manufacturing/Mittelstand!"

