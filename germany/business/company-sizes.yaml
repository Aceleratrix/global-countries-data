# Startup Growth Stages (Germany)
startup_stages_germany:
  - stage: "Pre-Seed / Idea Stage"
    capital_eur: [0, 500000]  # €0-500K
    employees: [1, 3]
    entity_type: "UG (€1 minimum!) or GmbH"
    burn_rate_eur_month: [5000, 20000]  # €5K-20K
    focus: "MVP, product-market fit"
    note: "UG (€1 minimum) is PERFECT for pre-seed!"
    
  - stage: "Seed"
    capital_eur: [500000, 3000000]  # €500K-3M
    employees: [3, 15]
    entity_type: "GmbH (standard)"
    burn_rate_eur_month: [20000, 100000]  # €20K-100K
    focus: "Product development, early traction"
    
  - stage: "Series A"
    capital_eur: [3000000, 15000000]  # €3M-15M
    employees: [15, 100]
    entity_type: "GmbH or AG (if preparing IPO)"
    burn_rate_eur_month: [100000, 500000]  # €100K-500K
    focus: "Scaling, go-to-market"
    
  - stage: "Series B, C, D..."
    capital_eur: [15000000, 50000000]  # €15M-50M
    employees: [100, 2000]
    entity_type: "GmbH or AG (IPO-bound)"
    burn_rate_eur_month: [500000, 2000000]  # €500K-2M
    focus: "Growth, profitability, IPO prep"
    
  - stage: "IPO / Public"
    capital_eur: "Public markets (€100M+ raises)"
    employees: [2000, 100000+]
    entity_type: "AG (public)"
    focus: "Quarterly earnings, public shareholders"

