# Co-determination (Mitbestimmung) - UNIQUE TO GERMANY!
co_determination_mitbestimmung:
  description: "Workers have right to participate in corporate governance!"
  law: "Works Constitution Act (Betriebsverfassungsgesetz) + Mitbestimmungsgesetz"
  
  supervisory_board_paricipation:
    - "Companies with 500-2000 employees: 1/3 worker representatives on Supervisory Board"
    - "Companies with 2000+ employees: 50% worker representatives on Supervisory Board!"
    - "Chairperson: Usually shareholder representative (tie-breaker)"
    
  works_council_betriebsrat:
    threshold: "5+ employees (can form works council!)"
    rights: ["Participate in hiring/firing", "Consulted on working conditions", "Co-determine work hours"]
    ai_implication: "AI agents must account for worker representatives in corporate decisions!"
    
  unique_global: "NO OTHER COUNTRY has 50% worker board seats (except maybe Sweden!)"
  note: "UNIQUE TO GERMANY (not in Brazil/USA/Japan!) - workers have REAL POWER!"

# Business Hours (Standard Germany)
business_hours:
  weekdays:
    start: "08:00"
    end: "17:00"
    lunch_break: "12:00-13:00 (optional, 30-60 mins)"
  saturday:
    start: "08:00"
    end: "13:00"
    optional: true
  sunday:
    closed: true
    exceptions: ["Bakeries (until 12:00)", "Gas stations", "Restaurants", "Emergency services"]
    note: "Sunday shopping is RESTRICTED (unlike USA/Brazil!)"
    
