## Customs & Tariffs (EU Framework)
customs_union: "European Union Customs Union"
common_external_tariff: true
average_tariff_percent: 1.8

tariff_structure:
  industrial_goods: 0-4
  agricultural_products: 0-25
  textiles: 0-12
  steel: 0-25

## Customs Authorities
authorities:
  - name: "Zoll (German Customs)"
    website: "https://www.zoll.de"
    role: "Border control, customs clearance, VAT collection"
  - name: "European Commission - Taxation and Customs Union"
    website: "https://ec.europa.eu/taxation_customs"
    role: "EU-wide customs policy"

## Import Requirements
import_licensing:
  general_rule: "No license required for most goods from EU/EU-FTA countries"
  restricted_goods:
    - "Firearms and ammunition (Waffenrecht)"
    - "Medicinal products (AMG)"
    - "Narcotics (BtMG)"
    - "Dual-use items (EU Dual-Use Regulation)"
    - "Cultural goods (Kulturgutschutzgesetz)"

## Documentation
required_documents:
  - "Commercial Invoice (Handelsrechnung)"
  - "Packing List (Packliste)"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (Ursprungszeugnis)"
  - "EUR.1 certificate (for preferential treatment)"
  - "ATA Carnet (temporary imports)"

## VAT on Imports
import_vat:
  standard_rate: 19
  reduced_rate: 7
  vat_payment: "Payable at customs clearance"
  deferment: "VAT deferment possible with customs authorization"

## Export Controls
export_controls:
  authority: "BAFA (Bundesamt für Wirtschaft und Ausfuhrkontrolle)"
  website: "https://www.bafa.de"
  controlled_items:
    - "Dual-use goods"
    - "Military equipment"
    - "Cultural goods"
    - "Strategic goods to embargoed countries"

## EORI Number
eori:
  required: true
  description: "Economic Operators Registration and Identification number"
  format: "DE + 12 digits"
  authority: "Zoll (Customs)"
  application: "Via Zoll portal"

