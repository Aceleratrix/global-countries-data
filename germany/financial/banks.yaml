# Cryptocurrency Regulation (Germany)
crypto_regulation_germany:
  status: "Legal property (not currency)"
  authority: "Federal Financial Supervisory Authority (BaFin - Bundesanstalt für Finanzdienstleistungsaufsicht)"
  website: "https://www.bafin.de/"
  
  crypto_custody_license:
    requirement: "MANDATORY since 2020 (§64y KWG)!"
    capital_required_eur: 1250000  # €1.25M minimum capital!
    notable: "Stricter than most countries (wants to be 'crypto heaven' with rules!)"
    
  taxation_crypto:
    private_investors: "Tax-free if held >1 year (private sale exemption!)"
    corporate: "29.9% (corporate tax + trade tax)"
    mining: "Not taxable (no VAT, treated as private activity)"
    staking: "Taxable as income (if regular/ professional!)"
    
  major_exchanges_germany:
    - "BSDEX (Börse Stuttgart - German stock exchange's crypto platform!)"
    - "Trade Republic (offers crypto alongside stocks)"
    - "Bitvavo (Dutch but strong in Germany)"
    
  stablecoins:
    classification: "E-money or securities (depending on design)"
    issuer_requirement: "BaFin authorization required"
    
