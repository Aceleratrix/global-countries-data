# SEPA (Single Euro Payments Area) - EU Standard!
sepa:
  description: "Single Euro Payments Area (covers 36 countries!)"
  countries_covered: 36  # EU + EEA + UK (post-Brexit) + Switzerland + Monaco + San Marino
  launched: 2008 (SEPA Credit Transfer), 2009 (SEPA Direct Debit)
  
  sepa_credit_transfer_sct:
    cost_merchant_percent: 0.5  # Same as local transfer (EU-wide!)
    settlement_time_hours: [0, 24]  # Same day (TARGET2 system!)
    max_amount_eur: 999999999.99  # No practical limit
    api: "https://www.europeanpaymentscouncil.eu/"
    note: "FREE or very cheap for consumers (EU regulation!)"
    
  sepa_direct_debit_sdd:
    cost_merchant_percent: 0.5
    settlement_days: [2, 4]
    mandate_required: true  # Consumer must sign mandate (paper or digital!)
    types: ["Core (all consumers)", "B2B (business only)"]
    note: "40% of German e-commerce uses SDD (Lastschrift!)"
    
  instant_sepa_sct_inst:
    description: "Instant SEPA Credit Transfer (10 seconds!)"
    settlement_time_seconds: 10
    availability_percent: 85.0  # Of German banks (2026)
    cost_merchant_percent: 0.8  # Slightly higher than SCT
    note: "Like PIX in Brazil (instant!) but 10 seconds (not instant-instant!)"
    
  ai_implications: "AI agents can initiate SEPA payments via bank APIs (Open Banking!)"
  
# Open Banking (Germany/EU) - PSD2 Directive
open_banking_germany:
  law: "PSD2 (Payment Services Directive 2) - EU law"
  effective: 2018-09-14 (EU) / 2019-12-14 (Germany implementation)
  website: "https://www.eba.europa.eu/regulation-and-policy/payment-services-psd-2"
  
  key_provisions:
    - "Open Banking: Banks MUST provide APIs for third-party providers (TPPs)!"
    - "Strong Customer Authentication (SCA): 2-factor for online payments!"
    - "Payment Initiation Services (PIS): TPPS can initiate payments!"
    - "Account Information Services (AIS): TPPS can aggregate accounts!"
    
  open_banking_providers_germany:
    - name: "Tink (Visa company)"
      website: "https://tink.com/"
      services: ["Account aggregation", "Payment initiation", "KYC"]
      api: "https://docs.tink.com/"
      coverage: "All major German banks (Sparkassen, Deutsche Bank, etc.)"
      
    - name: "Salt Edge"
      website: "https://saltedge.com/"
      services: ["Account aggregation", "Payment initiation"]
      api: "https://docs.saltedge.com/"
      
    - name: "FintechOS"
      website: "https://www.fintechos.com/"
      services: ["Open banking platform", "API gateway"]
      
  german_banks_with_apis:
    - "Deutsche Bank (https://developer.db.com/)"
    - "Commerzbank (https://apibank.commerzbank.de/)"
    - "Sparkassen (https://www.sparkassen-api.de/)"
    - "ING DiBa (https://developer.ing.com/)"
    
  ai_implications: "AI agents can USE BANK APIS to check balances, initiate SEPA payments!"
  note: "PSD2 is MANDATORY across EU (unlike Brazil's PIX which is also mandatory, but PIX is instant!)"
  
