# Bonuses
bonuses:
  description: "Not common in Germany (unlike Japan 4-6 months!)"
  prevalence_percent: 25.0  # Much lower than Japan (85%)!
  typical_amount: "1-2 months salary (annual)"
  tech_companies: ["SAP (2 months)", "BMW (1 month)", "Siemens (1 month)"]
  note: "Germany is LOW on bonuses (unlike Japan!) - base salary is KING!"
  
# Stock Options & Equity
equity_compensation:
  - type: "Stock Options (Aktienoptionen)"
    description: "Options to purchase company stock"
    tax: "Taxed as income at exercise (difference: FMV - strike price)"
    prevalence_tech_percent: 45.0  # Growing (like USA, unlike Japan!)"
    berlin_startups: "Standard for VC-backed startups (like US)"
    
  - type: "Restricted Stock Units (RSUs)"
    description: "Actual shares granted after vesting"
    tax: "Taxed as income when they vest"
    prevalence_germany_percent: 20.0  # Mostly US companies (Google, Meta, Apple)"
    
  - type: "VSOPs (Virtual Stock Options)"
    description: "Cash bonus based on stock price (not actual shares)"
    tax: "Taxed as income"
    note: "Popular in German startups (no actual shares issued!)"
    
  standard_vesting_schedule: "4 years, 1-year cliff, monthly thereafter (like US)"
  note: "Germany follows US model (unlike Japan which prefers cash bonuses!)"
  
# Payroll Taxes (Employer Costs)
payroll_taxes_percent:
  health_insurance_percent: 7.3  # Employer pays 7.3% (total 14.6%, employee pays 7.3%)
  nursing_care_insurance_percent: 1.2  # Employer pays 1.2% (total 3.05%, employee pays 1.7%)
  pension_insurance_percent: 9.3  # Employer pays 9.3% (total 18.6%, employee pays 9.3%)
  unemployment_insurance_percent: 1.3  # Employer pays 1.3% (total 2.6%, employee pays 1.3%)
  accident_insurance_percent: [1.0, 3.0]  # Employer ONLY (varies by industry)
  
  total_employer_cost_percent: 19.1  # Beyond salary (health 7.3 + nursing 1.2 + pension 9.3 + unemployment 1.3 + accident 1.0-3.0)
  total_employee_cost_percent: 18.5  # Health 7.3 + nursing 1.7 + pension 9.3 + unemployment 1.3
  
  note: "Germany: 19.1% employer + 18.5% employee = 37.6% total (HIGHER than USA 15.3%!)"
  
# Working Hours & Vacation
working_hours_germany:
  standard_per_day: 8
  standard_per_week: 40
  max_per_day: 10  # Unless collective agreement (Tarifvertrag)
  overtime_pay_percent: 125.0  # 125% (time-and-a-half) - OR time off in lieu!
  
  rest_periods:
    break_minimum_minutes: 30  # For 6+ hours work (45 min for 9+ hours)
    weekly_rest: "24 consecutive hours (usually Sat + Sun)"
    
  paid_leave:
    annual_leave_days: [20, 30]  # Minimum 20 days (24 days typical, 30 days common!)
    max_leave_days: 30
    usage_percent: 85.0  # HIGH! Germans TAKE their leave (unlike Japan 52%!)
    carry_forward: "Into Q1 of next year (then forfeited)"
    
  sick_leave:
    paid_by: "Employer (100% salary for 6 weeks!)"
    beyond_6_weeks: "Health insurance pays (Krankengeld - 70-90% of salary)"
    proof_required: "Doctor's note (after 3 days!)"
    
# Maternity & Paternity Leave
maternity_leave:
  duration_weeks: 14  # 6 weeks BEFORE + 8 weeks AFTER childbirth (18 weeks for premature/multiple!)
  pay_percent: 100.0  # Maternity pay (Mutterschaftsgeld) - 100% of salary!
  proof_required: "Doctor's certificate"
  
paternity_leave:
  duration_weeks: 2  # Parental leave (Elternzeit) - 2 weeks PAID!
  pay_percent: 100.0  # 100% of salary (capped at €1,800/month!)
  uptake_percent: 45.0  # Growing (cultural shift!)
  
parental_leave_elternzeit:
  duration_months: [12, 36]  # 12-36 months (parents SPLIT between them!)
  pay_percent: 65.0  # Elterngeld (65% of net income, capped at €1,800/month!)
  note: "Germany has one of the MOST GENEROUS parental leaves in world!"
  
# Industrial Relations (Tarifverhandlungen)
collective_bargaining:
  description: "Industry-wide wage negotiations (Tarifverhandlungen)"
  participants: ["Trade Unions (e.g., IG Metall)", "Employer Associations"]
  coverage_percent: 55.0  # Of workforce (industry agreements apply!)
  
  major_unions:
    - name: "IG Metall (Industrial Union of Metalworkers)"
      members: 2200000  # 2.2M members!
      sectors: ["Automotive (BMW, Mercedes, VW)", "Electrical (Siemens, Bosch)", "Steel"]
      recent_deal_2025: "€200-300/month raise + 4-day work week trials!"
      note: "MOST POWERFUL union in Germany (2.2M members!)"
      
    - name: "ver.di (United Services Union)"
      members: 1800000  # 1.8M members!
      sectors: ["Services", "Tech", "Healthcare", "Transport"]
      note: "Second-largest union (includes tech workers!)"
      
    - name: "GEW (Union for Education and Science)"
      members: 320000
      sectors: ["Universities", "Research institutes (Max Planck, Fraunhofer)"]
      
  tech_unionization_percent: 15.0  # Lower than manufacturing (22%)!
  
# 4-Day Work Week Trials (UNIQUE!)
four_day_work_week:
  description: "Growing movement (led by IG Metall!)"
  status: "Trials ongoing (2024-2026)"
  participants: ["BMW", "Siemens", "VW", "Mercedes", "Bosch"]
  model: "32 hours (Mon-Thu) = SAME PAY as 40 hours!"
  
  early_results_2026:
    productivity_change_percent: [2.0, 8.0]  # 2-8% INCREASE!
    employee_satisfaction_percent: 92.0
    adoption_by_tech_startups: 5.0  # Early stage (mostly startups!)
    
  ai_implications: "AI tools helping maintain productivity with fewer hours!"
  note: "UNIQUE! Germany leading Europe in 4-day week trials (unlike USA/Japan!)"
  
# Non-Compete Clauses
non_compete:
  enforceability: "Enforceable (if reasonable!)"
  requirements:
    - "Post-employment only (during employment = always enforceable!)"
    - "Covenant not to compete for 6-24 months (reasonable!)"
    - "Employer MUST pay 50% of salary during non-compete period!"
    - "Geographic scope: Germany or specific regions (reasonable!)"
    
  penalty_for_breach: "Injunction + damages (employer can sue!)"
  
  ai_implication: "AI engineers CANNOT join competitors for 6-24 months (unless employer waives!)"
  note: "Germany: enforceable WITH pay (unlike USA California VOID, Japan NOT enforceable!)"
  
