description: "German employment law, co-determination (Mitbestimmung), and tech salaries"

# Employment System (Strong Worker Protections!)
employment_system:
  traditional_model: "Social Market Economy (Soziale Marktwirtschaft)"
  description: "Capitalism with STRONG worker protections + social safety net!"
  prevalence_percent: 100  # Applies to ALL companies!
  
  employment_types:
    - type: "Arbeitnehmer (Regular Employee)"
      description: "Permanent, full-time employee with FULL benefits"
      job_security: "VERY HIGH (strong dismissal protections!)"
      severance: "Typically 0.5-1 month per year of service (voluntary)"
      notice_period_months: [4, 7]  # 4-7 months (STRICT!) based on tenure
      unique: "UNIQUE TO GERMANY (and few others!)"
      
    - type: "Befristeter Arbeitsvertrag (Fixed-Term Contract)"
      description: "Fixed-term contract (max 2 years, 3 extensions!)"
      job_security: "Low (contract ends)"
      severance: "None (unless discriminatory)"
      notice_period_months: [4, 7]  # Same as permanent!
      requirement: "Objective reason required (since 2023 reform!)"
      note: "Used to be easier (no reason needed) - now STRICTER!"
      
    - type: "Zeitarbeit (Temporary Agency Work)"
      description: "Employee of temp agency, dispatched to client"
      job_security: "LOW (assignment ends)"
      prevalence_percent: 3.2  # Of workforce (lower than Japan 12%!)
      regulation: "Strictly regulated (equal pay after 9 months!)"
      
    - type: "Freelancer (Freiberufler / Selbstständiger)"
      description: "Self-employed, no benefits"
      job_security: "None"
      benefits: "None (responsible for own taxes + social insurance)"
      prevalence_tech_percent: 18.0  # Higher in tech (AI freelancers!)
      note: "Must register with Finanzamt (tax office) - €20-50!"
      
    - type: "Intern (Praktikant)"
      description: "Temporary worker (students or recent grads)"
      age_min: 16
      duration_months: [3, 6]  # Typically 3-6 months
      pay_eur_month: [500, 1500]  # €500-1500 ($540-$1620) - often unpaid!
      note: "Many tech internships are UNPAID in Germany (legal if <3 months!)"
      
    - type: "Remote Work (Homeoffice - Homeoffice)"
      description: "Employee works from home (anywhere in Germany)"
      legal_framework: "Works Constitution Act (BetrVG §129a) - 2021 reform!"
      employer_obligation: "MUST consider remote work requests (unless operational reasons!)"
      tax_implications: "Employee works from home = no tax nexus issues"
      berlin_usage_percent: 55.0  # Post-COVID increase
      note: "Germany has MANDATORY remote work consideration (unlike USA!)"
      
# Co-determination (Mitbestimmung) - UNIQUE TO GERMANY!
co_determination_mitbestimmung:
  description: "Workers have RIGHT to participate in corporate governance!"
  legal_basis: "Works Constitution Act (BetrVG) + Co-determination Acts (MitbestG)"
  
  - level: "Works Council (Betriebsrat)"
    threshold: "5+ employees (CAN form one!)"
    workers_representatives: "50% of Works Council (elected by employees!)"
    rights: ["Hire/fire consultation", "Working hours", "Health/safety", "Training"]
    applicability: "ALL companies (GmbH, AG, UG) with 5+ employees!"
    note: "UNIQUE! Even small companies (5+) MUST have works council if demanded!"
    
  - level: "Supervisory Board (Aufsichtsrat) - 500+ employees"
    workers_representatives: "50% of Supervisory Board seats!"
    threshold: "2000+ employees (since 2024 reform!)"
    voting: "One person, one vote (for worker representatives!)"
    chairperson: "Shareholder representative (tie-breaker)"
    applicability: "ALL large corps (SAP, Siemens, BMW, etc.)!"
    note: "WORLD'S STRONGEST worker board representation (50%!)"
    
  - level: "Supervisory Board - 500-1999 employees"
    workers_representatives: "33% of Supervisory Board seats (1/3)"
    applicability: "Medium-large companies"
    
  impact_on_ai_companies:
    - "AI companies with 500+ employees MUST give workers 50% board seats!"
    - "AI startups with 5+ employees CAN have works council (if demanded!)"
    - "Decisions on AI implementation must be CONSULTED with workers!"
    - "Example: Siemens AI rollout required worker consultation!"
    
  global_uniqueness: "NO OTHER COUNTRY has 50% worker board seats (except maybe Sweden!)"
  note: "UNIQUE TO GERMANY - workers have REAL POWER in corporate decisions!"
  
# Dismissal & Severance
dismissal_laws:
  doctrine: "Social Justification (Soziale Rechtfertigung)"
  description: "Dismissal INVALID unless socially justified!"
  
  valid_reasons:
    - "Personal (inability to perform work)"
    - "Conduct (breach of contract, theft, etc.)"
    - "Operational (redundancy, restructuring)"
    
  notice_period_months:
    - "Up to 2 years tenure: 4 weeks (END of month)"
    - "2-5 years tenure: 1 month (END of month)"
    - "5-8 years tenure: 2 months (END of month)"
    - "8-10 years tenure: 3 months (END of month)"
    - "10+ years tenure: 4-7 months (END of month!)"
    note: "MUCH LONGER than USA (at-will = 0 notice!) and Japan (30 days)!"
    
  severance_pay:
    mandatory: false  # NOT mandatory by law!
    voluntary_prevalence_percent: 65.0  # Most companies offer voluntarily
    typical_amount: "0.5-1 month per year of service"
    calculation: "Based on tenure and age (older = more!)"
    
  layoff_restrictions:
    - "Works Council (Betriebsrat) MUST be consulted (5+ employees!)"
    - "Social selection (Sozialauswahl): Protect older, disabled, with children!"
    - "Dispute resolution through Labor Courts (Arbeitsgerichte)"
    
  berlin_tech_note: "Strong worker protections = RARELY fire (except for cause!)"
  
# Labor Courts (Arbeitsgerichte)
labor_courts:
  system: "3-tier specialized labor courts (NO jury!)"
  - "Arbeitsgericht (Labor Court) - 1st instance"
  - "Landesarbeitsgericht (Regional Labor Court) - 2nd instance"
  - "Bundesarbeitsgericht (Federal Labor Court) - 3rd instance"
  note: "Specialized courts (unlike USA's general courts!)"
  
