## Compliance & Privacy
gdpr_applicable: true
gdpr_requirements:
  - "Explicit consent for cookies (requires Cookie Banner)"
  - "Data processing agreements with service providers"
  - "Right to erasure (Article 17)"
  - "Data portability (Article 20)"
  - "Privacy Policy (Datenschutzerklärung) mandatory"
  - "Appointment of Data Protection Officer (Datenschutzbeauftragter) if >20 employees"

ttdsg_applicable: true  # Telekommunikation-Telemedien-Datenschutz-Gesetz
ttdsg_requirements:
  - "Cookie consent must be obtained BEFORE setting non-essential cookies"
  - "Consent must be freely given, specific, informed, and unambiguous"
  - "Option to reject cookies must be equally accessible"

