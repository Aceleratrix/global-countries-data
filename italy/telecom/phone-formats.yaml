# Phone & Telecom Formats - Italy#

## Country Code#
country_calling_code: "+39"
international_prefix: "00"
trunk_prefix: "None (no leading 0)"
e164_format: true

## Mobile Phone Format#
mobile_format:
  pattern: "+39 3XX XXX XXXX"
  length: 9-10  # digits (after +39)
  example: "+39 312 345 6789"
  regex: "^(\\+39)?3\\d{8,9}$"
  
mobile_prefixes:
  - prefix: "3XX"
    operators: ["TIM", "Vodafone", "WindTre", "Iliad", "PosteMobile"]
    note: "All Italian mobile numbers start with 3"

## Landline Format#
landline_format:
  pattern: "+39 0X XXXX XXXX (area code 2-4 digits)"
  area_code_length: 2-4  # varies by city
  local_number_length: 7-8
  example: "+39 02 1234 5678"  # Milan
  regex: "^(\\+39)?0\\d{8,11}$"
  
major_city_codes:
  rome: "06"
  milan: "02"
  naples: "081"
  turin: "011"
  palermo: "091"
  genoa: "010"
  bologna: "051"
  florence: "055"
  venice: "041"
  catania: "095"

## Toll-Free Numbers#
toll_free:
  prefixes: ["800", "803"]
  format: "+39 800 XXX XXX"
  note: "Free to caller from landlines and mobiles"
  availability: "Available to businesses via telecom operators"

## Special Service Numbers#
emergency:
  police: "112"  # EU emergency (unified)
  carabinieri: "112"  # military police
  ambulance: "118"
  fire: "115"
  non_emergency_police: "113"  # police (non-urgent)

