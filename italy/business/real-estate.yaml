## Legal Framework#
legal:
  property_ownership:
    - "Freehold (Piena Proprietà - 完全产权) - absolute ownership"
    - "Leasehold (Locazione Commerciale - 商业租赁) - 3-6 years (renewable)"
    
  foreign_ownership:
    - "No restrictions (anyone can buy, EU citizens)"
    - "Non-EU: same rights (no discrimination, reciprocity required)"
    
  transaction_costs_percent: 7-10
  breakdown:
