## Government Schemes (First-Time Buyers)#
government_schemes:
  - name: "Bonus Prima Casa (First Home Bonus)"
    benefit: "Tax exemptions (registration tax 2% vs 9%)"
    use: "First-time buyers (income <€40K, house <€250K)"
    
  - name: "Mutuo Prima Casa (First Home Mortgage)"
    benefit: "State guarantee (50-80% of mortgage)"
    use: "Young couples, first-time buyers"
    
  - name: "Superbonus 110% (Construction Bonus)"
    status: "Phasing out 2024-2026 (was 110%, now 90-50%)"
    use: "Energy efficiency, earthquake safety (very popular, €58B cost)"
    
  - name: "Bonus Facciate (Facade Bonus)"
    benefit: "90% tax deduction (exterior renovation)"
    use: "Building exterior renovation (popular in cities)"

