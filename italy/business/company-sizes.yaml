# Company Sizes & Types - Italy#

## Company Size Classifications#
classification_standard: "ISTAT (National Institute of Statistics) + EU definition"

### Micro Enterprises (Micro Imprese)#
micro_enterprises:
  - category: "Ditte Individuali (个体户)"
    employees: "0-9 (usually 1)"
    turnover_eur: "< €2M"
    count: 3_200_000
    share_percent: 72.7
    note: "Sole proprietors, family businesses"
    
  - category: "Micro-enterprise (non-individual)"
    employees: "1-9"
    turnover_eur: "< €2M"
    balance_sheet_eur: "< €2M"
    count: 600_000
    share_percent: 13.6

### Small & Medium Enterprises (PMI - Piccole e Medie Imprese)#
pmi:
  - category: "Small Enterprise (Piccola Impresa)"
    employees: "10-49"
    turnover_eur: "€2M - €10M"
    balance_sheet_eur: "€2M - €10M"
    count: 350_000
    share_percent: 8.0
    
  - category: "Medium Enterprise (Media Impresa)"
    employees: "50-249"
    turnover_eur: "€10M - €50M"
    balance_sheet_eur: "€10M - €43M"
    count: 45_000
    share_percent: 1.0

### Large Enterprises (Grandi Imprese)#
large_enterprises:
  employees: "250+"
  turnover_eur: "> €50M"
  balance_sheet_eur: "> €43M"
  count: 12_000
  share_percent: 0.3

total_smes: 4_400_000
employment_sme: 15_800_000  # 78% of total private sector employment

## Company Types (Legal Forms)#
company_types:
  - name: "S.r.l. (Società a Responsabilità Limitata - 有限责任公司)"
    min_directors: 1
    max_shareholders: "Unlimited"
    min_capital: "€1 (recommended €10,000+)"
    use_case: "SMEs, family businesses, startups"
    count: 1_200_000
    note: "Most common form for SMEs, simplified"
    
  - name: "S.p.A. (Società per Azioni - 股份有限公司)"
    min_directors: 1 (board of directors)
    min_shareholders: 2 (or 1 for S.p.A. unipersonale)
    min_capital: "€50,000 (at least 25% paid up)"
    use_case: "Large companies, IPO-ready"
    count: 25_000
    note: "Listed companies, corporate governance strict"
    
  - name: "S.n.c. (Società in Nome Collettivo - 普通合伙)"
    min_partners: 2
    features: "Joint unlimited liability"
    use_case: "Family businesses, small partnerships"
    count: 180_000
    note: "Partners have unlimited liability"
    
  - name: "S.a.s. (Società in Accomandita Semplice - 有限合伙)"
    min_partners: 2 (general + limited partners)
    features: "Mixed liability (general unlimited, limited protected)"
    use_case: "Family firms, some partners passive"
    count: 25_000
    
  - name: "Ditta Individuale (个体经营者)"
    features: "Single owner, unlimited liability"
    registration: "With Chamber of Commerce (Registro Imprese)"
    use_case: "Freelancers, small shops, consultants"
    count: 3_200_000
    
  - name: "Cooperative (Cooperativa)"
    min_members: 3
    features: "Democratic governance (1 member = 1 vote)"
    use_case: "Worker coops, consumer coops, social enterprises"
    count: 80_000
    note: "Strong cooperative tradition in Italy"

## Foreign Investment Vehicles#
foreign_investment:
  - type: "Italian Subsidiary (S.r.l./S.p.A.)"
    description: "Italian-registered company, owned by foreign parent"
    fdi_route: "Automatic (no restrictions in most sectors)"
    timeline: "2-3 weeks (S.r.l. most popular for foreigners)"
    
  - type: "Branch Office (Succursale)"
    description: "Italian branch of foreign company"
    registration: "With Registro Imprese (Chamber of Commerce)"
    use_case: "Banks, insurance (regulated sectors)"
    
  - type: "Representative Office"
    description: "Liaison office (no trading allowed)"
    use_case: "Market research, pre-entry"

