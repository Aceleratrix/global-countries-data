## Special Economic Areas#
special_areas:
  - name: "ZES (Zone Economiche Speciali - Special Economic Zones)"
    count: 5
    locations: "Campania, Puglia, Calabria, Sicily, Sardinia (Southern Italy)"
    benefits: "10% tax credit, simplified procedures, infrastructure"
    use: "Investment in Southern Italy (Mezzogiorno)"
    
  - name: "Distretti Tecnologici (Technology Districts)"
    count: 45+
    benefits: "Tax credits, R&D incentives, networking"
    examples: "Milan (fintech), Turin (automotive), Bologna (food)"
    
  - name: "Incubatori Certificati (Certified Incubators)"
    count: 80+
    benefits: "Tax breaks, mentorship, EU funding access"

## Registration Process#
business_registration:
  authority: "Registro Imprese (Chamber of Commerce - Camera di Commercio)"
  online_platform: "ComUnica (single notification)"
  timeline: "5-10 days (online), 2-4 weeks (post)"
  
steps:
  - "Company name check (Registro Imprese)"
  - "Register directors, shareholders, registered office"
  - "Notarized deed (for S.p.A.) or simple deed (S.r.l.)"
  - "Deposit capital in blocked account (if required)"
  - "File with Registro Imprese (Chamber of Commerce)"
  - "VAT registration (if >€85K turnover)"
  - "INPS registration (social security)"
  - "INAIL registration (worker's compensation)"

costs:
  registration_fee: "€200-800 (by company type)"
  notary_fees: "€500-2,500 (for S.p.A., not needed for S.r.l.)"
  capital_deposit: "€0-50,000 (by company type)"

## Tax & Compliance#
tax_filing:
  corporate_tax: "Online via Entratel (9 months after year-end)"
  vat: "Monthly or quarterly (F24 form)"
  social_charges: "Monthly (INPS/INAIL)"
  
required_filings:
  annual_accounts: "Must file with Registro Imprese (30 days after approval)"
  tax_return: "IRES + IRAP (by 30/11 following year)"
  consolidated_accounts: "For groups (EUR 750M+)"

## Codice Fiscale & Partita IVA#
codice_fiscale_partita_iva:
  codice_fiscale:
    description: "16-character identifier (individuals + companies)"
    format: "16 alphanumeric (e.g., RSSMRA80A01H501X)"
    use: "All official documents, tax filings, healthcare"
    issuance: "Automatic at registration (Agenzia Entrate)"
    
  partita_iva:
    description: "11-digit VAT number"
    format: "12345678901"
    use: "Business registration, VAT filings"
    issuance: "Automatic with VAT registration"

