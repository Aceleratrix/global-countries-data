## Compliance & Regulations#
content_regulation:
  authority: "IAP (Istituto dell'Autodisciplina Pubblicitaria)"
  rules:
    - "Codice del Consumo (consumer protection)"
    - "No misleading claims, social responsibility"
    - "Alcohol/tobacco ads restricted"
    - "Influencer transparency: #pubblicità #sponsored MANDATORY"
    
  digital_services_act:
    - "DSA applies (Feb 2024, EU regulation)"
    - "VLOPs (Very Large Online Platforms) need audits"
    
  penalties:
    - "IAP: ad withdrawal, compliance"
    - "AGCM (Antitrust): up to €10M fines (consumer fraud)"
    - "GPDP: up to €20M or 4% revenue (GDPR violation)"

