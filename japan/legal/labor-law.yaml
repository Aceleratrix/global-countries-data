    ai_implication: "AI agents can be deployed long-term (low turnover)"
    
  - feature: "Bonuses (4-6 months salary)"
    ai_implication: "AI companies budget 12-18 months salary per employee (not 12!)"
    
  - feature: "Paid Leave Usage 52% (don't take all)"
    ai_implication: "AI support systems must handle LESS employee absence"
    
  - feature: "Non-competes NOT enforceable"
    ai_implication: "AI engineers CAN join competitors (get insights!)"
    
