description: "Major Japanese banks, payment methods, and fintech ecosystem"

# Currency
currency:
  code: "JPY"
  name: "Japanese Yen"
  symbol: "¥"
  subunit: "Sen (1/100, obsolete), Rin (1/1000, obsolete)"
  decimals: 0  # Modern usage: whole yen only
  symbol_position: "before"  # ¥100
  central_bank: "Bank of Japan (日本銀行, BOJ)"
  central_bank_url: "https://www.boj.or.jp/en/"
  exchange_rate_source: "BOJ + market"

