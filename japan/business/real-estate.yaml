# Zoning (Commercial - Japan)
zoning_japan:
  zones:
    - "Commercial Zone 1 (Chika Shogyo - 近隣商業)"
      description: "Neighborhood shops, small offices"
      
    - "Commercial Zone 2 (Chusho Shogyo - 中層商業)"
      description: "Larger offices, retail, restaurants"
      
    - "Commercial Zone 3 (Koiki Shogyo - 広域商業)"
      description: "High-rise offices, downtown cores"
      
    - "Industrial Zone (Kogyo - 工業)"
      description: "Warehouses, manufacturing, logistics"
      
    - "Residential Zone (Jukyo - 住居)"
      description: "Housing (home office allowed with restrictions)"
      
  home_office: "Allowed in residential zones (up to a point - no client visits in Jukyo)"
  tokyo_specific:
    - "Mixed-use developments common (Roppongi Hills, Tokyo Midtown)"
    - "Very strict zoning in Shibuya (preserves commercial character)"
    - "Many buildings allow both office + residential (mansion + office combo)"
    
# Property Taxes (Japan)
property_taxes_japan:
  - tax: "Fixed Asset Tax (Kotei Shisan Zei - 固定資産税)"
    authority: "Municipalities (Cities/Wards)"
    rate_percent: 1.4  # Of assessed value
    due_dates: ["End of April", "End of July", "End of December", "End of February"]  # 4 installments
    
  - tax: "City Planning Tax (Toshi Keikaku Zei - 都市計画税)"
    authority: "Municipalities (major cities only)"
    rate_percent: 0.3  # Of assessed value (on top of Fixed Asset Tax)
    applies_to: "Cities with city planning projects (Tokyo, Osaka, etc.)"
    
  - tax: "Enterprise Tax (Jigyo Zei - 事業税)"
    authority: "Prefectures"
    rate_percent: [3.0, 5.0]  # On office floor space (not profit!)
    applies_to: "Offices > 1000 sqm floor space"
    
  total_effective_rate_percent: 1.7  # Fixed Asset + City Planning
    
  assessment: "Assessed value = Fair market value × 0.7 (valuation ratio)"
  note: "Office spaces in Tokyo 23 wards: VERY expensive!"
    
# Business Licenses (Japan)
business_license_japan:
  name: "Notification of Business Start (Shinko Todokede - 新興届出)"
  issued_by: "Municipality (City/Ward Office) where business is located"
  
  requirements:
    - "Form (in-person or online via e-Tax)"
    - "Fee: ¥0 (NO FEE! Very simple)"
    - "Zoning confirmation (home office vs. commercial)"
    - "KANA (Kabushiki Kaisha) or GODO (Godo Kaisha) registration with Legal Affairs Bureau"
    
  cost_jpy: 0  # FREE! (amazing compared to US/Brazil)
  validity_years: "Permanent (no renewal needed!)"
  
  special_business_permits:
    - "Food service license (Health Center) - ¥18K (~$120)"
    - "Second-hand dealer license (Police) - ¥19K (~$127)"
    - "Travel agency license (Prefecture) - ¥22K (~$147)"
    
  tokyo_note: "Just notify municipality (Shinko Todokede) - NO FEE, permanent!"
  
# Commercial Leasing (Japan)
commercial_leasing_japan:
  law: "Civil Code (民亊法) + Building Lease Law"
  
  lease_types:
    - type: "Ordinary Lease (Futsu Chintai - 普通賃貸)"
      description: "Standard lease (no renewal option)"
      typical_term_years: [1, 2]
      renewal: "Must renegotiate"
      
    - type: "Fixed-Term Lease (Kitei Chintai - 定期賃貸)"
      description: "Fixed period (NO renewal!)"
      typical_term_years: [1, 3]
      renewal: "NO renewal (must move out!)"
      note: "New type (2000+) - popular with landlords"
      
    - type: "Renewable Lease (Koshin Chintai - 更新賃貸)"
      description: "Lease with renewal option"
      typical_term_years: [2, 5]
      renewal: "Auto-renew unless notice given"
      
  security_deposit_jpy: [3, 12]  # Months of rent (called "Shikikin - 敷金")
  key_money_jpy: [1, 6]  # NON-REFUNDABLE "gift" to landlord! (called "Reikin - 礼金") UNIQUE TO JAPAN!
  
  lease_term_years: [2, 5]  # Tech prefers 2-3 years (flexibility)
  tokyo_note: "Key Money (Reikin) is UNIQUE TO JAPAN - non-refundable gift!"
  
  typical_costs_example_tokyo_shinjuku_100sqm:
    rent_jpy_month: 800000  # ¥800K (~$5,333)
    shikikin_jpy: 2400000  # ¥2.4M (3 months - refundable)
    reikin_jpy: 800000  # ¥800K (1 month - NON-refundable!) UNIQUE!
    total_move_in_jpy: 4000000  # ¥4M (~$26,667) upfront!
    
# Home Office Deductions (Japan)
home_office_deduction_japan:
  tax_law: "Income Tax Law - Article 57-2"
  
  requirements:
    - "Exclusive use (only for business)"
    - "Regular use (consistent basis)"
    - "Principal place of business (primary work location)"
    
  deduction_method: "Proportional deduction based on floor area"
  deduction_example:
    home_area_sqm: 80
    office_area_sqm: 20  # 25% of home
    utilities_jpy_year: 240000  # ¥240K (~$1,600)
    deductible_jpy: 60000  # ¥60K (25% of utilities)
    
  tokyo_tech:
    - "Many startup founders work from home early-stage"
    - "Google/Meta employees working remotely can claim"
    - "Contractors (Kojin Jigyo) almost always claim"
    
