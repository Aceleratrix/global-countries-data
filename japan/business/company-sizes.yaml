      name: "Manufacturing (製造業)"
      gdp_share_percent: 20.5
      tech_relevance: "Robotics, automotive, electronics (Sony, Nintendo)"
      
    - code: "J (Information & Communications)"
      name: "Information & Communications (情報通信業)"
      gdp_share_percent: 5.8
      tech_relevance: "Software, telecom, broadcasting, data processing"
      
    - code: "K (Wholesale & Retail Trade)"
      name: "Commerce (商業)"
      gdp_share_percent: 13.2
      tech_relevance: "E-commerce (Rakuten, Mercari), retail tech"
      
    - code: "M (Professional & Technical Services)"
