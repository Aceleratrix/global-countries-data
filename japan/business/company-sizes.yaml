version: 1.0.0
country: japan
last_updated: 2026-04-30
description: "Company sizes, types, and business structures for Japanese AI First businesses"

# Company Types (Business Entities)
company_types:
  - type: "Kabushiki Kaisha (KK) - 株式会社 (Stock Company)"
    japanese_name: "株式会社 (かぶしきがいしゃ)"
    description: "Standard corporation (like C-Corp in US)"
    formation: "File Articles of Incorporation with Legal Affairs Bureau"
    cost_jpy: [150000, 500000]  # ¥150K-500K (~$1K-$3.3K USD)
    pros: ["Limited liability", "Easy to raise capital (stock issuance)", "VC-friendly", "Recognized internationally"]
    cons: ["More paperwork", "Annual shareholder meetings required", "Higher formation cost"]
    tax_form: "Corporate tax return (Form 26)"
    tax_rate_percent: 23.2  # Effective
    best_for: "VC-backed startups, large companies, foreign companies entering Japan"
    tokyo_usage: "90% of VC-backed startups"
    note: "Most prestigious form (like US C-Corp)"
    
  - type: "Godo Kaisha (GK) - 合同会社 (LLC Equivalent)"
    japanese_name: "合同会社 (ごうどうがいしゃ)"
    description: "Limited liability company (easier than KK)"
    formation: "File Articles of Incorporation with Legal Affairs Bureau"
    cost_jpy: [100000, 300000]  # ¥100K-300K (~$670-$2K USD)
    pros: ["Limited liability", "Simpler management (no board required)", "Fewer formalities", "Lower cost"]
    cons: ["Less prestigious than KK", "Harder to raise VC (but possible)"]
    tax_form: "Corporate tax return (Form 26)"
    tax_rate_percent: 23.2  # Same as KK
    best_for: "Small businesses, consultancies, foreign companies testing Japan"
    tokyo_usage: "Common for small AI consultancies, freelancers"
    note: "Easier to set up than KK (like US LLC)"
    
  - type: "Goshi Kaisha - 合資会社 (Limited Partnership)"
    japanese_name: "合資会社 (ごうしがいしゃ)"
    description: "Partnership with general and limited partners"
    formation: "Articles of Incorporation + partnership agreement"
    pros: ["Pass-through taxation", "Limited partners have liability protection"]
    cons: ["General partners have unlimited liability", "Rarely used for AI"]
    tax_form: "Pass-through to partners (individual tax)"
    tax_rate_percent: "Individual rates (5-45%)"
    best_for: "Rare for AI companies"
    
  - type: "Kojin Jigyo - 個人事業 (Sole Proprietorship)"
    japanese_name: "個人事業主 (こじんじぎょうぬし)"
    description: "Individual business owner"
    formation: "Notification to tax office (Form 104)"
    cost_jpy: [0, 5000]  # Just notification fee
    pros: ["No formation cost", "Simplest form", "Direct tax reporting"]
    cons: ["Unlimited personal liability", "Hard to raise capital", "Less credibility"]
    tax_form: "Individual tax return (Form 16)"
    tax_rate_percent: "Individual rates (5-45%)"
    best_for: "Freelancers, solo AI consultants"
    tokyo_usage: "Common for freelance AI engineers"
    
  - type: "Kabushiki Kaisha (KK) - 合同会社 (Stock Company - US Branch)"
    japanese_name: "日本支店 (にほんしてん)"
    description: "Branch office of foreign corporation"
    formation: "Register with Legal Affairs Bureau + tax office notification"
    cost_jpy: [200000, 500000]
    pros: ["No need to incorporate locally", "Parent company can raise funds globally"]
    cons: ["Parent company has unlimited liability", "Less independent"]
    tax_form: "Corporate tax on Japan-source income"
    tax_rate_percent: 23.2
    best_for: "US/EU tech companies entering Japan (Google, Meta, OpenAI)"
    silicon_valley_equivalent: "Like US subsidiaries in Japan"

# Company Sizes (By Revenue & Employees)
company_sizes:
  - size: "Micro"
    name: "Micro Business (小規模事業者)"
    employees: [1, 9]
    revenue_jpy_annual: [0, 25000000]  # ¥25M (~$167K USD)
    typical_examples: ["Freelancers", "Sole proprietors", "Tiny GK/LLCs"]
    prevalence_percent: 78.0  # Of all Japan businesses
    tech_relevance: "Many early-stage AI freelancers"
    
  - size: "Small"
    name: "Small Business (小企業)"
    employees: [10, 99]
    revenue_jpy_annual: [25000000, 1000000000]  # ¥25M-1B (~$167K-$6.7M USD)
    typical_examples: ["Local services", "Small SaaS", "Boutique agencies"]
    prevalence_percent: 19.5
    tech_relevance: "Many B2B SaaS, AI consultancies"
    
  - size: "Medium"
    name: "Medium Business (中堅企業)"
    employees: [100, 499]
    revenue_jpy_annual: [1000000000, 10000000000]  # ¥1B-10B (~$6.7M-$67M USD)
    typical_examples: ["Mid-market SaaS", "Regional tech firms", "Growing startups"]
    prevalence_percent: 2.3
    tech_relevance: "Series B/C Japanese startups"
    
  - size: "Large"
    name: "Large Business (大企業)"
    employees: [500, 9999]
    revenue_jpy_annual: [10000000000, 100000000000]  # ¥10B-100B (~$67M-$670M USD)
    typical_examples: ["Public tech companies", "Unicorns", "Late-stage startups"]
    prevalence_percent: 0.2
    tech_relevance: "Public tech (Sony, Rakuten), unicorns (Mercari)"
    
  - size: "Enterprise"
    name: "Enterprise (超大企業)"
    employees: [10000, null]  # 10,000+
    revenue_jpy_annual: [100000000000, null]  # ¥100B+ (~$670M+ USD)
    typical_examples: ["Fortune 500 equivalents", "Megacorps"]
    prevalence_percent: 0.05
    tech_relevance: "Sony, Nintendo, SoftBank, Rakuten"

