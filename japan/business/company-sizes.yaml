    - "Good for testing Japan market"
    
# Business Hours (Standard Japan)
business_hours:
  weekdays:
    start: "09:00"
    end: "18:00"
    lunch_break: "12:00-13:00"
  saturday:
    start: "09:00"
    end: "13:00"
    optional: true
  sunday:
    closed: true
    exceptions: ["Malls", "Restaurants", "Convenience stores", "Sony stores"]
    
# Golden Week (MAJOR Holiday!)
golden_week:
  dates: "April 29 - May 5 (typically + weekends = 7-10 days)"
  description: "One of Japan's 3 major holiday seasons (Obon, New Year)"
  business_impact: "Many companies close ENTIRE WEEK (April 29 - May 5)"
  ai_implications: "Support tickets, API responses DELAYED during Golden Week!"
  
  components:
    - "April 29: Showa Day (昭和の日)"
    - "May 3: Constitution Day (憲法記念日)"
    - "May 4: Greenery Day (みどりの日)"
    - "May 5: Children's Day (こどもの日)"
    
  other_major_holidays:
    - "Obon (mid-August, ~3 days) - Many take vacation"
    - "New Year (Dec 29 - Jan 3) - LONGEST holiday (1 week+)"
    - "Silver Week (Sept, some years) - 3-5 days"
    
