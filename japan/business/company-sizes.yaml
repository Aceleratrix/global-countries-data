# Startup Growth Stages (Japan)
startup_stages_japan:
  - stage: "Pre-Seed / Idea Stage"
    capital_jpy: [0, 50000000]  # ¥50M (~$335K USD)
    employees: [1, 3]
    entity_type: "Godo Kaisha (GK) or KK (if expecting VC)"
    burn_rate_jpy_month: [500000, 2000000]  # ¥500K-2M (~$3.3K-$13K)
    focus: "MVP, product-market fit"
    
  - stage: "Seed"
    capital_jpy: [50000000, 300000000]  # ¥50M-300M (~$335K-$2M)
    employees: [3, 15]
    entity_type: "Kabushiki Kaisha (KK)"
    burn_rate_jpy_month: [2000000, 10000000]  # ¥2M-10M (~$13K-$67K)
    focus: "Product development, early traction"
    
  - stage: "Series A"
    capital_jpy: [300000000, 1500000000]  # ¥300M-1.5B (~$2M-$10M)
    employees: [15, 100]
    entity_type: "Kabushiki Kaisha (KK)"
    burn_rate_jpy_month: [10000000, 50000000]  # ¥10M-50M (~$67K-$335K)
    focus: "Scaling, go-to-market"
    
  - stage: "Series B, C, D..."
    capital_jpy: [1500000000, 50000000000]  # ¥1.5B-50B (~$10M-$335M)
    employees: [100, 2000]
    entity_type: "Kabushiki Kaisha (KK)"
    burn_rate_jpy_month: [50000000, 1000000000]  # ¥50M-1B (~$335K-$6.7M)
    focus: "Growth, profitability, IPO prep"
    
  - stage: "IPO / Public"
    capital_jpy: "Public markets (¥100B+ raises)"
    employees: [2000, 100000+]
    entity_type: "Public KK"
    focus: "Quarterly earnings, public shareholders"

