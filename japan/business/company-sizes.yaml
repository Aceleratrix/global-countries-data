  godo_kaisha_gk_percent: 14.0  # Growing (easier setup)
  kojin_jigyo_percent: 78.0  # Of ALL businesses (including non-tech)
  
  reasons_for_kk:
    - "International recognition (like US C-Corp)"
    - "Easy to issue stock options (shares)"
    - "VCs prefer KK"
    - "Prestige in Japan"
    
  reasons_for_gk:
