# Payment APIs & Open Banking
open_banking:
  status: "Framework in development (2024-2025)"
  legislation: "Consumer-Driven Banking Framework"
  implementation: "Planned 2025"
  major_aggregators:
    - name: "Plaid"
      coverage: "Major Canadian banks"
      api_url: "https://plaid.com/canada"
    - name: "Yodlee (Envestnet)"
      coverage: "All major banks"
    - name: "Flinks"
      origin: "Canada (Montreal)"
      coverage: "All major banks"
      api_url: "https://flinks.com"
  
  interac_api: "e-Transfer API available for businesses (limited)"
  notes: "Open banking regulation expected in 2025"

# Routing Number Format
routing:
  format: "3-digit institution + 5-digit branch"
  example: "003 01234 (BMO institution 003)"
  institution_codes:
    - "001: Bank of Montreal (BMO)"
    - "002: Bank of Nova Scotia (Scotiabank)"
    - "003: Royal Bank of Canada (RBC)"
    - "004: Toronto-Dominion Bank (TD)"
    - "010: Canadian Imperial Bank of Commerce (CIBC)"

