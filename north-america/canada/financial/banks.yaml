    market_share: 48
    types:
      - "Interac Debit (in-person)"
      - "Interac e-Transfer (P2P, 20M+ users)"
    daily_limit_cad: 3000
    notes: "Most popular payment method in Canada"
  
  - method: "Credit/Debit Cards"
    market_share: 35
    major_providers: ["Visa", "Mastercard", "American Express"]
    contactless_limit_cad: 250
    notes: "Widely accepted"
  
  - method: "Cash"
    market_share: 10
    notes: "Declining rapidly"
  
  - method: "Digital Wallets"
    market_share: 5
