# Cryptocurrency Regulations
cryptocurrency:
  legal_status: "Legal (not recognized as legal tender)"
  regulator: "CSA (Canadian Securities Administrators)"
  registration_required: true
  reporting: "Crypto holdings > $100,000 CAD (Form T1135)"
  tax: "Subject to capital gains tax (50% inclusion)"
  vat: "Not subject to GST/HST on purchases"
  notes: "Crypto platforms must register as Money Service Businesses (MSBs)"

# Invoicing Requirements
invoicing:
  mandatory_fields:
    - "Invoice number"
    - "Invoice date"
    - "Vendor and customer information"
    - "Description of goods/services"
    - "GST/HST amount (if registered)"
    - "Total amount"
  electronic_invoicing:
    b2g_required: false
    b2b_optional: true
    standard: "Peppol (being adopted)"
  retention: "6 years (recommended)"
