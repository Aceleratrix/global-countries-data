  - sector: "Retail & E-commerce"
    adoption_percent: 55
    use_cases: ["Recommendation engines", "Inventory optimization"]
  
  - sector: "Manufacturing"
    adoption_percent: 40
    use_cases: ["Predictive maintenance", "Quality control"]
  
  - sector: "Energy & Natural Resources"
    adoption_percent: 50
    use_cases: ["Drilling optimization", "Grid management"]

# AI Funding & Investment
ai_investment:
  vc_investment_2023_cad_millions: 3200
  government_grants_2024_cad_millions: 440
  top_funding_rounds:
    - company: "Cohere"
      amount_cad_millions: 600
