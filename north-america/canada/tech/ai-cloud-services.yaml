# Canada AI & Cloud Services
# AI-Ready: Structured for multi-agent systems

country: canada
last_updated: "2024-12-15"
usmca_member: true

# National AI Strategy
national_strategy:
  name: "Pan-Canadian Artificial Intelligence Strategy"
  launched: 2017
  budget_cad_billions: 2.4
  renewal_2021_cad_billions: 0.44
  key_pillars:
    - "AI research excellence (3 hubs)"
    - "AI talent development (scholarships, chairs)"
    - "AI adoption in industry"
    - "AI infrastructure (compute, data)"
  official_url: "https://www.ic.gc.ca/ai"

# AI Research Hubs (The "Big 3")
ai_hubs:
  - name: "Mila (Montreal Institute for Learning Algorithms)"
    location: "Montreal, Quebec"
    director: "Yoshua Bengio (Turing Award)"
    researchers: 900
    focus: ["Deep learning", "Generative AI", "Health AI"]
    website: "https://mila.quebec"
  
  - name: "Vector Institute"
    location: "Toronto, Ontario"
    director: "Alán Aspuru-Guzik"
    researchers: 700
    focus: ["Machine learning", "Drug discovery", "Finance AI"]
    website: "https://vectorinstitute.ai"
  
  - name: "Amii (Alberta Machine Intelligence Institute)"
    location: "Edmonton, Alberta"
    researchers: 300
    focus: ["Reinforcement learning", "Energy AI"]
    website: "https://amii.ca"

# Supercomputing & Compute
supercomputing:
  - name: "Narval (Calcul Quebec)"
    peak_performance_petaflops: 12
    ai_capable: true
    location: "Montreal"
  
  - name: "Cedar (Compute Canada)"
    peak_performance_petaflops: 5.5
    ai_capable: true
    location: "Simon Fraser University"
  
  - name: "Graham (Compute Canada)"
    peak_performance_petaflops: 4.8
    ai_capable: true
    location: "University of Waterloo"

# Cloud Providers (Canada regions)
cloud_providers:
  - name: "AWS (Amazon Web Services)"
    region: "ca-central-1 (Montreal)"
    launched: 2016
    services: ["EC2", "S3", "RDS", "Lambda", "Bedrock (AI)"]
    compliance: ["PIPEDA", "CSA Notice"]
    website: "https://aws.amazon.com/ca"
  
  - name: "Microsoft Azure"
    region: "canada-central (Toronto)"
    launched: 2016
    services: ["Virtual Machines", "Azure AI", "Cosmos DB", "OpenAI Service"]
    compliance: ["PIPEDA", "CSA Notice"]
    website: "https://azure.microsoft.com/en-ca"
  
  - name: "Google Cloud"
    region: "northamerica-northeast1 (Montreal)"
    launched: 2018
    services: ["Compute Engine", "Vertex AI", "Cloud Storage"]
    compliance: ["PIPEDA"]
    website: "https://cloud.google.com"
  
  - name: "Oracle Cloud"
    region: "ca-montreal-1"
    launched: 2021
    services: ["OCI Compute", "Oracle AI"]
    compliance: ["PIPEDA"]
    website: "https://www.oracle.com/ca-en/cloud"

# Canadian AI Companies & Startups
ai_companies:
  - name: "Cohere"
    focus: "Large Language Models (Command R+)"
    funding_cad_billions: 2.2
    valuation_usd_billions: 5.5
    location: "Toronto"
    website: "https://cohere.com"
  
  - name: "Vector Institute (spinoffs)"
    focus: "AI research commercialization"
    notable: ["Deep Genomics", "Blue J Legal", "BenchSci"]
  
  - name: "BlackBerry (Cylance)"
    focus: "AI cybersecurity"
    location: "Waterloo"
    website: "https://www.blackberry.com"
  
  - name: "RBC (Borealis AI)"
    focus: "Banking AI research"
    location: "Toronto"
    status: "Closed 2023 (talent absorbed)"
  
  - name: "Thomson Reuters (Westlaw Edge AI)"
    focus: "Legal AI"
    location: "Toronto"
    website: "https://www.thomsonreuters.com"

# AI Research Institutions
ai_research:
  - name: "University of Toronto - Computer Science"
    focus: ["Machine learning", "Computer vision", "NLP"]
    researchers: 150
    notable: "Geoffrey Hinton (Turing Award, 2018)"
  
  - name: "University of Montreal - MILA"
    focus: ["Deep learning", "Generative models"]
    researchers: 200
  
  - name: "University of Alberta - Amii"
    focus: ["Reinforcement learning"]
    researchers: 80
    notable: "Richard Sutton (father of RL)"

# AI Ethics & Regulation
ai_ethics:
  framework: "Directive on Automated Decision-Making (federal)"
  authority: "Treasury Board Secretariat"
  ethical_principles:
    - "Accountability"
    - "Transparency"
    - "Fairness"
    - "Privacy protection"
  algorithm_assessment:
    - "Impact assessment required for federal systems"
    - "Four levels: Exclusion, Perception, Nudge, Material"
  aid_a_bill: "Expected to become law 2025"

# AI Talent & Education
ai_talent:
  universities_with_ai_programs: 45
  ai_graduates_per_year: 1800
  top_ai_universities:
    - "University of Toronto (CS)"
    - "University of Montreal (MILA)"
    - "University of Alberta (Amii)"
    - "McGill University"
    - "University of Waterloo"
  ai_researchers: 2500
  international_ai_talent_percent: 35

