      amount_cad_millions: 180

# AI Conferences & Events
ai_events:
  - name: "NeurIPS (Conference on Neural Information Processing Systems)"
    frequency: "Annual"
    location: "Rotating (Montreal hosted 2018, 2019)"
  
  - name: "Canadian AI Conference (CAIAC)"
    frequency: "Annual"
    location: "Rotating cities"
  
  - name: "AI for Good (Montreal)"
    frequency: "Annual"
    location: "Montreal"

# AI APIs & Services Available
available_ai_apis:
  - provider: "Google Cloud AI"
    services: ["Vision API", "Natural Language API", "Translation API", "Vertex AI"]
    region: "northamerica-northeast1"
  
  - provider: "Azure AI"
    services: ["Cognitive Services", "Azure OpenAI Service", "Machine Learning"]
    region: "canada-central"
  
  - provider: "AWS AI"
    services: ["Bedrock", "Rekognition", "Comprehend", "Translate"]
    region: "ca-central-1"
  
  - provider: "Cohere"
    services: ["Command R+ API", "Embed API"]
    endpoint: "https://api.cohere.ai"

# Language Models (English & French)
canadian_llms:
  - name: "Cohere Command R+"
    parameters: 104000000000
    languages: ["English", "French", "Multilingual"]
    open_source: false
    api_available: true
    website: "https://cohere.com/command"
  
  - name: "GPT-3/4 (OpenAI via Azure)"
    languages: ["English", "French"]
    canadian_hosting: true (Azure Canada)
  
  - name: "Bloom (BigScience, Montreal)"
    parameters: 176000000000
    languages: 46
    open_source: true
    developed_in: "Montreal (Hugging Face)"
