# Canada Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: canada
last_updated: "2024-12-15"
calling_code: "+1"
international_prefix: "011"
emergency_numbers:
  police: 911
  ambulance: 911
  fire: 911

# Phone Number Format
phone_format:
  general_pattern: "+1 (XXX) XXX-XXXX"
  country_code: "1 (shared with USA)"
  national_prefix: "1 (for long distance)"
  regex_national: "^\\(?[2-9][0-9]{2}\\)?[ -]?[2-9][0-9]{2}[ -]?[0-9]{4}$"
  regex_international: "^\\+1[2-9][0-9]{9}$"
  example_national: "(416) 555-1234"
  example_international: "+1 416 555 1234"
  total_length: 10
  notes: "Area codes start with 2-9, next digit is 0-9, third digit is 0-9 (except 9 for central office)"

# Area Codes by Province/Territory (2024)
area_codes:
  - province: "Ontario"
    codes: ["416", "647", "437", "365", "742"]  # Toronto area
    overlay: true
    notes: "10-digit dialing mandatory"
  
  - province: "Quebec"
    codes: ["514", "438", "263", "354"]  # Montreal area
    overlay: true
  
  - province: "British Columbia"
    codes: ["604", "778", "236", "672"]  # Vancouver area
    overlay: true
  
  - province: "Alberta"
    codes: ["403", "587", "825", "368"]  # Calgary/Edmonton
    overlay: true
  
  - province: "Manitoba"
    codes: ["204", "431"]
    overlay: true
  
  - province: "Saskatchewan"
    codes: ["306", "639"]
    overlay: true
  
  - province: "Nova Scotia"
    codes: ["902", "782"]
  
  - territory: "Nunavut"
    codes: ["867"]
  
  - territory: "Northwest Territories"
    codes: ["867"]
  
  - territory: "Yukon"
    codes: ["867"]

# Mobile Numbers
mobile:
  prefixes: "Same as landlines (no separate prefix)"
  format: "Same 10-digit format"
  example: "(416) 555-1234"
  penetration_percent: 94
  notes: "Mobile numbers use same area codes as landlines"

# Landline Numbers
landline:
  prefixes: "Same as mobile"
  format: "10-digit format"
  notes: "No distinction between mobile and landline for dialing"

# Toll-Free & Special Numbers
special_numbers:
  - type: "Toll-free"
    prefixes: ["800", "888", "877", "866", "855", "844", "833", "822"]
    format: "1-800-XXX-XXXX"
    cost: "Free for caller"
  
  - type: "Premium rate"
    prefixes: ["900"]
    cost: "$3.00 - $15.00/min"
    regulation: "CRTC oversight"
  
  - type: "Emergency"
    number: "911"
    description: "Police, fire, ambulance (unified)"
  
  - type: "Provincial Services"
    numbers: ["211 (Community services)", "311 (Municipal services)", "411 (Directory assistance)"]
    description: "3-digit numbers for specific services"

