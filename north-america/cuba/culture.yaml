national_language: Spanish
other_languages: Haitian Creole (small minority)
literacy_rate: 99.8%
national_symbols:
  - Flag: Five blue and white stripes with a red triangle and white star
  - Coat of Arms: Shield with a key, mountains, and a royal palm
  - National Anthem: "La Bayamesa"
  - National Bird: Cuban Trogon (Tocororo)
  - National Flower: Mariposa (Butterfly Jasmine)
traditional_music: Son, Salsa, Mambo, Cha-cha-cha, Bolero
cuisine:
  - Ropa Vieja
  - Moros y Cristianos
  - Tostones
  - Cuban Sandwich
  - Mojito (cocktail)
