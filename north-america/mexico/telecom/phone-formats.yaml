# Mexico Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: mexico
last_updated: "2024-12-15"
calling_code: "+52"
international_prefix: "00"
emergency_numbers:
  police: "911"
  fire: "911"
  ambulance: "911"
  unified: true
  
# Phone Number Formats
phone_formats:
  landline:
    pattern: "+52 1 XX XXXX XXXX"
    digits: 10
    area_codes: ["55 (Mexico City)", "33 (Guadalajara)", "81 (Monterrey)", "22 (Puebla)"]
    example: "+52 55 1234 5678"
    regex: "^\\+52[1-9]\\d{9}$"
    
  mobile:
    pattern: "+52 1 XX XXXX XXXX"
    digits: 10
    example: "+52 1 55 1234 5678"
    regex: "^\\+521\\d{10}$"
    
  toll_free:
    pattern: "800 XXX XXXX"
    example: "800 123 4567"
    regex: "^800\\d{7}$"
    
  premium_rate:
    pattern: "900 XXX XXXX"
    example: "900 123 4567"
    regex: "^900\\d{7}$"
    
