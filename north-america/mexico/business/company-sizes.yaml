# Mexico Business: Company Sizes & Classifications
# AI-Ready: Structured for multi-agent systems

country: mexico
last_updated: "2024-12-15"
usmca_member: true

# Company Size Definitions (INEGI)
size_definitions:
  micro:
    employees_max: 10
    revenue_mxn_max: 4000000
    revenue_usd_max: 235000
    percent_of_businesses: 86.2
    examples: ["Sole traders", "Small shops", "Freelancers"]
    
  small:
    employees_range: "11-50"
    revenue_mxn_max: 100000000
    revenue_usd_max: 5880000
    percent_of_businesses: 10.8
    examples: ["Local retailers", "Small manufacturers", "Service providers"]
    
  medium:
    employees_range: "51-250"
    revenue_mxn_max: 500000000
    revenue_usd_max: 29400000
    percent_of_businesses: 2.5
    examples: ["Regional manufacturers", "Mid-size tech firms", "Growing exporters"]
    
  large:
    employees_min: 251
    revenue_mxn_min: 500000000
    revenue_usd_min: 29400000
    percent_of_businesses: 0.5
    examples: ["Multinationals", "Major manufacturers", "Listed companies"]
    
# Total Businesses
total_businesses: 4600000
listed_companies_bmv: 148
private_companies_percent: 99.9

# Business Structure Types
business_structures:
  - type: "Persona Física (Sole Proprietor)"
    description: "Individual entrepreneur"
    rfc_required: true
    percent_of_businesses: 75
    tax_treatment: "Personal income tax (ISR)"
    
  - type: "Sociedad Anónima (S.A.)"
    description: "Corporation with shares"
    rfc_required: true
    percent_of_businesses: 15
    tax_treatment: "Corporate tax (ISR)"
    
  - type: "Sociedad de Responsabilidad Limitada (S. de R.L.)"
    description: "Limited liability company"
    rfc_required: true
    percent_of_businesses: 8
    tax_treatment: "Corporate tax (ISR)"
    
  - type: "Sociedad por Acciones Simplificada (S.A.S.)"
    description: "Simplified joint stock company (2016 reform)"
    rfc_required: true
    percent_of_businesses: 2
    tax_treatment: "Simplified corporate tax"
    
# RFC & Tax Registration
rfc_tax:
  rfc:
    name: "Registro Federal de Contribuyentes"
    format: "13 characters (person) or 12 (company)"
    required_for: "All business activities"
    tax_linked: true
    url: "https://www.sat.gob.mx"
    
