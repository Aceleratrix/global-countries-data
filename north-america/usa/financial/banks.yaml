# Open Banking (Emerging in US - No Federal Framework Like Brazil)
open_banking:
  status: "Voluntary (no federal mandate like Brazil's PIX)"
  framework: "CFPB (Consumer Financial Protection Bureau) rule (2024)"
  effective: "2026-2027"
  approach: "Market-driven (not government-mandated)"
  
  major_players:
    - "Plaid (now owned by Visa)"
    - "Yodlee (Envestnet)"
    - "MX"
    - "Finicity (Mastercard)"
    
  use_cases: ["Account aggregation", "Payment initiation", "Income verification"]
  note: "No mandatory instant payment system like Brazil's PIX"

# Regulation
regulation:
  payment_systems: "Federal Reserve (FedNow launching 2023 for instant payments)"
  consumer_protection: "CFPB (Consumer Financial Protection Bureau)"
  anti_money_laundering: "FinCEN (Financial Crimes Enforcement Network)"
  pci_dss_required: true  # For card storage
  state_regulation: "State banking departments (varies by state)"

# Silicon Valley Tech Payment Preferences
silicon_valley_payments:
