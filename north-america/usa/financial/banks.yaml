# Payment Methods
payment_methods:
  - name: "ACH (Automated Clearing House)"
    type: "bank_transfer"
    mandatory_for_business: false
    processing_time_days: [1, 2]  # Business days
    fees_per_transaction_usd: [0.20, 1.50]  # Very low cost
    limits_per_transaction_usd: 100000  # Varies by bank
    same_day_ach: true  # For additional fee
    api_integration: true
    regulatory: "NACHA (National Automated Clearing House Association)"
    usage_percent: 65.0  # For B2B and recurring payments
    note: "US equivalent to PIX (but slower - 1-2 days)"
    
  - name: "Wire Transfer"
    type: "real_time_bank_transfer"
    mandatory_for_business: false
    processing_time_hours: [0.5, 4.0]  # Same day if sent before cutoff
    fees_per_transaction_usd: [15.00, 50.00]  # More expensive
    limits_per_transaction_usd: null  # No limit
    domestic: true
    international_swift: true
    note: "For high-value or urgent transfers"
    
  - name: "Credit Cards"
    type: "credit"
    brands: ["Visa", "Mastercard", "American Express", "Discover"]
    mandatory_for_business: false
    installments_allowed: false  # Not common in US
    fees_merchant_percent: [1.5, 3.5]  # Varies by volume
    pci_dss_required: true
    popular_for: ["E-commerce", "In-store", "Subscriptions"]
    
  - name: "Debit Cards"
    type: "debit"
    brands: ["Visa Debit", "Mastercard Debit"]
    fees_merchant_percent: [0.5, 1.5]  # Lower than credit
    pin_required: false  # "Credit" button bypasses PIN
    
  - name: "PayPal"
    type: "digital_wallet"
    website: "https://www.paypal.com"
    mandatory_for_business: false
    processing_time_days: [0, 1]  # Instant for PayPal balance
    fees_merchant_percent: 2.9  # + $0.30 per transaction
    api: "https://developer.paypal.com"
    digital_wallet: true
    paypal_checkout: true
    usage_percent: 35.0
    
  - name: "Stripe"
    type: "payment_gateway"
    website: "https://stripe.com"
    founded: 2010
    headquarters: "San Francisco, CA (Silicon Valley)"
    processing_fees_percent: 2.9  # + $0.30 per transaction
    api_first: true
    api_docs: "https://stripe.com/docs/api"
    products: ["Payment Links", "Checkout", "Subscriptions", "Connect (marketplace)"]
    usage_percent: 45.0  # #1 for tech startups
    notable_clients: ["Amazon", "Google", "Shopify", "OpenAI"]
    
  - name: "Square (Block)"
    type: "payment_gateway"
    website: "https://squareup.com"
    founded: 2009
    headquarters: "San Francisco, CA"
    processing_fees_percent: 2.6  # + $0.10 (in-person), 2.9 + $0.30 (online)
    pos_hardware: true
    api: "https://developer.squareup.com"
    
  - name: "Apple Pay"
    type: "digital_wallet"
    usage_percent: 45.0
    devices: ["iPhone", "Apple Watch", "Mac"]
    api: "https://developer.apple.com/documentation/passkit"
    tokenization: true
    contactless: true
    
  - name: "Google Pay"
    type: "digital_wallet"
    usage_percent: 25.0
    devices: ["Android phones", "Wear OS"]
    api: "https://developers.google.com/pay"
    
  - name: "Venmo"
    type: "peer_to_peer"
    parent: "PayPal"
    usage_percent: 20.0
    social_feed: true
    business_profiles: true
    fees_merchant_percent: 1.9  # + $0.10
    
  - name: "Checks"
    type: "paper"
    usage_percent: 15.0  # Declining but still used
    processing_time_days: [2, 5]  # Slow
    note: "Still common for B2B and rent payments"

