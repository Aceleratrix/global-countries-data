# Coworking Chains (National)
coworking_chains:
  - name: "WeWork"
    headquarters: "New York, NY"
    locations_count: 800+  # US-wide
    silicon_valley_locations: 45  # SF, San Jose, Palo Alto, etc.
    pricing_usd_person_month: [450, 1200]
    features: ["Meeting rooms included", "Coffee", "Printing", "Events", "Phone booths"]
    silicon_valley_note: "Still dominant despite 2023 bankruptcy/restructuring"
    
  - name: "Regus / Spaces"
    headquarters: "Luxembourg (US HQ: Dallas, TX)"
