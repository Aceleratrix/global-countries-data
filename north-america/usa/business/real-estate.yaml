# Zoning (Commercial)
zoning:
  zones:
    - "C-1 (Local Commercial) - Neighborhood shops, small offices"
    - "C-2 (General Commercial) - Larger offices, retail, restaurants"
    - "C-3 (Central Commercial) - High-rise offices, downtown cores"
    - "I (Industrial) - Warehouses, manufacturing, logistics"
    - "M (Mixed-Use) - Residential + Commercial allowed"
    
  home_office: "Allowed in residential zones (up to a point - no client visits in R-1)"
  silicon_valley_specific:
    - "Mixed-use developments common (live/work lofts in SF)"
    - "Strict zoning in Palo Alto (preserves residential character)"
    - "San Francisco allows most residential for home office"

# Property Taxes
property_taxes:
  - tax: "Property Tax (Ad Valorem)"
    authority: "County Assessors"
    rate_percent: [0.6, 2.5]  # Varies by county/state
    assessment: "Market value (some states limit increases - Prop 13 in CA)"
    due_dates: "1-4 installments (varies by county)"
    
  - tax: "Transfer Tax (Recordation Tax)"
    authority: "Counties/Cities"
    rate_percent: [0.1, 3.3]  # Per $500 of sale price
    note: "San Francisco: 0.11% city + 0.56% county = 0.67% total"
    
  - tax: "Capital Gains Tax (Federal + State)"
    federal_rate_percent: [0.0, 20.0]  # Based on income
    state_rates:
      california: 13.3  # Highest in US
      texas: 0.0  # No state income tax
      washington: 0.0  # No state income tax
      new_york: 10.9  # High
    exemption: "Section 1031 Like-Kind Exchange (defers, not exempts)"

# Business Licenses
business_license:
  name: "Business License / Tax Certificate"
  issued_by: "City/County where business is located"
  requirements:
    - "Form (online or in-person)"
    - "Fee (varies by city, $50-500)"
    - "Zoning confirmation (home office vs. commercial)"
    - "DBA (Doing Business As) filing if not using legal name"
    
  cost_usd: [50, 500]  # Varies wildly by city
  validity_years: 1  # Usually annual renewal
  silicon_valley_note: "San Francisco: $50-200/year, San Jose: $25-100/year"

# Commercial Leasing
commercial_leasing:
  law: "No federal leasing law - state contract law governs"
  lease_types:
    - type: "Gross Lease"
      description: "Tenant pays flat rent, landlord pays all expenses"
      usage: "Small offices, coworking"
      
    - type: "Net Lease (Single/Triple)"
      description: "Tenant pays rent + property taxes, insurance, maintenance"
      usage: "Larger offices, Silicon Valley standard"
      
    - type: "Modified Gross"
      description: "Hybrid - tenant pays rent + some expenses"
      usage: "Most common for tech offices"
      
  security_deposit: [3, 12]  # Months of rent
  lease_term_years: [3, 10]  # Tech prefers flexibility (3-5 years)
  silicon_valley: "Many startups prefer short-term (1-3 years) due to rapid growth"

# Home Office Deductions (IRS)
home_office_deduction:
  irs_requirements:
    - "Exclusive use (only for business)"
    - "Regular use (consistent basis)"
    - "Principal place of business (primary work location)"
    
  simplified_method_usd: 5  # Per square foot, up to 300 sq ft = $1500 max
  actual_expense_method: "Depreciation + percentage of home (mortgage interest, utilities, etc.)"
  
  silicon_valley_tech:
    - "Many startup founders work from home early-stage"
    - "Google/Meta employees working remotely can claim"
    - "Contractors (1099) almost always claim"

