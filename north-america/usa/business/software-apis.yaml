# Open Banking (Emerging in US)
open_banking:
  status: "Voluntary (no federal mandate like Brazil's PIX)"
  framework: "CFPB (Consumer Financial Protection Bureau) rule (2024)"
  effective: "2026-2027"
  approach: "Market-driven (not government-mandated)"
  
  major_players:
    - "Plaid (now owned by Visa, SF office)"
    - "Yodlee (Envestnet - San Jose, CA)"
    - "MX (Lehi, UT + SF office)"
    - "Finicity (Mastercard - Salt Lake City + SF office)"
    - "Stripe (San Francisco, CA - Treasury product)"
    
  use_cases: ["Account Aggregation", "Payment Initiation (Stripe Treasury)", "Income Verification"]
  note: "No mandatory instant payment system like Brazil's PIX, but ACH is ubiquitous"

