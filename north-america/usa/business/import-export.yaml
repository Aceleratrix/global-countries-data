version: 1.0.0
country: usa
last_updated: 2026-04-30
disclaimer: "Data provided AS IS. Verify with official sources before use. See DISCLAIMER.md for full terms."
description: "US import/export regulations and trade agreements"

# US Customs and Border Protection (CBP)
trade_authorities:
  - name: "US Customs and Border Protection (CBP)"
    description: "Primary border control and trade agency"
    url: "https://www.cbp.gov"
    role: "Collects duties, secures borders, enforces trade laws"
    
  - name: "Bureau of Industry and Security (BIS) - Commerce Dept"
    description: "Export controls on dual-use items (tech, AI chips)"
    url: "https://www.bis.doc.gov"
    role: "Export licenses, Entity List, EAR (Export Administration Regulations)"
    critical_for_ai: "Restrictions on exporting advanced AI chips (NVIDIA A100/H100) to China, Russia"
    
  - name: "Office of the US Trade Representative (USTR)"
    description: "Leads trade negotiations, imposes tariffs"
    url: "https://ustr.gov"
    role: "Tariff decisions, trade agreements, Section 301 investigations"
    
  - name: "Food and Drug Administration (FDA)"
    description: "Regulates food, drugs, medical devices (imports/exports)"
    url: "https://www.fda.gov"
    role: "Import alerts, device approvals, biotech trade"
    critical_for_ai: "AI medical devices, healthtech exports"
    
  - name: "Department of Agriculture (USDA)"
    description: "Regulates agricultural imports/exports"
    url: "https://www.usda.gov"
    role: "Phytosanitary certificates, meat/dairy imports"
    
  - name: "Federal Communications Commission (FCC)"
    description: "Regulates telecommunications equipment"
    url: "https://www.fcc.gov"
    role: "Equipment authorization (Part 15, Part 68), spectrum"
    critical_for_ai: "AI hardware (routers, modems) must be FCC-certified"

# Import Taxes & Duties
import_taxes:
  - tax: "Customs Duty"
    rate_percent: [0.0, 350.0]  # Varies by HTS (Harmonized Tariff Schedule) code
    calculation: "Ad valorem (percentage of value) or specific (per unit)"
    average_rate_percent: 2.5  # Weighted average (low compared to Brazil's 40-85%)
    
  - tax: "Merchandise Processing Fee (MPF)"
    rate_percent: 0.3464  # Of value
    minimum_usd: 27.75
    maximum_usd: 538.00
    
  - tax: "Harbor Maintenance Fee (HMF)"
    rate_percent: 0.125  # Of value
    applies_to: "Ocean shipments only (seaports)"
    maximum_usd: 1100.00
    
  - tax: "Section 301 Tariffs (China Trade War)"
    rate_percent: [7.5, 25.0]  # On many Chinese imports
    status_2026: "Partially rolled back; some remain on tech/AI hardware"
    silicon_valley_impact: "Higher costs for Chinese-made electronics, components"
    
  total_tax_burden_percent: [2.5, 35.0]  # Varies by product/country

# Harmonized Tariff Schedule (HTS)
hts_codes:
  description: "US coding system for imports (10 digits)"
  digits: 10
  example: "8471.30.0120"  # Electronic computers (tablets)
  search_url: "https://hts.usitc.gov"
  silicon_valley_relevant:
    - "8471: Automatic data processing machines (computers, tablets, servers)"
    - "8517: Telephones, smartphones, networking gear"
    - "8523: Media for sound/video (hard drives, SSDs)"
    - "8542: Electronic integrated circuits (semiconductors, GPUs)"
    
# Export Controls (Critical for AI Companies)
export_controls:
  authority: "Bureau of Industry and Security (BIS)"
  law: "Export Administration Regulations (EAR) - 15 CFR"
  
  control_lists:
    - list: "Commerce Control List (CCL)"
      description: "Items with Export Control Classification Numbers (ECCN)"
      example_eccn: "3A090"  # Advanced computing chips (NVIDIA H100, A100)
      silicon_valley_impact: "Google, Meta, OpenAI can't export advanced AI chips to China/Russia"
      
    - list: "Entity List"
      description: "Restricted parties (cannot export without license)"
      examples: ["Huawei", "SMIC (China)", "Many Russian entities"]
      silicon_valley_impact: "Cannot sell advanced chips/AI tech to these entities"
      
    - list: "Unverified List"
      description: "Entities with unclear end-use (suspect)"
      
  export_licenses:
    - type: "License Exception"
      description: "No license needed for low-risk items"
      
    - type: "Individual Export License"
      description: "Case-by-case approval from BIS"
      processing_time_days: [30, 120]
      
  ai_chip_controls_2026:
    - "NVIDIA H100/A100: Cannot export to China, Russia, some Middle East"
    - "Licenses required for lower-end chips (A800, H800 - modified for China)"
    - "US persons cannot support Chinese chip development (10 CFR § 744.6)"
    - "Impact on Silicon Valley: NVIDIA, AMD must create 'China-specific' chips"

# Trade Agreements
trade_agreements:
  - name: "US-Mexico-Canada Agreement (USMCA)"
    type: "Free Trade Agreement (FTA)"
    effective: 2020  # Replaced NAFTA
    benefits: ["Duty-free for qualifying goods", "Digital trade provisions", "IP protection"]
    silicon_valley_tech: "Cross-border data flows protected, source code not required to be disclosed"
    
  - name: "United States-Korea Free Trade Agreement (KORUS)"
    effective: 2012
    benefits: ["Duty-free many goods", "Korea is major chip/display supplier"]
    
  - name: "CAFTA-DR (Central America)"
    effective: 2006
    countries: ["Costa Rica", "Dominican Republic", "El Salvador", "Guatemala", "Honduras", "Nicaragua"]
    
  - name: "Australia FTA"
    effective: 2005
    
  - name: "No EU FTA Yet (2026)"
    status: "Negotiations stalled (post-Trump challenges)"
    silicon_valley_impact: "EU market harder to access (GDPR, Digital Markets Act affect US tech)"

# Shipping and Logistics
international_shipping:
  major_ports:
    - name: "Port of Los Angeles / Long Beach, CA"
      type: "Marine"
      market_share_percent: 40.0  # Of US containerized imports
      main_cargo: ["Consumer electronics", "Furniture", "Apparel", "Auto parts"]
      silicon_valley_relevance: "Importing hardware, components from Asia"
      
    - name: "Port of New York/New Jersey"
      type: "Marine"
      market_share_percent: 18.0
      main_cargo: ["Consumer goods", "Machinery", "Food"]
      
  major_airports:
    - name: "Los Angeles International (LAX)"
      market_share_percent: 15.0  # Air cargo
      main_cargo: ["Electronics", "Perishables", "Pharmaceuticals"]
      
    - name: "Miami International (MIA)"
      market_share_percent: 10.0
      main_cargo: ["Flowers", "Fruits", "Electronics (Latin America)"]
      
    - name: "San Francisco International (SFO)"
      note: "Silicon Valley's main international gateway"
      main_cargo: ["Tech hardware", "Semiconductors", "High-value electronics"]
      
  major_freight_forwarders:
    - "DHL Global Forwarding"
    - "Kuehne + Nagel"
    - "DB Schenker"
    - "C.H. Robinson"
    - "Expeditors"
    
  shipping_time_days:
    china_to_us_west_coast: [12, 18]  # Marine
    china_to_us_east_coast: [22, 30]  # Marine
    us_west_coast_to_china: [10, 15]  # Marine
    air_freight_global: [1, 5]  # Air (expensive)

# Payment Methods for International Trade
international_payments:
  - method: "Wire Transfer (SWIFT)"
    cost_usd: [25, 75]  # Per transaction
    processing_time_days: [1, 3]  # Banking days
    used_for: "Commercial payments (imports/exports)"
    
  - method: "Letter of Credit (L/C)"
    cost_usd: [200, 1000]  # Issue + amendment fees
    processing_time_days: [5, 15]
    used_for: "Guarantee payment in international trade"
    silicon_valley: "Used for large hardware/equipment imports (servers, networking gear)"
    
  - method: "Open Account (Net Terms)"
    description: "Buyer pays later (30-90 days)"
    risk: "Seller bears risk (common in US-EU trade)"
    
  - method: "ACH (Domestic US only)"
    cost_usd: [0.20, 1.50]
    processing_time_days: [1, 2]
    used_for: "Domestic supplier payments"
    
  exchange_rate_source: "Fed + market (floating exchange rate)"
  silicon_valley_ai_companies: "Often use SWIFT for international cloud/API vendor payments"

# Cross-Border E-commerce
cross_border_ecommerce:
  platforms:
    - name: "Amazon Global"
      market_share_percent: 35.0
      import_duty: "Collected at checkout (DDP - Delivered Duty Paid)"
      
    - name: "eBay International"
      market_share_percent: 15.0
      import_duty: "Buyer responsible (DDU - Delivered Duty Unpaid)"
      
    - name: "Shopify Markets"
      market_share_percent: 10.0
      import_duty: "Configurable (DDP or DDU)"
      
  de_minimis_value_usd: 800.00  # De minimis: imports ≤$800 are duty-free!
  note: "Much higher than Brazil's $50 - massive advantage for US e-commerce"
  
# Section 232 (National Security Tariffs)
section_232:
  law: "Trade Expansion Act of 1962, Section 232"
  authority: "Department of Commerce / President"
  used_for: "Tariffs on national security grounds"
  examples_2026:
    - "Steel (25% tariff) - ongoing"
    - "Aluminum (10% tariff) - ongoing"
    - "Challenges: Autos, semiconductors (under review)"
    
  silicon_valley_impact: "Higher costs for steel/aluminum in data centers, hardware"

# Section 301 (China Trade War)
section_301:
  law: "Trade Act of 1974, Section 301"
  authority: "USTR (Office of US Trade Representative)"
  status_2026: "Phase One deal (2020) + ongoing tariffs on ~$370B Chinese goods"
  rates: ["7.5%", "25%"]
  
  silicon_valley_targeted:
    - "Smartphones (iPhones from China)"
    - "Laptops/computers"
    - "Semiconductors/chips"
    - "Networking equipment (routers, switches)"
    - "AI hardware components"
    
  impact: "Apple, Google, Meta, etc. pay more for Chinese-made hardware"

# AI Company Import/Export Opportunities
ai_company_import_opportunities:
  - opportunity: "Import AI Hardware (GPUs, Servers)"
    hts_code: "8471.80.90"  # Other automatic data processing machines
    import_duty_percent: [0.0, 25.0]  # 0% from many countries, 25% from China
    silicon_valley_note: "NVIDIA, AMD chips made in Taiwan/US, but components from China"
    
  - opportunity: "Export AI Software/SaaS"
    duty_percent: 0.0  # Software exports typically duty-free
    payment_method: "SWIFT, PayPal, Stripe, ACH"
    silicon_valley_note: "OpenAI, Anthropic export API access globally (except banned countries)"
    
  - opportunity: "Import Training Data / Export AI Models"
    duty_percent: 0.0  # Digital goods typically duty-free
    export_control: "AI models may be subject to EAR if used for military/dual-use"
    silicon_valley_note: "GPT-4, Claude exported as API access (subject to Entity List restrictions)"
    
  - opportunity: "Cross-Border AI Services (APIs)"
    regulation: "No duty, but subject to data localization laws (EU, China)"
    silicon_valley_note: "OpenAI, Anthropic, Google serve global APIs from US cloud regions"
