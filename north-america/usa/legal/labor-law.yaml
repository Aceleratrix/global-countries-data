  - role: "Product Manager (PM) - APM (Entry)"
    base_range: [130000, 170000]
    total_comp_range: [200000, 280000]
    
  - role: "Product Manager - Senior PM"
    base_range: [200000, 280000]
    total_comp_range: [350000, 700000]
    
  - role: "UX/UI Designer - Mid-Level"
    base_range: [140000, 190000]
