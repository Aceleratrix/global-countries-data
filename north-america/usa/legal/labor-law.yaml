    base_range: [160000, 220000]
    total_comp_range: [250000, 400000]
    
  - role: "Software Engineer - Senior / Staff"
    base_range: [220000, 320000]
    total_comp_range: [400000, 800000]
    
  - role: "Software Engineer - Principal / Distinguished"
    base_range: [320000, 500000]
    total_comp_range: [800000, 2000000]
    
  - role: "Data Scientist - Junior"
    base_range: [110000, 150000]
    total_comp_range: [160000, 220000]
    
  - role: "Data Scientist - Senior"
