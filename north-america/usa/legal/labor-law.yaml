description: "US employment law, at-will doctrine, and Silicon Valley compensation"

# Employment At-Will (Default in Most States)
employment_at_will:
  doctrine: "Either party can terminate employment at any time, with or without cause"
  applies_to: ["California", "Texas", "New York", "Washington", "Most states"]
  exceptions:
    - "Montana (only state with just cause requirement after probation)"
    - "Implied contracts (may override at-will)"
    - "Public policy exceptions (cannot fire for jury duty, voting, etc.)"
    - "Discrimination laws (cannot fire based on protected class)"
  implications_for_ai:
    - "AI companies can terminate employees freely (within legal bounds)"
    - "No mandatory severance pay (unless contract says so)"
    - "Stock options typically vest over 4 years (1-year cliff)"

# Employment Types
employment_types:
  - type: "W-2 Employee"
    description: "Traditional employment with full legal protections"
    benefits: ["Health insurance (ACA)", "Social Security/Medicare taxes (FICA) paid 7.65% by employer", "Unemployment insurance", "Workers' compensation", "Family/medical leave (FMLA)"]
    costs_to_employer_percent: 20.0  # Beyond salary (payroll taxes, benefits)
    probation_period_months: [3, 6]  # At-will applies immediately though
    silicon_valley_usage: "Standard for full-time tech employees"
    
  - type: "1099 Independent Contractor"
    description: "Self-employed, no benefits, issues 1099-NEC"
    benefits: "None (contractor responsible for own taxes + benefits)"
    costs_to_employer_percent: 0.0  # No payroll taxes or benefits
    tax_forms: ["Form 1099-NEC (if >$600/year)", "Schedule C / Form 1040"]
    self_employment_tax_percent: 15.3  # Contractor pays both halves of FICA
    silicon_valley_usage: "Common for freelancers, consultants, gig workers"
    misclassification_risk: "High - must pass IRS 20-factor test or ABC test (CA)"
    
  - type: "C2C (Corp-to-Corp) Contractor"
    description: "Contractor operates through their own LLC/C-Corp"
    benefits: "None, but can optimize taxes (S-Corp election)"
    costs_to_employer_percent: 0.0
    setup_cost_usd: [500, 2000]  # LLC/C-Corp formation
    silicon_valley_usage: "Senior contractors, consultants, specialized talent"
    
  - type: "Intern (Paid)"
    description: "Temporary worker (students or recent grads)"
    age_min: 18
    duration_months: [3, 12]
    pay_usd_hour: [20.0, 50.0]  # Varies by role/company
    silicon_valley_intern_pay_usd_hour: [45.0, 65.0]  # Top tech pays more
    benefits: "Usually none (except maybe a laptop)"
    
  - type: "Remote Work (Distributed)"
    description: "Employee works outside company office (anywhere in US)"
    legal_framework: "No federal mandate, state laws vary"
    tax_implications: "Employee creates tax nexus in their state"
    silicon_valley_usage: "Very common post-2020 (Google, Meta, etc. allow remote)"
    equipment_budget_usd: [1000, 5000]  # laptop, monitor, chair

