country: Panama
key_events:
  - 1501: Spanish arrival (Rodrigo de Bastidas expedition)
  - 1821: Joins Gran Colombia after Spanish American wars of independence
  - 1903: Independence from Colombia with US support
  - 1914: Panama Canal officially opens
  - 1999: Full transfer of Panama Canal control to Panama
  - 2024: José Raúl Mulino elected president