country: Honduras
key_historical_events:
  - 1502: Christopher Columbus arrives on Caribbean coast during fourth voyage
  - 1524: Spanish colonization begins under Hernán Cortés
  - 1821: Independence from Spain (joins First Mexican Empire)
  - 1823: Joins United Provinces of Central America
  - 1838: Separates from Central American Federation, becomes independent republic
  - 1969: Football War (brief war with El Salvador over migration disputes)
  - 1998: Hurricane Mitch devastates country (kills ~5,600 people, destroys infrastructure)
  - 2009: Military coup ousts President Manuel Zelaya
  - 2021: Xiomara Castro elected first female president
  - 2022: Xiomara Castro sworn into office
colonial_name: Honduras (Spanish for "depths", named by Columbus for coastal waters)