national_symbols:
  - Flag: Three horizontal stripes (blue, white, blue) with five blue stars
  - Anthem: "Himno Nacional de Honduras"
  - Bird: Scarlet macaw
  - Flower: Orchid (Rhyncholaelia digbyana)
  - Tree: Pinus oocarpa
traditional_music: Punta (Garifuna), marimba, folkloric dances
cuisine:
  - Baleadas (flour tortillas with beans, cheese, cream)
  - Plato típico (rice, beans, plantains, meat, salad)
  - Sopa de caracol (conch soup)
notable_holidays:
  - Independence Day: September 15
  - Labor Day: May 1
  - Christmas: December 25