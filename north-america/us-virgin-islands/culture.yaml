# Cultura - Ilhas Virgens Americanas
languages:
  - English (official)
  - Virgin Islands Creole English
ethnic_groups:
  - African descent: 76%
  - White: 15.6%
  - Hispanic: 5.4%
religions:
  - Protestant: 59%
  - Catholic: 34%
  - Other: 7%
festivals:
  - Carnival (St. Thomas, St. Croix, St. John)
  - Virgin Islands Emancipation Day (July 3)
  - Hurricane Supplication Day (July/August)
cuisine:
  - Seafood (conch, fish)
  - Callaloo
  - fungi (cornmeal dish)
  - Rum-based drinks
music:
  - Calypso
  - Quelbe (traditional folk music)
  - Reggae
