# História - Ilhas Virgens Americanas
timeline:
  - 1493: Christopher Columbus claims islands for Spain
  - 1670: Denmark establishes colonies on St. Thomas, St. John, St. Croix
  - 1754: Danish West Indies established
  - 1917: US purchases islands from Denmark for $25 million
  - 1927: US citizenship granted to islanders
  - 1954: Revised Organic Act provides self-governance
  - 1970: First elected governor takes office
  - 1976: US Virgin Islands Convention adopts constitution (not ratified)
