# Meio Ambiente - Ilhas Virgens Americanas
protected_areas: 30% of total area
marine_protected_areas: Virgin Islands National Park (St. John, 60% of island)
biodiversity:
  - Coral reefs (extensive)
  - Tropical forests
  - Endemic bird species (Virgin Islands hummingbird)
environmental_issues:
  - Coastal erosion
  - Coral bleaching due to warming oceans
  - Waste management
  - Limited freshwater resources
renewable_energy_target: 30% by 2030
