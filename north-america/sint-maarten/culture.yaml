country: Sint Maarten
national_symbols:
  - Flag: Red, blue, white with coat of arms
  - Anthem: "O Sweet Sint Maarten"
  - National Bird: Brown pelican
  - National Flower: Yellow sage
public_holidays:
  - New Year's Day
  - Easter Monday
  - King's Day (April 27)
  - Emancipation Day (July 1)
  - Constitution Day (October 10)
cuisine: Merges Caribbean, Dutch, and international influences; notable dishes include conch stew, johnnycakes, and guavaberry liqueur