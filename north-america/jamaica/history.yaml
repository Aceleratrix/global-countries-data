timeline:
  - 1494: Christopher Columbus arrives, claims island for Spain
  - 1509: Spanish colonization begins
  - 1655: British capture Jamaica from Spain
  - 1670: Spain formally cedes Jamaica to Britain via Treaty of Madrid
  - 1834: Slavery abolished in British Empire
  - 1866: Jamaica becomes a crown colony
  - 1938: Labour movement emerges, early political parties formed
  - 1944: New constitution grants universal suffrage
  - 1958: Joins West Indies Federation
  - 1962-08-06: Gains independence from UK
  - 1962: Joins United Nations, Commonwealth of Nations
  - 1972: Michael Manley becomes Prime Minister, pushes democratic socialism
  - 1980: Edward Seaga elected, shifts to free-market policies
  - 1990s: Economic liberalization, debt crisis
  - 2007: Portia Simpson-Miller becomes first female PM
  - 2016: Andrew Holness elected PM (current)