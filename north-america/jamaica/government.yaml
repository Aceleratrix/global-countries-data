government_type: Parliamentary constitutional monarchy
head_of_state: King Charles III (represented by Governor-General Patrick Allen)
head_of_government: Prime Minister Andrew Holness
legislature: Parliament of Jamaica
- Upper house: Senate (21 appointed members)
- Lower house: House of Representatives (63 elected members)
independence: 1962-08-06
constitution_adopted: 1962-08-06
political_parties:
  - Jamaica Labour Party (JLP)
  - People's National Party (PNP)
suffrage: 18 years of age, universal
judicial_branch: Supreme Court of Jamaica, Court of Appeal, Privy Council (final appeal)