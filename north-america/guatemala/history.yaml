timeline:
  - 1500 BCE: Rise of Maya civilization
  - 1524: Spanish conquest begins
  - 1543: Established as Captaincy General of Guatemala
  - 1821-09-15: Independence from Spain
  - 1823: Joined United Provinces of Central America
  - 1839: Became independent republic
  - 1960-1996: Guatemalan Civil War
  - 1996: Peace accords signed
  - 2023: Bernardo Arévalo elected president
  - 2024-01: Arévalo inaugurated
