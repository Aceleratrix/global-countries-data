national_holidays:
  - Eid al-Fitr
  - Eid al-Adha
  - Independence Day (August 15)
  - Prophet Muhammad's Birthday
national_dish: Machboos (spiced rice with meat or fish)
traditional_dress:
  - Men: Thobe (long white robe)
  - Women: Abaya (black cloak) and Hijab
music: Sawt (traditional vocal music)
sports:
  - Football (most popular)
  - Formula 1 (Bahrain Grand Prix since 2004)
