# History of Uzbekistan
key_periods:
  - Ancient: Part of Sogdiana, Bactria; Silk Road trading hub
  - 8th-13th centuries: Arab conquest, Islamic Golden Age (Avicenna, Al-Biruni)
  - 13th century: Mongol invasion by Genghis Khan
  - 14th-15th centuries: Timurid Empire (Tamerlane)
  - 16th-19th centuries: Khanates of Bukhara, Khiva, Kokand
  - 1865-1917: Russian Empire annexation
  - 1924-1991: Soviet Socialist Republic
  - 1991: Independence from Soviet Union
  - 2016: Death of President Islam Karimov, Shavkat Mirziyoyev elected