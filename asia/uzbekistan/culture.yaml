# Culture of Uzbekistan
national_symbols:
  - Flag: Blue, white, green horizontal stripes with red fimbriations and crescent moon with 12 stars
  - Anthem: "Oʻzbekiston Respublikasining Davlat Madhiyasi"
  - Emblem: Represents the sun, birds, and cotton
traditional_clothing:
  - Men: Doppi (skullcap), chapan (robe)
  - Women: Khan-atlas (silk dress), parandja (traditional veil, less common now)
cuisine:
  - Plov (pilaf) - national dish
  - Shashlik (grilled meat skewers)
  - Lagman (noodle soup)
  - Samsa (stuffed pastries)
holidays:
  - Independence Day (September 1)
  - Navruz (March 21)