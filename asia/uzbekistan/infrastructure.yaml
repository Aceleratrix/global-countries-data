# Infrastructure of Uzbekistan
transport:
  - Railways: 4,669 km (2023)
  - Roads: 84,000 km (2023)
  - Airports: 53 (including Tashkent International Airport)
energy:
  - Electricity production: 64.5 TWh (2022)
  - Natural gas production: 50.8 billion m³ (2022)
  - Oil production: 3.1 million tons (2022)
telecommunications:
  - Mobile phone subscriptions: 112 per 100 people (2023)
  - Internet users: 74% of population (2023)