timeline:
  - year: "16th century"
    event: "Portuguese colonization begins"
  - year: "1975-11-28"
    event: "Unilateral declaration of independence from Portugal"
  - year: "1975-12-07"
    event: "Indonesian invasion and occupation starts"
  - year: "1999-08-30"
    event: "UN-sponsored referendum votes for independence"
  - year: "1999-09-20"
    event: "UN Transitional Administration in East Timor (UNTAET) established"
  - year: "2002-05-20"
    event: "Full independence as Democratic Republic of Timor-Leste"
  - year: "2006-04-05"
    event: "Political crisis and unrest"
  - year: "2012-03-04"
    event: "First post-independence peaceful transfer of power"
  - year: "2023-07-01"
    event: "Xanana Gusmão becomes Prime Minister"
