country: Iraq
cultural_heritage:
  - Cradle of civilization (Mesopotamia)
  - UNESCO World Heritage Sites:
    - Samarra Archaeological City
    - Ashur (Qal'at Sherqat)
    - Erbil Citadel
    - Hatra
  - Traditional music: Iraqi maqam (UNESCO intangible heritage)
  - Literature: Epic of Gilgamesh (oldest known epic poem)
cuisine:
  main_dishes: Masgouf (grilled carp), Dolma, Kebab, Biryani
  staples: Rice, wheat, dates, lamb
festivals:
  - Eid al-Fitr, Eid al-Adha (Islamic)
  - Nowruz (Kurdish New Year, March 21)
  - Assyrian New Year (April 1)