country: Iraq
key_events:
  - "c. 4500 BCE: Sumerian civilization emerges in Mesopotamia"
  - "c. 2334 BCE: Akkadian Empire founded by Sargon of Akkad"
  - "c. 1792 BCE: Hammurabi's Code established in Babylon"
  - "637 CE: Muslim conquest of Mesopotamia"
  - "1534-1918: Part of Ottoman Empire"
  - "1920: British Mandate of Mesopotamia established"
  - "1932: Independence as Kingdom of Iraq"
  - "1958: Monarchy overthrown, Republic declared"
  - "1979-2003: Saddam Hussein presidency"
  - "2003: US-led invasion, Saddam regime toppled"
  - "2005: New constitution adopted, democratic elections held"
  - "2014-2017: War against ISIS"
  - "2021: Coalition forces complete withdrawal"