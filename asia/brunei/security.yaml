country: Brunei Darussalam
military_expenditure: 2.5% of GDP (2023)
armed_forces: Royal Brunei Armed Forces (RBAF)
  - Army: 4,900 active personnel
  - Navy: 1,000 active personnel (Royal Brunei Navy)
