country: Brunei Darussalam
government_type: Unitary Islamic absolute monarchy (Sultanate)
head_of_state: Sultan Hassanal Bolkiah (since 5 October 1967)
head_of_government: Sultan Hassanal Bolkiah (serves as Prime Minister)
legislature: Legislative Council (unicameral, 36 appointed members)
major_political_parties: "No formal political parties (absolute monarchy)"
independence_date: 1 January 1984 (from United Kingdom)
constitution_date: 29 September 1959 (amended 2004)
judicial_system: Mixed system (English common law, Islamic Sharia law, customary law)
