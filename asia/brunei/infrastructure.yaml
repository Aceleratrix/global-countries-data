country: Brunei Darussalam
transport:
  - Brunei International Airport (only international airport, 2.1 million passengers 2023)
  - No railway system; public buses (BIST) and private vehicles dominate transport
  - Muara Port (main cargo port, primary hub for oil/gas exports)
energy:
  - Electricity access: 100% (nationwide coverage)
  - Primary sources: Natural gas (99%), solar (1% pilot projects)
  - Renewable target: 10% solar power by 2035
telecommunications:
  - Mobile penetration: 120% (multiple SIMs per person)
  - Internet penetration: 95.0%
  - 4G coverage: 99% of populated areas, 5G rollout began 2023
