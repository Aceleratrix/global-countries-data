country: Brunei Darussalam
healthcare_system: Free universal healthcare for citizens, mixed public-private system
universal_coverage: Full public coverage funded by oil and gas revenues
life_expectancy: 76.1 years (2023)
infant_mortality_rate: 9.8 per 1000 live births (2023)
healthcare_expenditure: 2.5% of GDP (2023)
key_hospitals:
  - Raja Isteri Pengiran Anak Saleha Hospital (RIPAS, largest public hospital)
  - Jerudong Park Medical Centre (leading private hospital)
  - Suri Seri Begawan Hospital (gastroenterology specialist)
covid_19_response: Early border closures, 85% fully vaccinated by end-2021
