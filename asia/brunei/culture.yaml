country: Brunei Darussalam
cultural_heritage:
  - Kampong Ayer (largest stilt water village in the world, ~39,000 residents)
  - Sultan Omar Ali Saifuddien Mosque (iconic 1958 mosque, symbol of Brunei)
  - Royal Regalia Museum (displays Sultan's coronation regalia)
official_languages: [Malay]
national_language: Malay
national_day: 23 February (commemorates 1984 independence from UK)
cuisine:
  - Ambuyat (national dish, sago starch gel eaten with dipping sauces)
  - Nasi katok (rice with fried chicken and sambal, affordable staple)
  - Ambal (spicy fish curry)
  - Kuih (traditional colorful cakes)
arts:
  - Brunei Museum (national history and cultural artifacts)
  - Dewan Bahasa dan Pustaka (cultural center for Malay arts)
festivals:
  - Hari Raya Aidilfitri (Eid al-Fitr, major Islamic celebration)
  - Maulidur Rasul (Prophet Muhammad's birthday)
  - National Day (23 February)
  - Chinese New Year (celebrated by Chinese community)
