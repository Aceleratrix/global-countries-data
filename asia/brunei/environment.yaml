country: Brunei Darussalam
environmental_issues:
  - Deforestation for palm oil and agricultural expansion
  - Regional haze pollution from Indonesian forest fires
  - Coastal erosion due to rising sea levels
conservation_efforts:
  - 41% of land area designated as protected (national parks, forest reserves)
  - Ulu Temburong National Park (pristine rainforest, ecotourism destination)
  - Mangrove reforestation projects along coastal areas
carbon_emissions: 18.5 million tonnes CO2 (2022)
renewable_energy_target: 10% solar power by 2035
