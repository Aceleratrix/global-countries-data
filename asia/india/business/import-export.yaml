## Customs & Tariffs
customs_authority: "Central Board of Indirect Taxes & Customs (CBIC)"
website: "https://www.cbic.gov.in"

tariff_structure:
  average_tariff_percent: 13.5
  wto_commitments: "Industrial goods: 0-40%, Agricultural: 0-150%"
  
  categories:
    - "Basic Customs Duty (BCD): 0-40% (based on HS code)"
    - "IGST (Integrated GST): 5-28% (on imports, same as domestic)"
    - "Social Welfare Surcharge: 10% (on BCD)"
    - "Cess (if applicable): on specific goods (cars, tobacco)"

## Free Trade Agreements (FTAs)
active_ftas:
  - "SAFTA (South Asian Free Trade Area)"
  - "India-ASEAN FTA (ATIGA)"
  - "India-Japan CEPA (Comprehensive Economic Partnership)"
  - "India-South Korea CEPA"
  - "India-UAE CEPA (2022)"
  - "India-Australia ECTA (2022, interim)"
  - "India-Mauritius CECPA (2021)"

## Import Requirements
import_licensing:
  general_rule: "No license for most goods (open trade regime)"
  restricted_goods:
    - "Firearms & ammunition"
    - "Narcotic drugs & psychotropic substances"
    - "Certain chemicals (dual-use)"
    - "Wildlife products (CITES)"
    - "Used goods (restricted, need DGFT permission)"
    - "Chinese apps/telecom equipment (security restrictions 2020+)"

## Documentation
required_documents:
  - "Bill of Entry (import declaration)"
  - "Commercial Invoice"
  - "Packing List"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (for FTA benefits)"
  - "Import Export Code (IEC) - MANDATORY"
  - "GST Registration (if applicable)"

## Import Export Code (IEC)
iec:
  description: "10-digit code MANDATORY for all importers/exporters"
  issuing_authority: "DGFT (Directorate General of Foreign Trade)"
  format: "1234567890 (example)"
  use: "All customs declarations, RBI reporting"
  application: "Online via DGFT portal (dgft.gov.in)"
  timeline: "2-5 business days"

## Export Controls
export_controls:
  authority: "DGFT (Directorate General of Foreign Trade)"
  controlled_items:
    - "Scrap metal (export prohibited 2022-2026)"
    - "Non-basmati rice (export banned 2023)"
    - "Sugar (export restricted, quotas)"
    - "Onions (export banned intermittently)"
    - "Dual-use items (special chemicals, nuclear-related)"
    - "Wildlife products (CITES permits)"
    
  export_promotion_schemes:
    - "Duty Drawback Scheme (refund of duties)"
    - "RoDTEP (Remission of Duties and Taxes on Export Products)"
    - "MEIS (replaced by RoDTEP)"
    - "EPCG Scheme (Export Promotion Capital Goods)"

## Special Economic Zones (SEZs)
sezs:
  total: 270+
  top_sezs:
    - "Santacruz SEZ (Mumbai - IT/ITES)"
    - "Madras SEZ (Chennai - multi-product)"
    - "Noida SEZ (Delhi NCR - IT)"
    - "Falcon SEZ (Hyderabad - pharma)"
    
  benefits:
    - "100% income tax exemption (first 5 years)"
    - "No customs duty on imports"
    - "No GST on supplies"
    - "Simplified compliance"

