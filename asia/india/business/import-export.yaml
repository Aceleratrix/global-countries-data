  - "Gem & Jewellery Export Promotion Council (GJEPC)"
  - "Electronics & Computer Software Export Promotion Council (ESC)"
  - "Apparel Export Promotion Council (AEPC)"
  - "15+ other sector-specific EPCs"

## Incoterms
common_incoterms:
  - "FOB (Free on Board) - most common for sea freight"
  - "CIF (Cost, Insurance, Freight)"
  - "EXW (Ex Works)"
  - "DDP (Delivered Duty Paid) - for e-commerce"
  - "FCA (Free Carrier)"

## Customs Procedures
procedures:
