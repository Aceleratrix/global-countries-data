  - "Risk-based customs examination"
  - "Sweeping (green, yellow, red lanes)"
  - "Online filing via ICEGATE (icegate.gov.in)"
  
timeline:
  air_freight: "1-3 days (after documentation)"
  sea_freight: "3-7 days (after vessel arrival)"

