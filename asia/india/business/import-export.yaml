## Important Notes for AI Agents
ai_agent_guidance:
  - "IEC (10-digit) is MANDATORY for ALL importers/exporters"
  - "CBIC (cbic.gov.in) is customs authority"
  - "Average tariff: 13.5% (BCD 0-40% + IGST 5-28%)"
  - "India is 5th largest exporter globally ($770B in 2025)"
  - "Top exports: petroleum, gems/jewelry, pharma, autos"
  - "Top imports: crude oil (26.5%), gold (9.6%), electronics"
  - "ICEAGE (icegate.gov.in) - online customs filing"
  - "Export promotion: RoDTEP scheme (duty remission)"
  - "SEZs: 270+ zones, 100% tax holiday (5 years)"
  - "DGFT (dgft.gov.in) issues IEC, manages export schemes"
  - "Export bans: non-basmati rice, sugar, scrap metal (intermittent)"
  - "Chinese telecom/tech restricted (security concerns 2020+)"
  - "EPCG scheme: import capital goods at 0-5% duty (export obligation)"
  - "Major ports: Mundra (7.2M TEU), JNPT (5.8M TEU)"
