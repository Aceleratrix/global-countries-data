national_symbols:
  - Animal: Asian elephant
  - Flower: Dok Champa (Plumeria)
  - Sport: Muay Lao (Lao kickboxing)
national_holidays:
  - New Year (14–16 April)
  - Independence Day (19 July)
  - Lao People's Revolutionary Party Day (22 March)
  - National Day (2 December)
cuisine: Sticky rice (khao niao) is staple; dishes include larb, tam mak hoong (papaya salad), khao soi
traditional_clothing: Sinh (wrap-around skirt) for women, salong (baggy trousers) for men