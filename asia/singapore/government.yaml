country: Singapore
government_type: Unitary parliamentary republic
head_of_state: President (elected, ceremonial role)
head_of_government: Prime Minister (executive leader)
legislature: Parliament (unicameral, 93 seats)
major_political_parties:
  - People's Action Party (PAP, dominant since 1959)
  - Workers' Party (WP)
  - Singapore Democratic Party (SDP)
independence_date: 9 August 1965 (from Malaysia)
constitution_date: 1959 (amended multiple times)
judicial_system: Common law (based on English law)
