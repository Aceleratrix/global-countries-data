country: Singapore
transport:
  - Mass Rapid Transit (MRT): 230 km network, 142 stations
  - Public buses: Extensive network covering all areas
  - Changi Airport: 3 terminals, 1.22 billion passenger movements (2023)
  - Port of Singapore: 2nd busiest container port globally (37.5 million TEUs 2023)
energy:
