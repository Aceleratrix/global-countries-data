country: Singapore
environmental_issues:
  - Limited land for waste management
  - Air pollution from regional haze (Indonesian forest fires)
  - Rising sea levels (threatens low-lying coastal areas)
conservation_efforts:
  - 10% of land area designated as nature reserves
  - Goal to plant 1 million trees by 2030
  - SingapoRed Lions (national water recycling program)
carbon_emissions: 52.4 million tonnes CO2 (2022)
renewable_energy_target: 2 GW solar by 2030
