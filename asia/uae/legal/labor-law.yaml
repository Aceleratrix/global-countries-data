country: United Arab Emirates
law_reference: Federal Decree-Law No. 33 of 2021 (UAE Labor Law)
working_hours:
  standard: 8 hours/day, 48 hours/week
  ramadan: 6 hours/day for Muslim employees
minimum_wage: No national minimum; varies by emirate and sector
leave:
  annual: 30 days paid after 1 year of service
  sick: 15 days paid, 30 days half-paid
  maternity: 45 days paid, 15 days additional unpaid
probation_period: Up to 6 months, 14 days notice for termination