# Tax Codes in Turkey
corporate_tax:
  rate: 25%
  effective_date: 2024
  reduced_rate: 20% (for certain technology companies)
  
value_added_tax:
  standard_rate: 18%
  reduced_rates:
    - "8%: Food, books, pharmaceuticals, medical devices"
    - "1%: Basic foodstuffs, newspapers, periodicals"
  exempt: "Financial services, education, healthcare"
  
income_tax:
  type: progressive
  brackets:
    - "0-70,000 TRY: 15%"
    - "70,000-250,000 TRY: 20%"
    - "250,000-880,000 TRY: 27%"
    - "880,000-2,900,000 TRY: 35%"
    - "2,900,000+ TRY: 40%"
  top_rate: 40%
  
withholding_tax:
  dividends: 15% (residents), 20% (non-residents)
  interest: 10% (bank deposits), 15% (other)
  royalties: 20%
  
special_taxes:
  - "Stamp Tax: 0.189% to 0.948% on contracts"
  - "Motor Vehicle Tax: Annual based on vehicle age/engine"
  - "Property Tax: 0.1% to 0.6% of assessed value"
  
regulatory_body: "Revenue Administration (Gelir İdaresi Başkanlığı - GİB)"
tax_year: "Calendar year (January 1 - December 31)"