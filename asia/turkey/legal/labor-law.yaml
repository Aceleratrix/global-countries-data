# Labor Laws in Turkey
law_number: "4857"
enacted: 2003
last_amended: 2024

key_provisions:
  standard_work_week: 45 hours (max 11 hours per day)
  overtime: "175% of hourly wage (weekdays), 200% (weekends)"
  
  minimum_wage: "11,402 TRY per month (2024, gross)"
  minimum_wage_usd: "~$350 USD (2024 exchange rate)"
  
  annual_leave:
    - "1-5 years employment: 14 days"
    - "5+ years employment: 20 days"
    - "15+ years employment: 26 days"
    
  probation_period: "max 2 months (extendable to 4 months by contract)"
  
  severance_pay: "30 days' wages per year of service (capped at 7 months)"
  
  notice_period:
    - "0-6 months employment: 2 weeks"
    - "6-18 months: 4 weeks"
    - "18+ months: 6 weeks"
    
  maternity_leave: "16 weeks (8 before, 8 after birth)"
  paternity_leave: "5 days paid leave"

regulatory_body: "Ministry of Labor and Social Security"
social_security: "Social Security Institution (SGK)"