key_events:
  - 3000 BCE: Ancient Merv settlement established
  - 11th century: Seljuk Empire rule
  - 1869: Russian Empire annexes Transcaspia
  - 1924: Turkmen SSR established as part of Soviet Union
  - 1991-10-27: Independence declared from Soviet Union
  - 1995-12-12: UN declares permanent neutrality
  - 2006: Saparmurat Niyazov dies, Gurbanguly Berdimuhamedow becomes president
  - 2022: Serdar Berdimuhamedow elected president