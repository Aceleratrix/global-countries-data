major_attractions:
  - Darvaza Gas Crater (Door to Hell)
  - Ancient Merv (UNESCO World Heritage Site)
  - Ashgabat (white marble city, Guinness World Record for most white marble buildings)
  - Koytendag Nature Reserve (dinosaur footprints)
visa_policy: Tourist visa required for most countries, e-visa available for some nationalities
tourist_arrivals_2023: ~15000 (limited due to strict visa rules)
accommodation: Limited international hotel chains in Ashgabat