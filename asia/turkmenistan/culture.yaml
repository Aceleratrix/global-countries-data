national_holidays:
  - Independence Day (October 27)
  - Neutrality Day (December 12)
  - Nowruz (Persian New Year, March 21)
traditional_cuisine:
  - Plov (rice pilaf)
  - Shashlik (grilled meat skewers)
  - Dograma (bread and meat stew)
traditional_arts:
  - Turkmen carpet weaving (UNESCO intangible heritage)
  - Ak halteke horse breeding (national symbol)
  - Poetry (Makhtumkuli Feraghi, national poet)
religion_practices: Sunni Islam with local traditions