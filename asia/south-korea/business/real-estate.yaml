    basis: "Assessed value"
    rate_range: "0.1% - 5% annually"
    collected_by: "Municipalities"
  
  - name: "Acquisition Tax (취득세)"
    applies_to: "Property purchases"
    rate_range: "1% - 12% (depends on property value)"
