# South Korea Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: south-korea
last_updated: "2024-12-15"
calling_code: "+82"
international_prefix: "001"
emergency_numbers:
  police: 112
  ambulance: 119
  fire: 119

# Phone Number Format
phone_format:
  general_pattern: "+82 XX-XXX-XXXX"
  country_code: "82"
  national_prefix: "0 (for domestic calls)"
  regex_national: "^0[1-6][0-9]{3,4}-?[0-9]{4}$"
  regex_international: "^\\+82[1-6][0-9]{7,8}$"
  example_national: "02-1234-5678"
  example_international: "+82 2-1234-5678"
  total_length_national: 9-11
  notes: "Seoul numbers start with 02, mobile starts with 010"

# Area Codes by Region (2024)
area_codes:
  - region: "Seoul"
    codes: ["02"]
    type: "Metropolitan"
    population: 9500000
  
  - region: "Incheon & Gyeonggi"
    codes: ["031", "032"]
    type: "Metropolitan area"
    population: 26000000
  
  - region: "Busan"
    codes: ["051"]
    type: "Metropolitan city"
    population: 3300000
  
  - region: "Daegu"
    codes: ["053"]
    type: "Metropolitan city"
    population: 2400000
  
  - region: "Gwangju"
    codes: ["062"]
    type: "Metropolitan city"
    population: 1400000
  
  - region: "Daejeon"
    codes: ["042"]
    type: "Metropolitan city"
    population: 1500000
  
  - region: "Ulsan"
    codes: ["052"]
    type: "Metropolitan city"
    population: 1100000
  
  - region: "Gyeongsang (North/South)"
    codes: ["053", "054", "055"]
    type: "Province"
  
  - region: "Jeolla (North/South)"
    codes: ["061", "063"]
    type: "Province"
  
  - region: "Chungcheong (North/South)"
    codes: ["041", "043"]
    type: "Province"
  
  - region: "Gangwon"
    codes: ["033"]
    type: "Province"
  
  - region: "Jeju"
    codes: ["064"]
    type: "Island province"

# Mobile Numbers
mobile:
  prefixes: ["010", "011", "016", "017", "018", "019"]
  format: "010-XXXX-XXXX"
  example: "010-1234-5678"
  penetration_percent: 125
  notes: "Multiple phones per person common, 010 is standard"

# Landline Numbers
landline:
  prefixes: ["02", "031-064"]
  format: "0XX-XXX-XXXX"
  notes: "Declining rapidly, replaced by mobile"

# Toll-Free & Special Numbers
special_numbers:
  - type: "Toll-free"
    prefixes: ["080", "1588", "1544"]
    format: "080-XXX-XXXX"
    cost: "Free for caller"
    notes: "Used by businesses and customer service"
  
  - type: "Premium rate"
    prefixes: ["060"]
    cost: "₩300-₩5000 per minute"
    regulation: "KCC oversight"
  
  - type: "Emergency"
    number: "112 (Police), 119 (Fire/Ambulance)"
    description: "Unified emergency services"
  
  - type: "Government Services"
    numbers: ["110 (Civil Service)", "120 (Seoul City)"]
    description: "Public sector hotlines"

