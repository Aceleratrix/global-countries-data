  regulator: "Financial Services Commission (FSC)"
  supervisor: "Financial Supervisory Service (FSS)"
  deposit_guarantee: "₩50 million per depositor (KDIC)"
  official_url: "https://www.fsc.go.kr"
  kdic_url: "https://www.kdic.or.kr"

