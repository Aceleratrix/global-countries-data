# Cryptocurrency Regulations
cryptocurrency:
  legal_status: "Legal (Virtual Asset Service Providers)"
  regulator: "FSC (Financial Services Commission)"
  registration_required: true
  reporting: "VASP reporting requirements (travel rule)"
  tax: "Subject to 20% capital gains tax (over ₩2.5M profit)"
  vat: "Not subject to VAT"
  major_exchanges: ["Upbit", "Bithumb", "Coinone", "Korbit"]
  notes: "Strict regulation since 2021, real-name verification mandatory"

# Invoicing Requirements
invoicing:
  mandatory_fields:
    - "Invoice number and date"
    - "Supplier and customer tax IDs"
    - "Description of goods/services"
    - "VAT amount (if applicable)"
    - "Total amount including VAT"
  electronic_invoicing:
    b2g_required: true
    b2b_optional: true
    system: "e-Tax Invoice (mandatory for B2G)"
  retention: "5 years"
  official_url: "https://www.etax.go.kr"
