# Payment Methods (by transaction volume, 2024)
payment_methods:
  - method: "Credit/Debit Cards"
    market_share: 55
    major_providers: ["BC Card", "Shinhan Card", "Samsung Card", "KB Kookmin Card"]
    contactless_limit_krw: 50000
    notes: "Widely used, tokenization common"
  
  - method: "Bank Transfers (Real-time)"
    market_share: 25
    system: "FasTonet (RTGS system)"
    notes: "Instant 24/7, max ₩1 billion per transaction"
  
  - method: "KakaoPay"
    market_share: 15
    type: "Mobile payment (Kakao ecosystem)"
    users_millions: 40
    max_transfer_krw: 2000000
    notes: "Integrated with KakaoTalk messenger"
    website: "https://www.kakaopay.com"
  
  - method: "Naver Pay"
    market_share: 8
    type: "Mobile payment (Naver ecosystem)"
    users_millions: 28
    notes: "Integrated with Naver services"
    website: "https://pay.naver.com"
  
  - method: "Cash"
    market_share: 2
    notes: "Declining rapidly"

# Payment APIs & Open Banking
open_banking:
  launched: 2021
  regulation: "Enforcement Decree of Electronic Financial Transactions Act"
  major_aggregators:
    - name: "Korea Open Banking"
      coverage: "All major banks"
      api_url: "https://openbanking.or.kr"
    - name: "Plaid (Korea)"
      coverage: "Selected banks"
  
  instant_payment_scheme: "FasTonet (real-time gross settlement)"
  notes: "Open banking mandated for all financial institutions"

# IBAN & SWIFT
iban:
  format: "Not used (Korea uses account number system)"
  swift_codes: "8-11 characters, e.g., KOBOKRSE (KB Kookmin)"
  account_format: "Bank code (3) + Branch code (4) + Account number (6-14)"
  example: "011-1234-56789012"

