key_events:
  - 1920: Lebanon created as a French League of Nations mandate
  - 1943: Independence from France
  - 1975-1990: Lebanese Civil War
  - 2005: Assassination of Prime Minister Rafic Hariri, Cedar Revolution
  - 2006: Israel-Hezbollah War
  - 2020: Beirut port explosion
  - 2023: Economic crisis continues, currency collapse