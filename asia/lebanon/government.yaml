official_name: Lebanese Republic
government_type: Parliamentary republic
head_of_state: President (currently vacant as of 2024)
head_of_government: Prime Minister (Najib Mikati, as of 2024)
legislature:
  name: Parliament of Lebanon
  type: Unicameral
  seats: 128 (equal Christian and Muslim representation)
administrative_divisions:
  - 8 governorates (Beirut, Mount Lebanon, North, South, Beqaa, Nabatieh, Akkar, Baalbek-Hermel)
independence_date: 1943-11-22 (from France)
constitution_year: 1926 (amended multiple times)