key_events:
  - 1947: Partition of British India, Bangladesh becomes East Pakistan
  - 1952: Bengali Language Movement
  - 1970: General election victory for Awami League, denied by West Pakistan
  - 1971-03-26: Declaration of independence
  - 1971-12-16: Victory Day, independence recognized
  - 1972: Constitution adopted
  - 1975: Assassination of Sheikh Mujibur Rahman
  - 1991: Return to parliamentary democracy
  - 2010s: Rapid economic growth, textile industry expansion