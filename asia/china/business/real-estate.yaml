## Hukou System (Household Registration)
hukou:
  description: "Household registration system limiting access to services"
  types:
    - "Urban Hukou (城市户口) - access to education, healthcare"
    - "Rural Hukou (农村户口) - land rights in hometown"
    
  real_estate_impact:
    - "Non-local hukou buyers face restrictions in Tier 1 cities"
    - "5 years social insurance required (Beijing, Shanghai, Shenzhen)"
    - "Hukou reform ongoing (some cities relaxing rules)"

## Legal Framework
legal:
  property_ownership:
    - "Residential: 70-year land use right (not freehold)"
    - "Commercial: 40-year land use right"
    - "Industrial: 50-year land use right"
    - "Land owned by state, citizens get 'use rights'"
    
  foreign_ownership:
    - "Foreigner can buy (1 home for personal use, no PR required)"
    - "Companies can buy (WFOE, JV, etc.)"
    - "No restrictions on selling after 3 years"
    
  transaction_costs_percent: 5-10
  breakdown:
    deed_tax: 1-3  # buyer pays
    VAT: 5.3  # seller pays (if <2 years holding)
    income_tax: 1-2  # seller pays (20% if itemized)
    other_fees: 0.5-1

