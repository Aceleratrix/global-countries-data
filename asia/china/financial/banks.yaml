# Banks & Payment Systems - China

## Central Bank
central_bank:
  name: "People's Bank of China (PBOC - 中国人民银行)"
  website: "https://www.pbc.gov.cn"
  role: "Monetary policy, currency issuance, financial regulation"
  governor: "Pan Gongsheng (2023-present)"

## Big 4 State-Owned Banks (四大行)
big4_banks:
  - name: "Industrial and Commercial Bank of China (ICBC - 中国工商银行)"
    assets_usd: 6_100_000_000_000  # largest bank globally
    market_share: 15.2
    branches: 17_000+
    digital: "ICBC Mobile Banking (600M+ users)"
    
  - name: "China Construction Bank (CCB - 中国建设银行)"
    assets_usd: 5_300_000_000_000
    market_share: 13.1
    branches: 14_000+
    digital: "CCB Mobile Banking (450M+ users)"
    
  - name: "Agricultural Bank of China (ABC - 中国农业银行)"
    assets_usd: 4_800_000_000_000
    market_share: 12.0
    branches: 23_000+  # most branches
    digital: "ABC Mobile Banking (420M+ users)"
    
  - name: "Bank of China (BOC - 中国银行)"
    assets_usd: 4_300_000_000_000
    market_share: 10.8
    branches: 11_000+
    digital: "BOC Mobile Banking (380M+ users)"
    note: "Strongest international presence"

## Major Commercial Banks (股份制商业银行)
commercial_banks:
  - name: "Bank of Communications (BoCom - 交通银行)"
    assets_usd: 1_800_000_000_000
  - name: "China Merchants Bank (CMB - 招商银行)"
