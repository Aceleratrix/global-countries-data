## Payment Systems (支付系统)
digital_payments:
  adoption_rate: 90  # percentage of population
  annual_volume_usd: 50_000_000_000_000  # $50 trillion
  
  major_providers:
    - name: "WeChat Pay (微信支付 - Tenpay)"
      users: 1_300_000_000
      market_share: 40
      parent: "Tencent Holdings"
      use_cases: "P2P, e-commerce, offline QR, gov services"
      
    - name: "Alipay (支付宝)"
      users: 1_200_000_000
      market_share: 38
      parent: "Ant Group (Alibaba)"
      use_cases: "E-commerce, P2P, wealth management, credit"
      
    - name: "UnionPay (银联)"
      users: 1_000_000_000
      market_share: 20
      role: "Card network (like Visa/Mastercard)"
      cards_issued: 9_000_000_000
      
    - name: "Digital Yuan (e-CNY - 数字人民币)"
      status: "Pilot phase (2020-2026)"
      pilot_cities: 23
      wallet_users: 300_000_000  # estimated
      app: "e-CNY App (official PBOC wallet)"
      note: "Central Bank Digital Currency (CBDC) - first major economy to launch"

## Payment Methods Acceptance
payment_method_acceptance:
  qr_code_payments: 98  # percentage of merchants (WeChat Pay + Alipay)
  unionpay_cards: 85
  cash: 15  # rapidly declining
  digital_yuan: 30  # in pilot cities
  credit_cards_foreign: 2  # Visa/Mastercard limited acceptance

## E-commerce Payment Preferences
ecommerce_payments：
  - method: "Alipay"
    share: 52
  - method: "WeChat Pay"
    share: 40
  - method: "UnionPay"
    share: 6
  - method: "Cash on Delivery"
    share: 2

## Cross-Border Payments
cross_border_systems:
  - name: "CIPS (Cross-Border Interbank Payment System - 人民币跨境支付系统)"
    launched: 2015
    participants: 1_400+  # banks in 110+ countries
    purpose: "RMB internationalization, alternative to SWIFT"
    
  - name: "SWIFT"
    role: "Still used for USD/EUR transactions"
    note: "China has own messaging system (CIPS) reducing SWIFT dependency"
    
  - name: "WeChat Pay Cross-Border"
    coverage: "60+ countries/regions"
    use: "Chinese tourists shopping abroad"
    
  - name: "Alipay Global"
    coverage: "80+ countries/regions"
    use: "Outbound tourism, cross-border e-commerce"

## Banking Regulations
regulator: "National Financial Regulatory Administration (NFRA - 国家金融监督管理总局)"
website: "https://www.cbrc.gov.cn"
former_name: "CBRC (China Banking Regulatory Commission)"

key_regulations:
  - "All banks must have PBOC approval"
  - "Foreign banks require special license (limited branches)"
  - "Internet banking license required (BigTech: Ant, Tencent, etc.)"
  - "Ant Group restructuring (2021-2023) - now financial holding company"

## Fintech & Digital Banking
fintech_leaders:
  - name: "Ant Group (Alibaba affiliate)"
    products: "Alipay, Yu'e Bao (money market fund), Zhima Credit (Sesame Credit)"
    users: 1_300_000_000
  - name: "Tencent Financial (WeChat Pay, WeBank)"
    products: "WeChat Pay, WeBank (online bank), microloans"
    users: 1_200_000_000
  - name: "JD Digits (JD.com)"
    products: "JD Pay, supply chain finance"
  - name: "Du Xiaoman (Baidu)"
    products: "Consumer finance, wealth management"

## Credit System (征信系统)
credit_reporting:
  authority: "People's Bank of China Credit Reference Center (PBOC CRC)"
  coverage: "1_100_000_000+ individuals, 60M+ enterprises"
  
  private_credit:
    - name: "Zhima Credit (Sesame Credit - 芝麻信用)"
      parent: "Ant Group"
      score_range: "350-950"
      use: "Ant Group ecosystem (Alipay, bike sharing, hotels)"
    - name: "Tencent Credit (腾讯信用)"
      parent: "Tencent"
      status: "Limited rollout"

