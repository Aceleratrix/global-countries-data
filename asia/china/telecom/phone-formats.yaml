# Phone & Telecom Formats - China

## Country Code
country_calling_code: "+86"
international_prefix: "00"
trunk_prefix: "0"
e164_format: true

## Mobile Phone Format
mobile_format:
  pattern: "+86 1XX XXXX XXXX"
  length: 11  # digits after country code
  example: "+86 138 1234 5678"
  regex: "^(\\+86)?1[3-9]\\d{9}$"
  
mobile_prefixes:
  china_mobile:
    prefixes: ["134", "135", "136", "137", "138", "139", "147", "150", "151", "152", "157", "158", "159", "178", "182", "183", "184", "187", "188", "198"]
    market_share: 58
  china_unicom:
    prefixes: ["130", "131", "132", "145", "155", "156", "166", "175", "176", "185", "186", "196"]
    market_share: 19
  china_telecom:
    prefixes: ["133", "149", "153", "173", "177", "180", "181", "189", "191", "199"]
    market_share: 23

## Landline Format
landline_format:
  pattern: "+86 (area_code) XXXX XXXX"
  area_code_length: 2-4  # varies by city size
  local_number_length: 7-8
  example: "+86 10 1234 5678"  # Beijing
  regex: "^(\\+86)?0?\\d{2,4}\\d{7,8}$"
  
major_city_codes:
  beijing: "10"
  shanghai: "21"
  guangzhou: "20"
  shenzhen: "755"
  tianjin: "22"
  chongqing: "23"
  hangzhou: "571"
  nanjing: "25"
  chengdu: "28"
  wuhan: "27"

## Toll-Free Numbers
toll_free:
  prefixes: ["400", "800"]
  format: "+86 400 XXX XXXX"
  note: "400 numbers are shared-cost (caller pays local rate)"
  availability: "Available to businesses via telecom operators"

