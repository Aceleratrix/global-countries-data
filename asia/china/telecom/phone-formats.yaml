## Phone Number Portability
number_portability:
  available: true
  introduced: "2019-12-01"
  process: "Via carrier app or service hall"
  timeline: "1-2 business days"

## Virtual Phone Numbers
voip_numbers:
  availability: "Limited, requires real-name registration"
  wechat_phone: "Virtual number linked to WeChat account"
  dingtalk_phone: "Enterprise virtual numbers via Alibaba"

