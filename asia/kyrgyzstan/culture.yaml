country: Kyrgyzstan
official_languages:
  - Kyrgyz
  - Russian
religions:
  - Islam (Sunni): 90%
  - Christianity (Russian Orthodox): 7%
  - Others: 3%
traditional_music: Komuz (three-stringed lute), Manas Epic (UNESCO Intangible Cultural Heritage)
cuisine: Beshbarmak, plov, lagman, kymyz (fermented mare's milk)
national_holidays:
  - Independence Day: August 31
  - Nooruz: March 21