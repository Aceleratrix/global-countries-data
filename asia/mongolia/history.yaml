key_events:
  - "1206: Genghis Khan unites Mongol tribes, establishes Mongol Empire"
  - "1271: Kublai Khan establishes Yuan Dynasty in China"
  - "1368: Yuan Dynasty collapses, Mongol tribes return to Mongolia"
  - "1691: Outer Mongolia becomes a Qing Dynasty protectorate"
  - "1911: Mongolia declares independence from Qing China"
  - "1921: Mongolian Revolution establishes a socialist state"
  - "1924: Mongolian People's Republic founded"
  - "1990: Democratic revolution ends socialist rule, transitions to democracy"
  - "1992: New constitution adopted, renaming to Mongolia"