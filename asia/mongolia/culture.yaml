official_language: "Mongolian (Khalkha dialect)"
writing_system: "Mongolian script (traditional), Cyrillic (official)"
national_symbols:
  - "Flag: Three vertical stripes (red, blue, red) with the Soyombo symbol on the left red stripe"
  - "Emblem: Soyombo symbol surrounded by wheat and a circular border"
  - "National animal: Przewalski's horse"
  - "National flower: Scabiosa comosa"
traditional_clothing: "Deel (long, loose robe worn by men and women)"
traditional_sports: "Mongolian wrestling (Bökh), Horse racing, Archery (the Three Manly Games of Mongolia)"
cuisine: "Dairy products (airag, tarag), meat (mutton, beef), buuz (steamed dumplings), khuushuur (fried meat pies)"