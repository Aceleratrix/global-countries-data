# Tax Incentives for AI/Tech (Japan)
tax_incentives_japan:
  - name: "R&D Tax Credit (Sogo Tokutei Jigyo)"
    credit_rate_percent: 20.0  # For "Innovative R&D" (AI qualifies!)
    applies_to: ["Kabushiki Kaisha (KK)", "Godo Kaisha (GK)"]
    ai_ml_eligible: true
    use_cases: ["Software development", "AI model training", "Algorithm development", "Robotics R&D"]
    tokyo_tech_companies_claiming: ["Sony AI", "Preferred Networks", "Rakuten AI"]
    
  - name: "IT Investment Promotion Tax Credit"
    rate_percent: 5.0  # Of investment amount
    applies_to: "AI infrastructure (servers, GPUs), software licenses"
    
  - name: "Software Development Deduction"
    rate_percent: 10.0  # Of development expenses
    applies_to: "Custom AI software, SaaS development"
    
  - name: "Open Innovation Promotion"
    rate_percent: 20.0  # Of collaborative R&D expenses
    applies_to: "AI research with RIKEN, University of Tokyo, etc."

