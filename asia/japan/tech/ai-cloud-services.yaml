# NLP Services Available in Japan
nlp_services_japan:
  - provider: "Google Cloud Natural Language (Tokyo)"
    features: ["Sentiment analysis", "Entities", "Syntax", "Classification"]
    language_support: ["ja-JP (Japanese - BEST!)", "en-US", 50+ languages]
    api: "https://cloud.google.com/natural-language"
    pricing: "$1 per 1000 units"
    japanese_advantage: "Google's Japanese NLP is industry-leading"
    
  - provider: "AWS Comprehend (Tokyo)"
    features: ["Text analysis", "Entity extraction", "PII detection"]
    language_support: ["en-US", "ja-JP (limited)", 12+ languages]
    api: "https://aws.amazon.com/comprehend/"
    pricing: "$0.0001 per unit"
    
  - provider: "Azure Text Analytics (Tokyo)"
    features: ["Sentiment analysis", "Key phrase extraction", "PII"]
    language_support: ["en-US", "ja-JP (good)", 20+ languages]
    api: "https://azure.microsoft.com/ja-jp/products/ai-services/text-analytics/"
    
  - provider: "OpenAI GPT-4/3.5 API"
    features: ["Advanced reasoning", "Summarization", "Classification", "Extraction"]
    language_support: ["en-US", "ja-JP (very good)", 50+ languages]
    api: "https://platform.openai.com/docs"
    pricing: "$5/1M input tokens (GPT-4o)"
    japanese_performance: "Excellent - GPT-4o handles Japanese kanji/hiragana/katakana well"
    
  - provider: "Line Clova (Line app)"
    features: ["Japanese chatbot", "Voice recognition (Japanese)", "Smart speaker"]
    language_support: ["ja-JP ONLY (best in Japanese!)"]
    api: "https://clova.line.me/" (Korean company, strong in Japan)
    note: "Line's AI - dominant in Japanese messaging"

