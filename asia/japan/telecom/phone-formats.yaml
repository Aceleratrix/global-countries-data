      regions: ["asia-northeast1 (Tokyo)", "asia-northeast2 (Osaka)"]
      launch: [2016, 2022]
      services: 150+
      
    - name: "Microsoft Azure"
      regions: ["Japan East (Tokyo)", "Japan West (Osaka)"]
      launch: [2014, 2019]
      services: 180+
      
    - name: "Oracle Cloud"
      regions: ["Japan East (Tokyo)"]
      launch: [2020]
      services: 100+
      
# Unique Japanese Addressing Challenges for AI
addressing_challenges:
  - challenge: "Addresses written in Japanese kanji/hiragana/katakana"
    ai_solution: "Must support Japanese OCR + geocoding APIs"
    
  - challenge: "No street names in traditional sense (block-based addressing)"
    ai_solution: "Requires specialized Japanese geocoding (Google Maps API Japan)"
    
  - challenge: "Building numbers not sequential (based on registration order)"
    ai_solution: "Cannot infer neighbor's address from number"
    
  - challenge: "Multiple languages (ja-JP, en-US, sometimes zh-CN)"
    ai_solution: "Dual-language address parsing required"
    
  - challenge: "Postal code (〒) must be in specific format"
    ai_solution: "Validate NNN-NNNN format before submission"
    
  geocoding_apis:
    - "Google Maps API (supports Japanese addresses)"
    - "Mapbox API (supports Japanese)"
    - "Yahoo Japan Local API (most accurate for Japan)"
    - "Zenrin API (Japanese mapping company)"

# AI Agent Implications
ai_agent_implications:
  - "Phone validation: +81 + 10 digits (mobile) or 9 digits (landline)"
  - "Postal code: 〒NNN-NNNN format (Japanese postal mark!)"
  - "Address parsing: Prefecture → City → District → House Number"
  - "Time zone: UTC+9, NO daylight saving time (unlike US!)"
  - "Fiber internet: 98% coverage (best in G7) - ideal for cloud AI"
  - "Single time zone: no DST transitions to handle"
  - "Japanese language support required (kanji/hiragana/katakana)"
