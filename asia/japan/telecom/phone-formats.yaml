# Time Zone (Single Zone)
time_zones:
  - name: "Japan Standard Time (JST)"
    standard: "UTC+9"
    daylight_saving: false  # Japan does NOT observe DST!
    note: "Whole country uses single time zone (unlike US/Europe)"
    ai_implications: "No DST transitions to handle (unlike US/EU)"
    
  comparison:
    us_silicon_valley: "UTC-8 (PST) / UTC-7 (PDT)"
    brazil_sao_paulo: "UTC-3"
    japan_tokyo: "UTC+9 (no DST)"
    
# Internet Infrastructure
internet_infrastructure:
  average_speed_mbps: 200.0  # Fiber broadband
  fiber_coverage_percent: 98.0  # Highest in G7!
  broadband_penetration_percent: 95.0
  
  isps:
    - name: "NTT Docomo"
      market_share_percent: 35.0
      fiber_available: true
      note: "Largest mobile carrier"
      
    - name: "au (KDDI)"
      market_share_percent: 30.0
      fiber_available: true
      
    - name: "SoftBank"
      market_share_percent: 25.0
      fiber_available: true
      note: "Also owns PayPay, Yahoo Japan"
      
    - name: "Rakuten Mobile"
      market_share_percent: 5.0
