notes: >
  O mercado imobiliário saudita está em forte expansão impulsionado pelo
  Vision 2030 e projetos gigantes como NEOM e Red Sea Global. Riade lidera
  preços residenciais, enquanto cidades secundárias oferecem boas
  oportunidades. A permissão de 100% de propriedade estrangeira desde
  2020 aumentou investimentos. O setor logístico cresce 20% ao ano
  devido ao e-commerce e NEOM supply chain demands.
