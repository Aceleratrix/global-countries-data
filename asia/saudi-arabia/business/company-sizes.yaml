# Arábia Saudita - Company Sizes (Negócios)
# Fonte: Ministry of Commerce, Monsha'at (SME Authority)

country: "Saudi Arabia"
iso_code: "SA"

classification:
  micro_enterprise:
    employees: "1-9"
    turnover: "< SAR 3M (~$800k)"
    balance_sheet: "< SAR 3M"
    examples: ["Freelancers", "Small shops", "Consultants"]
    count: 1200000  # 92% of all companies
    
  small_enterprise:
    employees: "10-49"
    turnover: "≤ SAR 15M (~$4M)"
    balance_sheet: "≤ SAR 15M"
    examples: ["Local manufacturers", "SMEs", "Tech startups"]
    count: 85000
    
  medium_enterprise:
    employees: "50-249"
    turnover: "≤ SAR 100M (~$26.6M)"
    balance_sheet: "≤ SAR 85M"
    examples: ["Regional companies", "Growing tech firms"]
    count: 12000
    
  large_enterprise:
    employees: "250+"
    turnover: "> SAR 100M"
    examples: ["Multinationals", "Major oil companies", "Saudi Aramco"]
    count: 2500

