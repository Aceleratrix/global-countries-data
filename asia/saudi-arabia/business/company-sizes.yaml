notes: >
  Arábia Saudita tem um tecido empresarial dominado por micro e pequenas
  empresas (99.4% das empresas são PMEs). O governo está fortemente
  apoiando startups via Monsha'at, com 2 unicórnios já estabelecidos.
  O desafio principal é o cumprimento das cotas de Saudização (Nitaqat),
  que exige até 70% de funcionários sauditas em algumas empresas.
  O país está se tornando um hub regional para tech startups no Oriente Médio.
