notes: >
  Arábia Saudita tem um dos mercados de marketing digital de mais rápido
  crescimento do mundo (28% YoY). Snapchat é líder em penetração (68%
  da população), seguido por Instagram e TikTok. O WhatsApp é onipresente
  (96% uso) e muitas campanhas usam WhatsApp Business API. O país tem
  uma população jovem (mediana 29.7 anos) que consome altas doses de
  conteúdo em vídeo (60% do marketing de conteúdo). Durante o Ramadan,
  o gasto com anúncios aumenta 40% em relação à média anual.
