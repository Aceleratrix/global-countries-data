notes: >
  Arábia Saudita tem uma população jovem (mediana 29.7 anos) com forte
  presença de trabalhadores expatriados (40.8% da população). O país
  está rapidamente se urbanizando (84.5% urbana), com Riade como a
  maior metrópole. O alto uso de smartphones (95%) e redes sociais
  (Snapchat líder) reflete uma população jovem e conectada. O
  desemprego entre sauditas é um desafio, com o programa Nitaqat
  buscando aumentar a empregabilidade local via Saudização.
