key_events:
  - year: 1616
    event: "Zhabdrung Ngawang Namgyal unifies Bhutan, establishes theocratic government"
  - year: 1907
    event: "Ugyen Wangchuck becomes first hereditary King (Druk Gyalpo)"
  - year: 1949
    event: "Treaty with India recognizes Bhutan's independence and special relationship"
  - year: 1971
    event: "Bhutan joins the United Nations"
  - year: 2006
    event: "King Jigme Singye Wangchuck abdicates, succeeded by Jigme Khesar Namgyel Wangchuck"
  - year: 2008
    event: "New constitution adopted, first democratic parliamentary elections held"
  - year: 2020
    event: "First COVID-19 cases reported, strict border controls implemented"
  - year: 2023
    event: "Continues focus on Gross National Happiness, sustainable development"
historical_notes: "Bhutan was never fully colonized; maintained independence through strategic diplomacy"