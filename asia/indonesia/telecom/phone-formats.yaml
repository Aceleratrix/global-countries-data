# Indonesia Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: indonesia
last_updated: "2024-12-15"
calling_code: "+62"
international_prefix: "001/008"
emergency_numbers:
  police: "110"
  fire: "113"
  ambulance: "118/119"
  general: "112"
  
# Phone Number Formats
phone_formats:
  landline:
    pattern: "+62 XX XXXX XXXX"
    digits: 10 to 12
    area_codes: ["21 (Jakarta)", "22 (Bandung)", "31 (Surabaya)", "61 (Makassar)"]
    example: "+62 21 1234 5678"
    regex: "^\\+62[2-9]\\d{7,10}$"
    
  mobile:
    pattern: "+62 8XX XXX XXX"
    digits: 10 to 13
    prefixes: ["0811", "0812", "0813", "0821", "0851", "0877", "0881"]
    example: "+62 812 3456 7890"
    regex: "^\\+628\\d{7,11}$"
    
  toll_free:
    pattern: "0800 XXX XXX"
    example: "0800 123 456"
    regex: "^0800\\d{6,9}$"
    
  premium_rate:
    pattern: "0809 XXX XXX"
    example: "0809 123 456"
    regex: "^0809\\d{6,9}$"
    
