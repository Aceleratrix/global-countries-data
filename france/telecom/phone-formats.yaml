# Phone & Telecom Formats - France#

## Country Code#
country_calling_code: "+33"
international_prefix: "00"
trunk_prefix: "0"
e164_format: true

## Mobile Phone Format#
mobile_format:
  pattern: "+33 6XX XXX XXX or +33 7XX XXX XXX"
  length: 9  # digits (after removing leading 0)
  example: "+33 612 345 678"
  regex: "^(\\+33)?[67]\\d{8}$"
  
mobile_prefixes:
  - prefix: "06XX"
    operators: ["Orange", "SFR", "Free", "Bouygues Telecom"]
    note: "Traditional mobile prefix (since 1990s)"
  - prefix: "07XX"
    operators: ["Orange", "SFR", "Free", "Bouygues Telecom"]
    note: "Newer prefix (2000s+), now equal to 06XX"

## Landline Format#
landline_format:
  pattern: "+33 X XX XX XX XX (area code 1-5 digits)"
  area_code_length: 1-2  # varies by region
  local_number_length: 8
  example: "+33 1 23 45 67 89"  # Paris
  regex: "^(\\+33)?[1-5]\\d{8}$"
  
major_city_codes:
  paris: "1"
  lyon: "4"
  marseille: "4"
  toulouse: "5"
  bordeaux: "5"
  lille: "3"
  nantes: "2"
  nice: "4"
  strasbourg: "3"

## Toll-Free Numbers#
toll_free:
  prefixes: ["0800", "0801", "0802", "0803", "0804", "0805"]
  format: "+33 800 XXX XXX"
  note: "Free to caller from landlines and mobiles"
  availability: "Available to businesses via telecom operators"

## Special Service Numbers#
emergency:
  police: "17"
  ambulance: "15"
  fire: "18"
  european_emergency: "112"  # universal in EU
  samu: "15"  # medical emergency
  poison_control: "01 40 05 48 48"  # Paris regional

