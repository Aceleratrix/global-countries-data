## Payment Systems (Revolutionary Growth!)
payment_systems:
  upi_unified_payments_interface:
    launched: 2016
    volume_monthly: 12_000_000_000  # 12 billion transactions!
    value_monthly_usd: 220_000_000_000
    growth: 50  # year-over-year percentage
    apps:
      - "PhonePe (45% market share)"
      - "Google Pay (35%)"
      - "Paytm (15%)"
      - "WhatsApp Pay (3%)"
      - "BHIM (gov app, 2%)"
    note: "World's largest real-time payment system (12B txns/month)"
    
  imps_immediate_payment_service:
    launched: 2010
    use: "Inter-bank instant transfers (mobile/online)"
    
  neft_national_electronic_funds_transfer:
    launched: 2005
    settlement: "Batch-wise (30-minute cycles, 6 AM-7 PM)"
    
  rtgs_real_time_gross_settlement:
    launched: 2004
    min_amount: "₹2 lakh (~$2,400)"
    use: "High-value, real-time settlement"
    
  ruPay_card:
    launched: 2014
    cards_issued: 800_000_000
    market_share: 60  # domestic debit cards
    international: "RuPay Global (accepted in 50+ countries)"

