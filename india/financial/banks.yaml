## Banking Regulations
regulator: "Reserve Bank of India (RBI)"
website: "https://www.rbi.org.in"

key_regulations:
  - "All banks require RBI license"
  - "Priority Sector Lending: 40% of loans to agriculture, MSME, etc."
  - "CRR (Cash Reserve Ratio): 4.5% (held with RBI)"
  - "SLR (Statutory Liquidity Ratio): 18% (gov securities)"
  - "NPA (Non-Performing Assets) norms: strict provisioning"
  - "Digital lending guidelines (2022): transparency, fair practices"

