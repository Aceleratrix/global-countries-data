## Compliance & Regulations
content_regulation:
  authority: "MEITY (Ministry of Electronics & IT)"
  rules:
    - "IT Act 2000, amended 2008 (intermediary guidelines)"
    - "Consumer Protection Act 2019 (misleading ads penalties)"
    - "Advertising Standards Council of India (ASCI) - self-regulation"
    - "Drugs & Magic Remedies Act (prohibits certain ads)"
    
  prohibited_content:
    - "False/misleading claims"
    - "Ads targeting children inappropriately"
    - "Tobacco/alcohol ads (restricted)"
    - "Political ads require pre-certification (Election Commission)"
    
  penalties:
    - "ASCI complaints: ad withdrawal, apology"
    - "Consumer court: compensation + fines"
    - "Criminal prosecution for serious violations"

