# Phone & Telecom Formats - India

## Country Code
country_calling_code: "+91"
international_prefix: "00"
trunk_prefix: "0"
e164_format: true

## Mobile Phone Format
mobile_format:
  pattern: "+91 XXXXX XXXXX"
  length: 10  # digits (after country code)
  example: "+91 98765 43210"
  regex: "^(\\+91)?[6-9]\\d{9}$"
  
mobile_prefixes:
  - series: "6XXXXXXXXX"
    operators: ["Jio", "Airtel", "Vi", "BSNL"]
  - series: "7XXXXXXXXX"
    operators: ["Jio", "Airtel", "Vi"]
  - series: "8XXXXXXXXX"
    operators: ["Jio", "Airtel", "Vi", "BSNL"]
  - series: "9XXXXXXXXX"
    operators: ["Airtel", "Vi", "Jio", "BSNL"]

## Landline Format
landline_format:
  pattern: "+91 (STD code) XXXXXXX"
  std_code_length: 2-4  # varies by city
  local_number_length: 5-8
  example: "+91 11 1234 5678"  # New Delhi
  regex: "^(\\+91)?0?\\d{2,4}\\d{5,8}$"
  
major_city_codes:
  mumbai: "22"
  delhi: "11"
  bangalore: "80"
  hyderabad: "40"
  chennai: "44"
  kolkata: "33"
  pune: "20"
  ahmedabad: "79"

## Toll-Free Numbers
toll_free:
  prefixes: ["1800", "1860"]
  format: "+91 1800 XXX XXXX"
  note: "1800 is free, 1860 is local call rate"
  availability: "Available to businesses via telecom operators"

## Special Service Numbers
emergency:
  police: "100"
  fire: "101"
  ambulance: "102"
  disaster_management: "108"
  womens_helpline: "1091"
  child_helpline: "1098"

