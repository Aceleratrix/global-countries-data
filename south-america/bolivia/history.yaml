key_events:
  - "300-1000 CE: Tiwanaku civilization flourishes in Altiplano"
  - "1532: Spanish conquest of Inca Empire reaches Bolivia"
  - "1545: Founding of Potosí, becomes world's largest silver mining center"
  - "1825-08-06: Independence declared, country named after Simón Bolívar"
  - "1879-1883: War of the Pacific, loses coastal territory to Chile"
  - "2009-02-07: New constitution establishes Plurinational State, recognizes indigenous autonomy"
  - "2023: Celebrates 198 years of independence"