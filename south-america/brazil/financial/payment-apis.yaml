description: "APIs bancárias, gateways e integrações para negócios digitais"

# APIs Bancárias Disponíveis (Open Banking Brasil)
open_banking:
  enabled: true
  regulation: "BACEN (Banco Central)"
  launch_date: "2021-02-08"
  phases: "Completo (Fase 4)"
  developer_portal: "https://openbankingbrasil.org.br"
  
  available_apis:
    - name: "Accounts"
      description_pt: "Consulta de contas e saldos"
      description_en: "Account and balance queries"
      endpoints: ["/accounts", "/accounts/{accountId}/balances"]
      
    - name: "Transactions"
      description_pt: "Histórico de transações"
      description_en: "Transaction history"
      endpoints: ["/accounts/{accountId}/transactions"]
      
    - name: "Payments"
      description_pt: "Iniciação de pagamentos (PIX)"
      description_en: "Payment initiation (PIX)"
      endpoints: ["/payments"]
      
    - name: "Credit Cards"
      description_pt: "Dados de cartões de crédito"
      description_en: "Credit card data"
      endpoints: ["/credit-cards"]
      
    - name: "Loans"
      description_pt: "Empréstimos e financiamentos"
      description_en: "Loans and financing"
      endpoints: ["/loans", "/financings"]

# APIs de Pagamento (PSPs - Payment Service Providers)
payment_apis:
  - provider: "PagSeguro"
    website_pt: "https://pagseguro.uol.com.br/developers"
    website_en: "https://dev.pagseguro.uol.com.br"
    api_type: "REST"
    auth: "Token"
    features_pt: ["PIX", "Boleto", "Cartão de Crédito", "Split de pagamento"]
    features_en: ["PIX", "Boleto", "Credit Card", "Payment split"]
    docs_pt: "https://dev.pagseguro.uol.com.br/docs"
    docs_en: "https://dev.pagseguro.uol.com.br/docs/en"
    sandbox: true
    webhook_events: ["transaction.created", "transaction.paid", "transaction.canceled"]
    
  - provider: "Mercado Pago"
    website_pt: "https://www.mercadopago.com.br/developers"
    website_en: "https://www.mercadopago.com/developers/en"
    api_type: "REST"
    auth: "OAuth2 / Access Token"
    features_pt: ["PIX", "Boleto", "Cartão", "Checkout Pro", "Assinatura"]
    features_en: ["PIX", "Boleto", "Credit Card", "Checkout Pro", "Subscription"]
    docs_pt: "https://www.mercadopago.com.br/developers/pt/reference"
    docs_en: "https://www.mercadopago.com.br/developers/en/reference"
    sandbox: true
    webhook_events: ["payment.created", "payment.updated"]
    
  - provider: "Stone"
    website: "https://stone.com.br/developers"
    api_type: "REST"
    auth: "API Key"
    features_pt: ["PIX", "Cartão", "Terminal inteligente", "Antifraude"]
    features_en: ["PIX", "Credit Card", "Smart POS", "Anti-fraud"]
    docs: "https://stone.com.br/docs"
    sandbox: true
    
  - provider: "Cielo"
    website: "https://developers.cielo.com.br"
    api_type: "REST"
    auth: "Client ID + Client Secret"
    features_pt: ["PIX", "Cartão", "Boleto", "QR Code"]
    features_en: ["PIX", "Credit Card", "Boleto", "QR Code"]
    docs: "https://developers.cielo.com.br/portal"
    sandbox: true

# Certificados Digitais (Obrigatórios para NF-e, e-CNPJ)
digital_certificates:
  types:
    - name: "e-CNPJ A1"
      description_pt: "Certificado digital para pessoa jurídica (arquivo)"
      description_en: "Digital certificate for legal entities (file-based)"
      validity_years: 1
      provider: "ICP-Brasil"
      cost_brl: 200.00
      use_cases_pt: ["NF-e", "eSocial", "EFD"]
      use_cases_en: ["NF-e", "eSocial", "EFD"]
      
    - name: "e-CNPJ A3"
      description_pt: "Certificado digital em token/smartcard"
      description_en: "Hardware-based digital certificate (token/smartcard)"
      validity_years: 3
      provider: "ICP-Brasil"
      cost_brl: 350.00
      
    - name: "NF-e Certificate"
      description_pt: "Certificado específico para Nota Fiscal Eletrônica"
      description_en: "Certificate specific for Electronic Invoice"
      validity_years: 1
      provider: "ICP-Brasil"
      
  providers:
    - "Serpro"
    - "Certisign"
    - "Serasa"
    - "AAT"

# Assinatura Eletrônica e Digital
electronic_signatures:
  - type: "ICP-Brasil"
    description_pt: "Padrão nacional de assinatura digital"
    description_en: "National standard for digital signatures"
    legal_validity: true
    equivalent_to: "Assinatura física / Physical signature"
    api_available: true
    
  - type: "DocuSign"
    description_pt: "Plataforma internacional de assinatura"
    description_en: "International e-signature platform"
    available_in_br: true
    api: "https://developers.docusign.com"
    
  - type: "Clicksign"
    description_pt: "Plataforma brasileira de assinatura eletrônica"
    description_en: "Brazilian e-signature platform"
    api: "https://clicksign.com/developers"
    features_pt: ["Livro de Ordem", "Evidências", "API REST"]
    features_en: ["Order Book", "Evidence", "REST API"]

