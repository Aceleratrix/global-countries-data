# Regulamentação de Comércio Eletrônico
ecommerce_regulation:
  law: "Lei 12.965/2014 (Marco Civil da Internet)"
  consumer_protection: "Código de Defesa do Consumidor (Lei 8.078/1990)"
  required_info_on_website_pt:
    - "CNPJ da empresa"
    - "Endereço completo"
    - "Canal de atendimento ao cliente"
    - "Política de Privacidade (LGPD)"
    - "Termos de Uso"
    - "Política de Reembolso/Troca"
  required_info_on_website_en:
    - "Company CNPJ"
    - "Full address"
    - "Customer service channel"
    - "Privacy Policy (LGPD)"
    - "Terms of Use"
    - "Refund/Exchange Policy"
    
  digital_invoicing_required: true
  invoice_type: "NF-e (modelo 55)"  # Para produtos
  service_invoice: "NFS-e"  # Para serviços
  
  taxes_on_online_sales:
    - tax: "ICMS"
      rate_percent: 18.0
      applies_to: "Produtos físicos / Physical products"
    - tax: "ISS"
      rate_percent: 5.0
      applies_to: "Serviços digitais / Digital services"
    - tax: "PIS/COFINS"
      rate_percent: 9.25
      applies_to: "Faturamento / Revenue"

# Proteção de Dados (LGPD)
lgpd:
  law: "Lei Geral de Proteção de Dados (Lei 13.709/2018)"
  equivalent: "GDPR (Europa)"
  effective_date: "2020-09-18"
  penalties_max_brl: 50000000  # R$ 50 milhões por infração
  penalties_max_usd: 10000000
  
  requirements_for_businesses_pt:
    - "Nomear um Encarregado (DPO)"
    - "Obter consentimento explícito para dados pessoais"
    - "Permitir exclusão de dados (direito ao esquecimento)"
    - "Notificar vazamentos em 72h"
    - "Realizar Impact Assessment (DPIA) para dados sensíveis"
  requirements_for_businesses_en:
    - "Appoint a Data Protection Officer (DPO)"
    - "Obtain explicit consent for personal data"
    - "Allow data deletion (right to be forgotten)"
    - "Notify breaches within 72h"
    - "Conduct DPIA for sensitive data"
    
  data_subject_rights_pt:
    - "Confirmação da existência de tratamento"
    - "Acesso aos dados"
    - "Correção de dados incompletos"
    - "Eliminação de dados"
    - "Portabilidade dos dados"
  data_subject_rights_en:
    - "Confirmation of processing"
    - "Data access"
    - "Correction of incomplete data"
    - "Data deletion"
    - "Data portability"

