key_traditions:
  - Guaraní heritage integration with Spanish colonial influence
  - Pynandi (traditional Guaraní barefoot tradition)
  - Jeguakava (traditional folk dance)
music:
  - Polka paraguaya (national dance)
  - Guarania (traditional music genre created by José Asunción Flores)
festivals:
  - Carnaval de Encarnación (February/March, major tourist event)
  - Día de la Independencia (May 14-15)
  - Virgen de Caacupé Festival (December 8)
cuisine:
  - Sopa paraguaya (cornbread-like dish, national dish)
  - Chipa (cheese bread made with cassava flour)
  - Mbeju (cassava pancake)
  - Tereré (cold herbal tea, national drink)