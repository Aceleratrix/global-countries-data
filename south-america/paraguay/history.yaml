timeline:
  - year: 1537
    event: Spanish found Asunción, becomes key colonial outpost
  - year: 1811
    event: Independence from Spain declared on May 14
  - year: 1864-1870
    event: Paraguayan War (War of the Triple Alliance) against Argentina, Brazil, Uruguay; loses 60% of population and 25% of territory
  - year: 1932-1935
    event: Chaco War against Bolivia; Paraguay gains control of most of the Chaco region
  - year: 1954-1989
    event: Dictatorship of Alfredo Stroessner
  - year: 1989
    event: Stroessner ousted in coup, transition to democracy begins
  - year: 2023
    event: Santiago Peña elected president