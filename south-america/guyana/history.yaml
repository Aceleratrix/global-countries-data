country: Guyana
key_historical_events:
  - 1616: Dutch establish first permanent settlement
  - 1796: British take control of Dutch colonies
  - 1814: British formally acquire Guyana (British Guiana)
  - 1966-05-26: Independence from United Kingdom
  - 1970-02-23: Becomes Co-operative Republic of Guyana
  - 2020: First major offshore oil production begins (Liza field)
colonial_history: British Guiana (1814-1966), previously Dutch colonies
independence_leader: Forbes Burnham (first Prime Minister)
