country: Palau
historical_timeline:
  - 1000 BCE: First human settlement by Austronesian peoples
  - 1783: First European contact (Spanish navigator Francisco Lázaro de Arruchaga)
  - 1885: Spain claims Palau
  - 1899: Spain sells Palau to Germany after Spanish-American War
  - 1914: Japan occupies Palau during WWI
  - 1920: Japan receives League of Nations mandate for Palau
  - 1944: US captures Palau from Japan during WWII
  - 1947: Palau becomes part of UN Trust Territory of the Pacific under US administration
  - 1994-10-01: Palau gains independence under Compact of Free Association with US
  - 2012: Rock Islands Southern Lagoon designated UNESCO World Heritage Site