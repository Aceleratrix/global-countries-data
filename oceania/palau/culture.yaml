country: Palau
national_symbols:
  flag: Light blue with a yellow disk off-center toward the hoist, containing a profile of a traditional Palauan hut (bai)
  anthem: "Belau rekid" (Our Palau)
  bird: Palau fruit dove
  flower: Plumeria (frangipani)
traditional_practices:
  - Matrilineal clan system
  - Bai (traditional meeting houses) central to community life
  - respect for elders and traditional chiefs
cuisine:
  - Staple foods: taro, cassava, fish, pork
  - Traditional dishes: "tama" (taro pudding), "ukel" (fermented fish)
  - Imported foods common due to limited agriculture