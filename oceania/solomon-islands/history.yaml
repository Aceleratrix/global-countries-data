country: Solomon Islands
timeline:
  - year: 1568
    event: Spanish explorer Álvaro de Mendaña becomes first European to sight the islands
  - year: 1893
    event: British protectorate established over southern Solomon Islands
  - year: 1942-1943
    event: Major battles of the Pacific Theatre of WWII (Guadalcanal Campaign)
  - year: 1978
    event: Independence from the United Kingdom on 7 July
  - year: 1998-2003
    event: Ethnic tensions and civil unrest, Regional Assistance Mission to Solomon Islands (RAMSI) deployed in 2003
  - year: 2023
    event: Jeremiah Manele elected as Prime Minister