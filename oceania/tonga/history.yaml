key_events:
  - 950: First settlement by Polynesians
  - 1845: Unification of Tonga under King George Tupou I
  - 1875: Adoption of first constitution
  - 1900: Became British protectorate
  - 1970: Gained independence from UK
  - 2006: Pro-democracy riots in Nuku'alofa
  - 2010: First elections under new democratic reforms
  - 2022: Cyclone Ian causes widespread damage