pre_colonial:
  - Inhabited by Melanesians for over 40,000 years
  - Early trade networks with Southeast Asia (spices, shells)
  - Diverse societies with over 800 distinct language groups
colonial_era:
  - 1884: Divided into German New Guinea (north) and British New Guinea (south)
  - 1906: British New Guinea transferred to Australia as Territory of Papua
  - 1920: German New Guinea becomes League of Nations mandate under Australian administration
  - 1949: Papua and New Guinea merged into single Australian territory
  - 1942-1945: Occupied by Japanese forces during WWII; major battles (Kokoda Track)
independence:
  - September 16, 1975: Gained independence as Independent State of Papua New Guinea
  - Became UN member on October 10, 1975
post_independence:
  - 1988-1998: Bougainville Civil War (over mining rights); ~20,000 deaths
  - 2001: Bougainville Peace Agreement; autonomous region established
  - 2019: James Marape becomes Prime Minister after political transition
  - Current focus: Resource governance, rural development, climate change adaptation