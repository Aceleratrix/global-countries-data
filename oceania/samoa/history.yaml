timeline:
  - year: "1000 BCE"
    event: "First Polynesian settlements arrive in Samoa"
  - year: "1722"
    event: "Dutch explorer Jacob Roggeveen becomes first European to sight Samoa"
  - year: "1830s"
    event: "Christian missionaries arrive, converting the population"
  - year: "1899"
    event: "Tripartite Convention: Western Samoa becomes German colony, Eastern Samoa becomes US territory"
  - year: "1914"
    event: "New Zealand occupies Western Samoa during WWI"
  - year: "1920"
    event: "League of Nations mandates Western Samoa to New Zealand"
  - year: "1962-01-01"
    event: "Western Samoa gains independence from New Zealand"
  - year: "1997"
    event: "Name changed from Western Samoa to Samoa"
  - year: "2011"
    event: "Samoa skips a day (December 30) to move from UTC-11 to UTC+13, aligning with Australia and New Zealand time zones"