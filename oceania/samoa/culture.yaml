cultural_practices:
  - "Fa'a Samoa (the Samoan way): a communal social structure centered on extended families (aiga)"
  - "Tatau (traditional tattooing) for men (pe'a) and women (malu)"
  - "Siva (traditional dance) performed at ceremonies"
  - "Kava ceremony (fagogo) for important gatherings"
traditional_foods:
  - "Palusami (coconut cream baked in taro leaves)"
  - "Oka (raw fish marinated in lime and coconut cream)"
  - "Taro, breadfruit, bananas as staple foods"
world_heritage_sites:
  - "None currently (as of 2024)"