# Australia Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: australia
last_updated: "2024-12-15"
calling_code: "+61"
international_prefix: "0011"
emergency_numbers:
  police: "000"
  fire: "000"
  ambulance: "000"
  triple_zero: true
  preferred: "000"
  
# Phone Number Formats
phone_formats:
  landline:
    pattern: "+61 X XXXX XXXX"
    digits: 9
    area_codes: ["02 (NSW/ACT)", "03 (VIC/TAS)", "07 (QLD)", "08 (SA/WA/NT)", "04 (Mobile)"]
    example: "+61 2 1234 5678"
    regex: "^\\+61[2-478]\\d{8}$"
    
  mobile:
    pattern: "+61 4XX XXX XXX"
    digits: 9
    prefixes: ["04", "05"]
    example: "+61 412 345 678"
    regex: "^\\+614\\d{8}$"
    
  toll_free:
    pattern: "1800 XXX XXX"
    example: "1800 123 456"
    regex: "^1800\\d{6}$"
    
  premium_rate:
    pattern: "190X XXX XXX"
    example: "1900 123 456"
    regex: "^190\\d\\d{6}$"
    
