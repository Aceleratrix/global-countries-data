national_anthem: "Yumi, Yumi, Yumi" (We, We, We)
national_symbols:
  - Flag: Red (top and bottom), green (middle), black triangle with yellow borders containing a pig tusk and fern frond
  - Emblem: Pig tusk encircled by fern fronds
traditional_dances:
  - Rom dance (Tanna island)
  - Grade-taking ceremonies
cuisine:
  - Lap lap (grated yam/cassava cooked in coconut milk)
  - Coconut-based dishes
  - Taro, yam, sweet potato
  - Fresh seafood
public_holidays:
  - Independence Day: July 30
  - New Year's Day: January 1
  - Labour Day: May 1
  - Christmas Day: December 25