timeline:
  - "Pre-16th century: Inhabited by Micronesian peoples"
  - "1526: First European contact (Alonso de Salazar)"
  - "1885: Annexed by Germany"
  - "1914: Occupied by Japan during WWI"
  - "1944: Captured by US forces during WWII"
  - "1947: Became US-administered Trust Territory of the Pacific Islands"
  - "1946-1958: 67 US nuclear tests conducted"
  - "1979: Adopted constitution"
  - "1986: Independence under Compact of Free Association"
  - "1991: Admitted to UN"
  - "2023: Compact of Free Association renewed for 20 years"