## Banking Regulations
regulator: "Financial Conduct Authority (FCA - 金融行为监管局)"
website: "https://www.fca.org.uk"

key_regulations:
  - "All banks need FCA authorization + PRA (Prudential Regulation Authority) approval"
  - "Capital Requirements: CRR (Capital Requirements Regulation) retained post-Brexit"
  - "Deposit Protection: FSCS (Financial Services Compensation Scheme) - £85K protection"
  - "Open Banking: MANDATORY under PSD2 (600+ providers authorized)"
  - "Cryptoassets: FCA registration required (anti-money laundering)"

## Cryptocurrency & Digital Assets
crypto_assets:
  regulation: "FCA cryptoasset registration (AML/CTF)"
  ban: "No ban, but tight restrictions (no advertising without FCA approval)"
  stablecoins: "Discussions on GBP-backed stablecoins (BoE exploring CBDC)"
  
 cbd_c_uk:  # Central Bank Digital Currency
    status: "Research phase (BoE exploring 'digital pound')"
    timeline: "Possible launch 2025-2030 (not confirmed)"
    name: "Digital Pound (nickname: 'Britcoin' - informal)"

