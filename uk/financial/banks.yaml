## Payment Systems
payment_systems:
  faster_payments:
    launched: 2008
    volume_annual: 3_200_000_000  # 3.2B transactions
    value_annual_gbp: 3_800_000_000_000  # £3.8T
    limit: "£1M per transaction"
    availability: "24/7/365 (real-time)"
    use: "Bank transfers, P2P, bill payments (dominant)"
    
  bac:  # Bankers' Automated Clearing Services
    launched: 1968
    use: "Salaries, direct debits, standing orders"
    timeline: "3 working days (being replaced by Faster Payments)"
    
  chaps:  # Clearing House Automated Payment System
    launched: 1984
    limit: "No limit (high-value, same-day)"
    use: "House purchases, large business payments"
    
  bacs:  # same as BACs (variant)
    use: "Batch processing (payroll, benefits)"

