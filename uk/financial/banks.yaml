## Open Banking (PSD2 UK Equivalent)
open_banking:
  launched: "2018-01-13 (PSD2 requirement)"
  providers: "600+ fintechs and banks"
  services:
    - "Account Information Services (AIS)"
    - "Payment Initiation Services (PIS)"
  users: "6_000_000+ (via apps like Yolt, Moneybox)"
  api_standards: "OBIE (Open Banking Implementation Entity)"
  
  success_story: "Monzo, Starling, Chase UK all use Open Banking APIs"

## Cross-Border Payments
international_transfers:
  swift: "Active (all major banks connected)"
  wise_former_transferwise: "£5B+ transfers/year (low fees, real exchange rate)"
  reovlut: "£2B+ transfers/year (multi-currency accounts)"
  western_union: "4,000+ agent locations"
  
  brexit_impact:
