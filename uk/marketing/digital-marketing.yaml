## Compliance & Regulations#
content_regulation:
  authority: "ASA (Advertising Standards Authority)"
  rules:
    - "CAP Code (UK Code of Non-broadcast Advertising)"
    - "No misleading claims, social responsibility"
    - "Alcohol/tobacco ads restricted"
    - "Political ads require imprint (who paid)"
    
  online_safety_act_2023:
    - "Duty of care for user-generated content"
    - "Age verification for pornographic content"
    - "Rapid takedown of illegal content"
    
  penalties:
    - "ASA adjudications: ad withdrawal, compliance"
    - "CMA (Competition and Markets Authority): fines up to 10% global turnover"
    - "OFCOM: up to £18M or 10% turnover (Online Safety Act)"

