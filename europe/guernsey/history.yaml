name: Guernsey
history:
  key_events:
    - 933: Incorporated into Duchy of Normandy
    - 1066: Norman Conquest of England, Guernsey becomes Crown possession
    - 1204: Split from Normandy, becomes direct Crown Dependency
    - 1940-1945: Occupied by Nazi Germany during WW2
    - 1945: Liberation by British forces
    - 2000: Modernization of financial services sector