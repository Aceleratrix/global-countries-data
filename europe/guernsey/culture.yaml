name: Guernsey
culture:
  languages:
    official: English
    regional: French, Guernésiais (Norman dialect)
  traditions:
    - Guernsey Folk Festival
    - Liberation Day (May 9, celebrates end of WW2 occupation)
  cuisine:
    - Guernsey gâche (fruit bread)
    - Ormer (local shellfish)
    - Guernsey beans (similar to baked beans)
  national_symbols:
    - Flag: White cross on red field with gold crown
    - Flower: Guernsey lily