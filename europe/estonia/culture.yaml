country: Estonia
official_language: Estonian (Uralic language family)
minority_languages: Russian, Ukrainian, Swedish
national_holidays:
  - Independence Day: 24 February
  - Victory Day: 23 June
  - Midsummer Day: 24 June
traditional_music: Runic singing, choral music (Estonian Song Festival every 5 years)
unESCO_heritage_sites:
  - Old Town of Tallinn (cultural)
  - Struve Geodetic Arc (shared, scientific)
cuisine: Dark rye bread, pork dishes, dairy products, marinated herring, kama (flour mix)
famous_cultural_figures: Arvo Pärt (composer), Jaan Kross (writer)
