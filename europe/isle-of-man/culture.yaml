# Culture - Isle of Man
national_symbols:
  - "Flag: Red field with three armored legs joined at the thigh, known as the 'Three Legs of Mann'"
  - "National animal: Peregrine falcon"
  - "National flower: Cushag (yellow ragwort)"
traditional_events:
  - "TT (Tourist Trophy) motorcycle races (annual, since 1907)"
  - "Tynwald Day (July 5, national holiday)"
  - "Manx music and dance traditions"
languages:
  - "English (official)"
  - "Manx Gaelic (reviving language)"
