# History - Isle of Man
key_periods:
  - "Prehistoric: Neolithic and Bronze Age settlements"
  - "Celtic: Manx Gaelic culture established"
  - "Viking: Norse rule (9th–13th centuries), Kingdom of Mann and the Isles"
  - "Scottish then English rule (13th–15th centuries)"
  - "English Crown dependency (since 15th century)"
  - "Modern: Self-governing since 1866 with Tynwald sovereignty"
important_dates:
  - "1266: Treaty of Perth, Isle of Man ceded to Scotland"
  - "1405: English Crown takes control"
  - "1866: Isle of Man Constitution Act, establishing modern self-government"
  - "1949: Tynwald celebrates 1000 years of continuous parliament"
