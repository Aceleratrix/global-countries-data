country: Bulgaria
flag: Three equal horizontal stripes (white top, green middle, red bottom)
coat_of_arms: Golden lion rampant on red shield, with crown, oak branches, and ribbon
national_anthem: "Mila Rodino" (Dear Motherland, adopted 1964)
national_animal: Lion
national_flower: Rose (Bulgaria produces 85% of world's rose oil)
national_tree: Balkan pine (Pinus peuce)
national_day: March 3 (Liberation from Ottoman rule, 1878)