country: Bulgaria
key_historical_events:
  - 681 AD: First Bulgarian Empire founded
  - 1018: Conquered by Byzantine Empire
  - 1185: Second Bulgarian Empire established
  - 1396: Ottoman conquest begins
  - 1878: Liberation from Ottoman rule (Treaty of San Stefano)
  - 1908: Declaration of independence as Kingdom of Bulgaria
  - 1946: Establishment of People's Republic (communist)
  - 1989: Fall of communism, democratic transition
  - 2004: NATO accession
  - 2007: EU accession
recent_developments: 2024 EURO adoption pending (converged to ERM II)