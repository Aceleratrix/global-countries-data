# 30% Ruling (Skilled Migrants)
thirty_percent_ruling:
  tax_benefit: "30% of gross salary tax-free"
  eligibility: "Highly skilled migrants, scientists"
  max_duration_years: 5
  income_threshold_2024_eur: 46660
  url: "https://www.belastingdienst.nl"
  
# Business Licenses & Permits
licenses_permits:
  federal:
    - "KVK registration"
    - "VAT number (if applicable)"
    - "RSIN number (legal entities)"
    
  municipal:
    - "Municipal business license"
    - "Environmental permits (if applicable)"
    
  professional_registration:
    required_for: ["Doctors", "Lawyers", "Architects", "Accountants"]
    regulators: ["BIG register", "Nederlandse Orde van Advocaten", "Architectenregister"]
    
# Business Insurance
business_insurance:
  compulsory:
    - "Aansprakelijkheidsverzekering (Liability)"
    - "Arbeidsongeschiktheidsverzekering (Disability)"
    
  recommended:
    - "Bedrijfsschadeverzekering (Property)"
    - "Rechtsbijstandverzekering (Legal)"
    - "Cyberverzekering (Cyber)"
    
# Import/Export Business
import_export:
  eu_member: true
  export_facilitation: "RVO (Netherlands Foreign Investment Agency)"
  url: "https://www.nfia.nl"
  
# Self-Employed (ZZP)
zzp_self_employed:
