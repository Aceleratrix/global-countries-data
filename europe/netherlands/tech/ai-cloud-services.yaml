# National AI Strategy
national_strategy:
  name: "AI Delta Plan (Nationaal Delta Plan Kunstmatige Intelligentie)"
  launched: 2019
  budget_eur_billions: 1.0
  budget_usd_billions: 1.08
  url: "https://aideltaindplasm.nl"
  key_pillars: ["AI talent development", "AI adoption in industry", "AI ethics & governance", "AI infrastructure"]
  target_gdp_contribution_eur: "Significant by 2030"
  talent_target: 100000
  
# AI Delta Network
