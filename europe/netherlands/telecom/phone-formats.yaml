# Netherlands Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: netherlands
last_updated: "2024-12-15"
calling_code: "+31"
international_prefix: "00"
emergency_numbers:
  police: "112"
  fire: "112"
  ambulance: "112"
  unified: true
  
# Phone Number Formats
phone_formats:
  landline:
    pattern: "+31 XX XXXXXXXX"
    digits: 9
    area_codes: ["020 (Amsterdam)", "010 (Rotterdam)", "030 (Utrecht)", "040 (Eindhoven)", "050 (Groningen)"]
    example: "+31 20 123 4567"
    regex: "^\\+31[1-9]\\d{8}$"
    
  mobile:
    pattern: "+31 6 XXXXXXXX"
    digits: 9
    prefixes: ["06"]
    example: "+31 6 1234 5678"
    regex: "^\\+316\\d{8}$"
    
  toll_free:
    pattern: "0800 XXX XXXX"
    example: "0800 123 456"
    regex: "^0800\\d{6,7}$"
    
  premium_rate:
    pattern: "0900 XXX XXXX"
    example: "0900 123 456"
    regex: "^0900\\d{6,7}$"
    
