# Key historical events
timeline:
  - year: 1991
    event: "Declares independence from Yugoslavia on 8 September"
  - year: 1993
    event: "Joins United Nations as 'Former Yugoslav Republic of Macedonia (FYROM)'"
  - year: 2001
    event: "Ohrid Agreement signed, ending armed conflict between government and ethnic Albanian groups"
  - year: 2005
    event: "Granted EU candidate status"
  - year: 2018
    event: "Prespa Agreement signed with Greece, agreeing to change name to 'Republic of North Macedonia'"
  - year: 2019
    event: "Constitutional name change takes effect"
  - year: 2020
    event: "Joins NATO on 27 March"
  - year: 2024
    event: "Parliamentary and presidential elections held in May"
