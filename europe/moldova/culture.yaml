country: Moldova
key_cultural_aspects:
  - World-renowned wine production (Milestii Mici holds Guinness World Record for largest wine cellar by number of bottles)
  - Traditional folk music and "Hora" circle dance
  - Cuisine: mamaliga (cornmeal porridge), sarmale (stuffed cabbage rolls), placinte (savory pastries)
  - Orthodox Christianity is dominant (93.3% of population)
religion:
  - Eastern Orthodox: 93.3%
  - other: 6.7%