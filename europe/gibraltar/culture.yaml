culture:
  national_symbols:
    - Rock of Gibraltar
    - Barbary macaques (only wild monkey population in Europe)
    - Gibraltar pound
  holidays:
    - National Day: September 10
    - Commonwealth Day: March (second Monday)
    - Christmas: December 25
  cuisine: Influenced by British, Spanish, Italian, and Maltese flavors (e.g., calentita, rosto)
  sports: Football, cricket, rugby, sailing
