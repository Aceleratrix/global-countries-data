history:
  key_events:
    - 1704: Captured by Anglo-Dutch fleet during War of Spanish Succession
    - 1713: Ceded to Britain by Spain under Treaty of Utrecht
    - 1830: Becomes a British crown colony
    - 1969: New constitution, changes name to Gibraltar
    - 2006: Updated constitution, retains British sovereignty
    - 2020: Post-Brexit, Gibraltar remains outside EU but has special arrangements with Spain
