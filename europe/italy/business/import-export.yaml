## Import Requirements#
import_licensing:
  general_rule: "No license for most goods (open trade regime)"
  restricted_goods:
    - "Firearms & ammunition (license required)"
    - "Narcotics & controlled drugs"
    - "Certain chemicals (dual-use)"
    - "Endangered species (CITES)"
    - "Food & agricultural products (health certificates)"

## Documentation#
required_documents:
  - "Customs Declaration (SAD - Single Administrative Document)"
  - "Commercial Invoice"
  - "Packing List"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (for FTA benefits)"
  - "EORI Number (Economic Operator Registration & Identification)"
  - "SPS Certificate (for food/plants/animals)"
  - "EUR.1 Movement Certificate (for some FTAs)"

## EORI Number#
eori:
  description: "12-character identifier (IT + 9 digits + suffix)"
  format: "IT123456789000"
  use: "All EU customs declarations (MANDATORY)"
  application: "Online via agenziaentrate.gov.it"
  timeline: "3-5 working days"

## Export Controls#
export_controls:
  authority: "Ministero degli Affari Esteri (MAE - Foreign Ministry)"
  controlled_items:
    - "Dual-use items (military + civilian)"
    - "Military equipment (strategic goods)"
    - "Cultural goods (over 50 years old)"
    - "Artworks (export license required)"
    
  export_licenses:
    - "Global Export License (for regular exporters)"
    - "Individual Export License (one-time shipments)"
    - "EU General Export Authorisation (for dual-use)"

## Special Economic Zones#
sezs:
  - name: "No traditional SEZs (unlike Asia)"
  - name: "ZES (Zone Economiche Speciali - Special Economic Zones)"
    count: 5
    locations: "Campania (Naples), Puglia (Bari), Calabria, Sicily, Sardinia"
    benefits: "10% tax credit, simplified procedures, infrastructure"
    use: "Investment in Southern Italy (Mezzogiorno)"
    
  - name: "Distretti Tecnologici (Technology Districts)"
    count: 45+
    benefits: "Tax credits, R&D incentives, networking"
    use: "Innovation, fashion, automotive, food"

## Incoterms#
common_incoterms:
  - "FOB (Free on Board) - common for sea freight"
  - "CIF (Cost, Insurance, Freight)"
  - "EXW (Ex Works)"
  - "DDP (Delivered Duty Paid) - e-commerce"
  - "FCA (Free Carrier)"

## Customs Procedures#
procedures:
  - "SAD (Single Administrative Document) - online system"
  - "Simplified Procedures (authorized traders - AEO)"
  - "Transit (T1/T2 documents for EU movements)"
  
timeline:
  air_freight: "1-2 days (after documentation)"
  sea_freight: "2-5 days (after vessel arrival)"

