## Customs & Tariffs#
customs_authority: "Agenzia delle Dogane e dei Monopoli (Italian Customs)"
website: "https://www.agenziadoganemonopoli.gov.it"

tariff_structure:
  eu_common_external_tariff: "TARIC (EU-wide)"
  average_tariff_percent: 3.0  # on non-EU imports
  
  categories:
    - "Most goods: 0-6% (industrial, consumer goods)"
    - "Agricultural: 0-25% (CAP protected)"
    - "Textiles: 0-12%"
    - "Vehicles: 10% (outside EU)"

