# Internet & Data Protection Law - Italy#

## Data Protection Authority#
authority: "Garante per la Protezione dei Dati Personali (GPDP - 意大利数据保护局)"
website: "https://www.garanteprivacy.it"
established: 1996
independence: "Constitutional independent authority"
fines_max: "€20M or 4% of global annual revenue (whichever higher)"

## GDPR (Regolamento UE 2016/679)#
gdpr_applies: true
gdpr_adopted_italy: "2018-05-25 (EU Regulation 2016/679)"
national_law: "Codice in materia di protezione dei dati personali (2003, revised 2018)"

### Key Principles#
principles:
  - "Consent must be FREELY GIVEN, SPECIFIC, INFORMED, UNAMBIGUOUS"
  - "Right to erasure (right to be forgotten) - Article 17"
  - "Data minimization (collect only what's necessary)"
  - "Purpose limitation (no secondary use without consent)"
  - "Storage limitation (retain only as long as necessary)"
  - "Integrity and confidentiality (security measures)"
  - "Accountability (controller must demonstrate compliance)"

### GDPR Fines in Italy#
major_fines:
  - company: "Tim (Telecom Italia)"
    year: 2020
    amount_eur: 27_800_000
    reason: "Telemarketing without consent, data retention"
  - company: "Fastweb"
    year: 2021
    amount_eur: 4_500_000
    reason: "Telemarketing abuses, insufficient security"
  - company: "Eni Gas e Luce"
    year: 2022
    amount_eur: 11_500_000
    reason: "Marketing calls without consent"

## AI Regulation (EU AI Act)#
eu_ai_act:
  status: "Adopted March 2024, phased implementation 2024-2027"
  italy_role: "Supporter, developing Italian LLM (i-gen)"
  
  risk_categories:
    - "UNACCEPTABLE RISK (banned): social scoring, manipulative techniques"
    - "HIGH RISK: biometric ID, critical infrastructure, recruitment"
    - "GENERAL PURPOSE AI (GPAI): transparency, copyright compliance"
    - "MINIMAL RISK: voluntary codes of conduct"
    
  italian_ai_leadership:
    - "i-gen (Italian LLM, CINECA/University of Bari)"
    - "400+ AI startups (€1.5B+ funding in 2025)"
    - "Milan AI Hub (200+ companies)"
    - "CINECA (supercomputing, Leonardo supercomputer)"
    
  compliance_deadlines:
    - "2024-08: Banned AI practices"
    - "2025-08: GPAI model requirements"
    - "2026-08: High-risk AI systems"
    - "2027-08: Full implementation"

## Digital Services Act (DSA)#
dsa_status: "Applicable from 2024-02-17"
scope: "Online platforms, marketplaces, social networks"
requirements:
  - "Risk assessment (illegal content, systemic risks)"
  - "Transparency (algorithms, advertising)"
  - "User notification (content moderation decisions)"
  - "Independent audit (for VLOPs - Very Large Online Platforms)"

## Copyright & Intellectual Property#
copyright_law: "Codice della Proprietà Intelletuale (CPI)"
ai_training_copyright:
  - "Text and Data Mining (TDM) exception (Article 70-bis CPI)"
  - "Opt-out mechanism (rightholders can reserve rights)"
  - "GPAI models: must publish summary of training content"
  - "Penalties: €15K-150K (commercial scale infringement)"

## Encryption & Surveillance#
encryption_policy: "Strong encryption allowed, backdoors illegal"
surveillance_law: "Codice di procedura penale (2008, revised 2023)"
controversial_provisions:
  - "Data retention: ISPs (12 months), telephony (24 months - reduced 2023)"
  - "Real-time access: intelligence agencies (with judicial oversight)"
  - "Prism-style metadata collection (controversial, under review)"

## E-commerce & Consumer Protection#
ecommerce_law: "Codice del Consumo (Consumer Code)"
key_rules:
  - "14-day withdrawal right (no questions asked)"
  - "Clear pricing (all taxes included, shipping separate)"
  - "Geo-blocking prohibited (EU regulation)"
  - "Online dispute resolution (ODR platform)"
  - "Dark patterns prohibited (2024)"

## Content Moderation#
content_moderation:
  - "Hate speech: 24h removal (DL 137/2023)"
  - "Terrorist content: 1h removal (EU regulation)"
  - "Child sexual abuse: proactive detection (2024)"
  - "Fake news: during election periods (AGCOM oversight)"

## Telecom & Internet Infrastructure#
telecom_regulator: "AGCOM (Autorità per le Garanzie nelle Comunicazioni)"
isp_market_share:
  - "TIM (Telecom Italia): 35%"
  - "Vodafone Italy: 28% (sold to Fastweb 2024)"
  - "WindTre: 22%"
  - "Iliad Italia: 15%"

internet_penetration: 93  # percentage
broadband_speed_avg_mbps: 85
fiber_coverage: 70  # percentage (FTTH, growing fast)

## Digital Identity (SPID)#
spid:
  name: "Sistema Pubblico di Identità Digitale"
  users: 38_000_000  # 2025
  type: "Public digital identity (mandatory for gov services)"
  levels: "L1 (basic), L2 (2FA), L3 (biometric)"
  use: "Tax filings, healthcare, university, public administration"
  
cie:
  name: "Carta d'Identità Elettronica (Electronic ID Card)"
  users: 40_000_000
  use: "Physical + digital identity (integrated with SPID)"

## Data Localization#
data_localization: "No mandatory data residency (EU citizens' data protected by GDPR)"
cloud_certification: "CSA STAR, ISO 27001 (for public sector contracts)"
italian_cloud_policy: "Sovereign cloud (Sogei, Italian state cloud)"

