## Cryptocurrency#
crypto_regulation:
  status: "Legal, no ban"
  registration: "Mandatory with OAM (Organismo Agenti e Mediatori)"
  
  top_exchanges_italy:
    - "Young Platform (Italian, regulated)"
    - "Conio (Italian, crypto wallet)"
    - "Binance (global, registered in Italy)"
    - "Coinbase (US-based, available)"
    
  crypto_adoption: "3.8M users (6.5% of population)"
  yearly_volume_eur: 35_000_000_000  # 2025

## Payment APIs (Open Banking)#
open_banking:
  framework: "PSD2 (EU Directive) + DSP2 (Italian transposition)"
  implementation: "Strong Customer Authentication (SCA) mandatory"
  
  major_providers:
    - "Stripe (dominant for e-commerce)"
    - "PayPal (popular, widespread)"
    - "Satispay Business (Italian P2P + SME)"
    - "Nexi (Italian payment processor, largest)"
    
  api_access: "Open Banking APIs (XS2A) - mandatory for banks >€5M assets"

## Consumer Credit#
consumer_credit:
  regulation: "TUB (Testo Unico Bancario - Banking Code)"
  max_apr_percent: 18.50  # (usury cap, varies by loan type)
  
  top_lenders:
    - "Agos (Crédit Agricole Consumer Finance)"
    - "Compass (Banca Mediolanum)"
    - "Findomestic (BNP Paribas)"
    - "Cofidis (French, strong in Italy)"
    
  buy_now_pay_later: "Scalapay (Italian leader), Klarna (growing)"

