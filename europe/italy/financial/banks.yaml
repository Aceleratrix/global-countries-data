# Banks & Payment Systems - Italy#

## Central Bank#
central_bank: "Banca d'Italia (意大利银行)"
website: "https://www.bancaditalia.it"
governor: "Fabio Panetta"
role: "Monetary policy, financial stability, banking supervision"

## IBAN Format#
iban:
  format: "ITkk XXXX XXXX XXXX XXXX XXXX"
  length: 27
  example: "IT60 X054 2811 1010 0000 0123 456"
  validation_regex: "^IT\\d{2}\\d{4}\\d{4}\\d{4}\\d{4}\\d{4}\\d{2}$"
  sepa_compliant: true

