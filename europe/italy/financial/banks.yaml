## Payment Systems#
payment_systems:
  - name: "Bancomat (银行卡/借记卡)"
    market_share: 95  # percentage of POS payments
    users: 55_000_000
    transaction_volume_eur: 450_000_000_000  # 2025
    note: "Italian domestic debit scheme (MANDATORY for shops >€60)"
    features: "Debit cards, ATM withdrawals (Bancomat network)"
    
  - name: "SEPA (Single Euro Payments Area)"
    type: "Bank transfer"
    share_of_payments: 60  # percentage of non-cash payments
    volume_annual: 3_800_000_000  # transactions
    note: "Euro-denominated, cross-EU (1-day to instant)"
    
  - name: "Satispay (萨蒂斯佩 - 意大利支付)"
    users: 10_000_000
    growth: 45  # percentage YoY
    note: "Italian P2P payment app (exponential growth)"
    features: "P2P, QR code payments, SME solutions"
    
  - name: "Instant Payments (SEPA Instant)"
    launched: "2019"
    share_of_sepa: 30  # percentage of SEPA transfers
    speed: "Under 10 seconds, 24/7/365"
    limit_eur: 100_000  # per transaction
    
  - name: "PayPal"
    users: 28_000_000
    share_ecommerce: 22  # percentage
    note: "Popular for cross-border, eBay"
    
  - name: "Apple Pay / Google Pay"
    users: 25_000_000
    growth: 30  # percentage YoY
    note: "Contactless mobile payments (NFC)"

