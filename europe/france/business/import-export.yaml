## Import Requirements#
import_licensing:
  general_rule: "No license for most goods (open trade regime)"
  restricted_goods:
    - "Firearms & ammunition (licence required)"
    - "Narcotics & controlled drugs"
    - "Certain chemicals (dual-use)"
    - "Endangered species (CITES)"
    - "Food & agricultural products (health certificates)"

## Documentation#
required_documents:
  - "Customs Declaration (SAD - Single Administrative Document)"
  - "Commercial Invoice"
  - "Packing List"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (for FTA benefits)"
  - "EORI Number (Economic Operator Registration & Identification)"
  - "SPS Certificate (for food/plants/animals)"
  - "EUR.1 Movement Certificate (for some FTAs)"

## EORI Number#
eori:
  description: "12-character identifier (FR + 9 digits + suffix)"
  format: "FR123456789000"
  use: "All EU customs declarations (MANDATORY)"
  application: "Online via douane.gouv.fr"
  timeline: "3-5 working days"

## Export Controls#
export_controls:
  authority: "DGDDI (Direction Générale des Douanes et Droits Indirects)"
  controlled_items:
    - "Dual-use items (military + civilian)"
    - "Military equipment (strategic goods)"
    - "Cultural goods (over 50 years old)"
    - "Artworks (export licence required)"
    
  export_licences:
    - "Global Export Licence (for regular exporters)"
    - "Individual Export Licence (one-time shipments)"
    - "EU General Export Authorisation (for dual-use)"

## Special Economic Zones#
sezs:
  - name: "No traditional SEZs (unlike Asia)"
  - name: "Ports Francs (Free Ports)"
    locations: "Le Havre, Marseille, Bordeaux"
    benefits: "Duty suspension, simplified customs"
    use: "Temporary storage, re-export"
    
  - name: "Competitiveness Clusters (Pôles de Compétitivité)"
    count: 56
    benefits: "R&D tax credits, state aid, networking"
    use: "Innovation, aerospace, pharma, luxury"

## Incoterms#
common_incoterms:
