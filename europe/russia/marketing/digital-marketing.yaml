notes: >
  Russia's digital marketing landscape shifted dramatically since 2022.
  Yandex (60% search) and VK (80M users) dominate, replacing Western platforms.
  Meta platforms (Facebook/Instagram) banned, TikTok restricted, YouTube slowed.
  Telegram grew to 50M Russian users, becoming a major ad channel.
  Yandex Ads and VK Ads grew 30% YoY as Western alternatives exited.
  Domestic martech (Bitrix24, AmoCRM, Yandex Metrica) now dominates.
