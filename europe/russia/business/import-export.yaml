trade_agreements:
  brics: "Brazil, India, China, South Africa + new members"
  eaeu: "Eurasian Economic Union (Russia, Belarus, Kazakhstan, Armenia, Kyrgyzstan)"
  cis: "Commonwealth of Independent States (post-Soviet countries)"
  
customs:
  import_duties:
    wto_member: true
    average_tariff: "5.5%"
    eaeu_common_tariff: true
    
  documentation:
    - "Commercial invoice"
    - "Packing list"
    - "Certificate of origin (Form A for GSP)"
    - "Bill of lading/AWB"
    - "Customs declaration (DT)"
    
  parallel_imports: "Legalized (2022)"
  description: "No trademark owner consent needed"
  covered_goods: "50,000+ items (electronics, cars, cosmetics)"
  
export_controls:
  dual_use_goods: "Licensed (Ministry of Industry and Trade)"
  strategic_goods: "Federal Service for Technical and Export Control (FSTEC)"
  sanctioned_countries: "Western countries (EU, USA, UK, Canada, Japan)"
  
special_zones:
  - name: "Special Economic Zones (SEZ)"
    count: 40+
    benefits: "0-5% corporate tax, customs duty exemptions"
    
  - name: "Arctic Zone"
    benefits: "Reduced profit tax (0-5%), social security cuts"
    
sanctions_impact:
  western_trade: "Reduced by 60% (2022-2024)"
  redirect_to_east: "Trade with China/India up 40%"
  payment_difficulties: "SWIFT disconnection, Mir system, CIPS (China)"
  parallel_imports: "Allowed for 50,000+ goods (solves supply gaps)"
  
e_commerce_exports:
  cross_border_sales: "$8B (2024)"
  platforms: ["AliExpress Russia", "Wildberries Global", "Ozon Global"]
  top_categories: ["Fashion", "Electronics", "Home goods"]
  
notes: >
  Russia's trade has completely reoriented since 2022 sanctions.
  China is now the top partner ($180B exports, $150B imports).
  Oil, gas, wheat remain top exports (73% of total).
  Parallel imports legalization saved supply chains for electronics, cars.
  The EEU (Eurasian Economic Union) provides a duty-free bloc of 180M people.
  SWIFT disconnection led to Mir payment system dominance and CIPS (China) use.
