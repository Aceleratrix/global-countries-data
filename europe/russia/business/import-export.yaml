    share: "8.8%"
    
  - source: "India"
    value: "$22B"
    share: "6.9%"
    
  - source: "Belarus"
    value: "$18B"
    share: "5.6%"
    
top_import_products:
  - product: "Electronics & machinery"
    value: "$80B"
    share: "25%"
    note: "Parallel imports legalized"
    
  - product: "Vehicles & auto parts"
    value: "$45B"
    share: "14%"
    note: "Chinese brands dominate (Haval, Chery)"
    
  - product: "Pharmaceuticals"
