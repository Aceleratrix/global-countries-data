# Russia - Import & Export (Business)
# Fonte: Ministry of Economic Development, Federal Customs Service

country: "Russia"
iso_code: "RU"
currency: "RUB"
brics_member: true
sanctions_status: "Extensive Western sanctions (2022-2024)"

trade_overview:
  total_exports_2024: "$450B"
  total_imports_2024: "$320B"
  trade_balance: "+$130B (surplus)"
  rank_world: 12  # (Exports)
  
