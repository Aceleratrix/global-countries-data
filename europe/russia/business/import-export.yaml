    share: "40%"
    growth: "35% YoY (sanctions shift)"
    
  - destination: "India"
    value: "$65B"
    share: "14.4%"
    growth: "50% YoY"
    
  - destination: "Turkey"
    value: "$35B"
    share: "7.8%"
    
  - destination: "Belarus"
    value: "$28B"
    share: "6.2%"
    
  - destination: "Kazakhstan"
    value: "$22B"
    share: "4.9%"
    
