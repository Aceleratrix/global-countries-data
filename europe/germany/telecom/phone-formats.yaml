description: "Phone formats, postal codes, and address standards for Germany"

# Phone System
phone:
  country_code: "+49"
  international_format: "+49-AAA-BBBBBBB"  # +49 (country) + area (2-5 digits) + number
  national_format: "0AAA-BBBBBBB"  # 0 + area code + number (dialing withn Germany)
  mobile_prefixes: ["0151", "0152", "0155", "0157", "0159", "0160", "0162", "0163", "0170", "0171", "0172", "0173", "0174", "0175", "0176", "0177", "0178", "0179"]
  landline_prefixes: ["030 (Berlin)", "089 (Munich)", "040 (Hamburg)", "069 (Frankfurt)", "0221 (Cologne)", "0211 (Düsseldorf)", "030 (Berlin)"]
  emergency: "112 (EU standard - police, fire, ambulance)"
  business_usual_format: "+49 (0) 30 12345678"  # (0) indicates drop 0 if dialing internationally
  ai_implications: "AI agents must dial 0 for domestic, drop 0 for international (+49)"
  
# Postal Codes (Postleitzahl - PLZ)
postal_codes:
  format: "NNNNN"  # 5 digits (NNNNN)
  example: "10115"  # Berlin Mitte
  first_digit_regions:
    "0": "Berlin, Brandenburg, Mecklenburg-Vorpommern"
    "1": "Hamburg, Schleswig-Holstein, Bremen"
    "2": "North Rhine-Westphalia (Düsseldorf, Cologne)"
    "3": "Lower Saxony, Saxony-Anhalt"
    "4": "Bremen, Lower Saxony (part)"
    "5": "North Rhine-Westphalia (part), Hesse"
    "6": "Rhineland-Palatinate, Saarland"
    "7": "Baden-Württemberg (Stuttgart, Mannheim)"
    "8": "Bavaria (Munich, Nuremberg, Augsburg)"
    "9": "Saxony, Thuringia, Franconia (part)"
  note: "5 digits (since 1993) - easy to parse (unlike Brazil's NNNNN-NNN)!"
  
# Address Format (Standard German)
address_format: |
  Name
  Street Name House Number
  Postal Code City
  GERMANY
  
example: |
  Herr Max Mustermann
  Bahnhofstraße 123
  10115 Berlin
  GERMANY
  
components:
  - "Name: Herr/Frau (Mr./Ms.) + Full Name"
  - "Street: Street Name + House Number (NO apartment numbers in street!)"
  - "City: Postal Code (5 digits) + City Name"
  - "Country: GERMANY (always include for international!)"
  
note: "German addresses are VERY structured (unlike Brazil's variations!)"

# Time Zone
timezone:
  standard: "CET (Central European Time)"
  standard_offset: "UTC+1"
  daylight_saving: "CEST (Central European Summer Time)"
  dst_offset: "UTC+2"
  dst_months: "Last Sunday March - Last Sunday October"
  note: "Like Brazil (BRST), unlike Japan (NO DST!)"
  
