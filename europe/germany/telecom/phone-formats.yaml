# Comparison: Germany vs Brazil/USA/Japan
comparison:
  phone_format:
    brazil: "+55 (NN) NNNN-NNNN (11 digits total)"
    usa: "+1 (NPA) NXX-XXXX (10 digits)"
    japan: "+81 (0A) NNNN-NNNN (11 digits)"
    germany: "+49 (AAA) NNNNNNNN (varies by area - 2-5 digit area codes!)"
    
  postal_code_format:
    brazil: "NNNNN-NNN"  # 8 digits (CEP)
    usa: "NNNNN" or "NNNNN-NNNN"  # 5 or 9 digits (ZIP+4)
    japan: "〒 NNN-NNNN"  # 7 digits (with hyphen)
    germany: "NNNNN"  # 5 digits (since 1993 - simple!)"
    
  time_zone:
    brazil: "BRT (UTC-3) / BRST (UTC-2) - DST"
    usa: "Varied (PST UTC-8 to EST UTC-5) - DST"
    japan: "JST (UTC+9) - NO DST!"
    germany: "CET (UTC+1) / CEST (UTC+2) - DST"
    
  internet_tld:
    brazil: ".br"
    usa: ".us (rarely used, .com dominates)"
    japan: ".jp"
    germany: ".de (VERY strong - 6th most used TLD globally!)"
    
  fiber_coverage_percent:
    brazil: "43%"
    usa: "43%"
    japan: "98% (world's best in G7!)"
    germany: "65% (growing fast - Digital Agenda 2025!)"
    
  unique_germany_features:
    - "5-digit postal codes (simple, since 1993!)"
    - "Phone area codes: 2-5 digits (varies by city size!)"
    - "Address: Street + HOUSE NUMBER (no apartment in street!)"
    - "Mobile prefixes: 015x, 016x, 017x (easy to identify!)"
    - "DE-CIX Frankfurt: WORLD'S LARGEST internet exchange!"
    - "Time zone: CET/CEST (DST like Brazil, unlike Japan!)"
    - ".de TLD: 6th most used globally (very strong!)"
