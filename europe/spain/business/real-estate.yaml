# Property Purchase Process
purchase_process:
  steps:
    - "Obtain NIE (foreigner ID number)"
    - "Open Spanish bank account"
    - "Sign preliminary contract (contrato de arras) + 10% deposit"
    - "Notary signing of title deed (escritura)"
    - "Register property at Land Registry"
  timeline_days: 30
  notary_fees_percent: 1
  land_registry_fees_percent: 0.5
  taxes_percent: 10
  total_transaction_costs_percent: 12

# Property Taxes
property_taxes:
  - name: "IBI (Impuesto sobre Bienes Inmuebles)"
    basis: "Cadastral value (valor catastral)"
    rate_range: "0.4% - 1.1%"
    collected_by: "Municipality"
  
  - name: "Non-resident income tax (NRI)"
    applies_to: "Non-residents owning property"
    rate: 19
    basis: "Imputed income (2% of cadastral value)"
  
  - name: "Wealth tax (Patrimonio)"
    applies_to: "Properties > €700,000 (regional, varies)"
    rate_range: "0.2% - 3.75%"
  
  - name: "Capital gains tax"
    rate_range: "19% - 26%"
    notes: "19% up to €6,000 gain, 21% €6,000-50,000, 23% €50,000-200,000, 26% >€200,000"

