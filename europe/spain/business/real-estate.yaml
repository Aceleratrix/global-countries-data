notes: >
  O mercado imobiliário espanhol está em plena recuperação pós-COVID,
  com crescimento sólido mas sustentável. Madrid e Barcelona lideram
  preços, enquanto cidades secundárias oferecem boas oportunidades.
  A "Ley de Vivienda" de 2023 introduziu controles de aluguel em áreas
  tensionadas. O investimento estrangeiro continua forte, especialmente
  no setor logístico impulsionado pelo e-commerce e nearshoring.
