# Espanha - Company Sizes (Negócios)
# Fonte: INE, Ministerio de Industria

country: "Spain"
iso_code: "ES"

classification:
  micro_enterprise:
    employees: "1-9"
    turnover: "< €2M"
    balance_sheet: "< €2M"
    examples: ["Freelancers", "Small shops", "Consultants"]
    count: 3200000  # 95% of all companies
    
  small_enterprise:
    employees: "10-49"
    turnover: "≤ €10M"
    balance_sheet: "≤ €10M"
    examples: ["Local manufacturers", "SMEs", "Tech startups"]
    count: 150000
    
  medium_enterprise:
    employees: "50-249"
    turnover: "≤ €50M"
    balance_sheet: "≤ €43M"
    examples: ["Regional companies", "Growing tech firms"]
    count: 18000
    
  large_enterprise:
    employees: "250+"
    turnover: "> €50M"
    examples: ["Multinationals", "Major banks", "Inditex"]
    count: 3000

total_companies: 3370000
sme_share: "99.8%"  # Of all enterprises

