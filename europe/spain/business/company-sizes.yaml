notes: >
  Espanha tem um tecido empresarial dominado por micro e pequenas empresas
  (99.8% das empresas são PMEs). A "Ley de Startups" de 2022 revolucionou
  o ecossistema, atraindo talento estrangeiro e investimento. O país é o
  3º maior ecossistema de startups do sul da Europa, atrás apenas de
  Israel e Alemanha. O desafio principal permanece a burocracia e o
  atraso nos pagamentos B2B (média de 85 dias).
