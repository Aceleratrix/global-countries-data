  - source: "Italy"
    value: "$40B"
    share: "9.8%"
    
  - source: "USA"
    value: "$38B"
    share: "9.3%"
    
top_import_products:
  - product: "Machinery & electronics"
    value: "$95B"
    share: "23.2%"
    
  - product: "Chemicals"
    value: "$68B"
    share: "16.6%"
    
  - product: "Automotive parts"
    value: " $52B"
