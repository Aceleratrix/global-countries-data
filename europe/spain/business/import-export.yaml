    value: "$65B"
    share: "15.5%"
    
  - destination: "Germany"
    value: "$58B"
    share: "13.8%"
    
  - destination: "Portugal"
    value: "$42B"
    share: "10.0%"
    
  - destination: "Italy"
    value: "$38B"
    share: "9.0%"
    
  - destination: "USA"
    value: "$35B"
    share: "8.3%"
    
  - destination: "UK"
    value: "$32B"
    share: "7.6%"

