trade_agreements:
  eu_single_market: true
  eu_customs_union: true
  eu_vat_system: true
  bilateral_treaties: 95
  eu_trade_deals: ["Canada (CETA)", "Japan", "Mexico", "Mercosur (pending)"]

customs:
  import_duties_eu: "0% (intra-EU trade)"
  import_duties_non_eu: "EU Common External Tariff (CET)"
  customs_authority: "Agencia Tributaria (AEAT)"
  average_tariff: "5.2%"
  customs_value: "CIF (Cost, Insurance, Freight)"
  
  documentation:
    - "Commercial invoice"
    - "Packing list"
    - "Certificate of origin (EUR.1 for EU)"
    - "Bill of lading/AWB"
    - "Customs declaration (SAD)"
    
  incoterms_2020: "Widely used"
  
export_controls:
  dual_use_goods: "EU Dual-Use Regulation"
  strategic_goods: "Required export license"
  sanctioned_countries: "EU Sanctions Map (Russia, Belarus, etc.)"
  
special_zones:
  canary_islands:
    customs: "Outside EU Customs Union"
    vat: "IGIC (7% instead of IVA 21%)"
    incentives: "ZEC (0-4% corporate tax)"
    
  ceuta_melilla:
    customs: "Special status (partial)"
    
e_commerce_exports:
  cross_border_sales: "$25B (2024)"
  platforms: ["Amazon", "eBay", "Alibaba"]
  top_categories: ["Fashion", "Electronics", "Home goods"]
  
notes: >
  Espanha é uma potência exportadora (18ª do mundo) com superávit comercial.
  A UE absorve 65% das exportações, com França, Alemanha e Portugal
  como principais parceiros. O país é líder mundial em azeite (50% da
  oferta global) e 3º em vinhos. O setor automotivo (SEAT, VW, Ford)
  é o maior contribuinte de exportações. O Brexit afetou levemente as
  exportações para o Reino Unido (7.6% do total).
