# Spain Telecom & Phone Formats
# AI-Ready: Structured for multi-agent systems

country: spain
last_updated: "2024-12-15"
calling_code: "+34"
international_prefix: "00"
emergency_numbers:
  police: 112
  ambulance: 112
  fire: 112

# Phone Number Format
phone_format:
  general_pattern: "+34 XXX XXX XXX"
  country_code: "34 (no leading zero)"
  national_prefix: "None (dialed as XXX XXX XXX domestically)"
  regex_national: "^[6-9][0-9]{8}$"
  regex_international: "^\\+34[6-9][0-9]{8}$"
  example_national: "612 345 678"
  example_international: "+34 612 345 678"
  total_length: 9
  notes: "No area codes; all numbers are 9 digits starting with 6, 7, 8, or 9"

# Mobile Numbers
mobile:
  prefixes: ["6", "7"]
  format: "6XX XXX XXX / 7XX XXX XXX"
  example: "+34 612 345 678"
  total_numbers: 900000000
  assigned_numbers: 650000000
  saturation: 72

# Landline Numbers
landline:
  prefixes: ["8", "9"]
  format: "8XX XXX XXX / 9XX XXX XXX"
  example: "+34 912 345 678"
  notes: "9 = Madrid, Barcelona, major cities; 8 = rest of country"
  regional_blocks:
    - prefix: "91"
      region: "Madrid"
    - prefix: "93"
      region: "Barcelona"
    - prefix: "96"
      region: "Valencia"
    - prefix: "95"
      region: "Andalusia (eastern)"
    - prefix: "85"
      region: "Galicia"

# Toll-Free & Special Numbers
special_numbers:
  - type: "Toll-free"
    prefix: "800 / 900"
    format: "900 XXX XXX"
    cost: "Free for caller"
    example: "900 123 456"
  
  - type: "Premium rate"
    prefix: "803 / 806 / 807"
    format: "80X XXX XXX"
    cost: "€0.50 - €6.00/min"
    example: "806 123 456"
  
  - type: "Shared cost"
    prefix: "901 / 902"
    format: "90X XXX XXX"
    cost: "Local call rate"
    example: "902 123 456"
  
  - type: "Emergency"
    number: "112"
    description: "Universal emergency number (police, fire, ambulance)"
  
  - type: "Short codes"
    numbers: ["010 (Info)", "012 (Citizen services)", "016 (Gender violence)"]
    description: "2-3 digit numbers for specific services"

