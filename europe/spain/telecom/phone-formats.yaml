# Espanha - Phone Formats (Telecomunicações)
# Fonte: CNMC (Comisión Nacional de los Mercados y la Competencia)

country: "Spain"
iso_code: "ES"
country_code: "+34"
international_prefix: "00"
trunk_prefix: "9"  # Para chamadas nacionais

phone_number_format:
  general_pattern: "\\+34[6-9]\\d{8}"
  total_digits: 9  # After country code
  area_code_required: false  # Direct dialing nationwide
  mobile_prefixes: ["6", "7"]
  landline_prefixes: ["8", "9"]
  
landline:
  format: "+34 9XX XXX XXX"
  examples: ["+34 913 123 456", "+34 932 123 456"]
  major_area_codes:
    Madrid: "91"
    Barcelona: "93"
    Valencia: "96"
    Seville: "95"
    Bilbao: "94"
  number_portability: true
  portability_time: "1 business day"

mobile:
  format: "+34 6XX XXX XXX or +34 7XX XXX XXX"
  examples: ["+34 612 345 678", "+34 712 345 678"]
  major_operators:
    - name: "Movistar"
      market_share: "32%"
      prefix_range: "600-609, 690-699"
    - name: "Vodafone"
      market_share: "27%"
      prefix_range: "610-619, 650-659"
    - name: "Orange"
      market_share: "22%"
      prefix_range: "620-629, 670-679"
    - name: "MásMóvil"
      market_share: "15%"
      prefix_range: "640-649, 680-689"
  number_portability: true
  portability_time: "1 business day"
  prepaid_vs_postpaid: "40% prepaid, 60% postpaid"

special_numbers:
  emergency: "112"
  police: "091"
  civil_guard: "062"
  fire: "080"
  ambulance: "061"
  operator: "11818"
  toll_free:
    prefix: "900"
    format: "+34 900 XXX XXX"
    cost: "Free for caller"
  premium_rate:
    prefix: "901-909"
    format: "+34 90X XXX XXX"
    cost: "Variable (€0.50-€3.00/min)"
  short_codes:
    time: "093"
    weather: "096"

voip:
  regulation: "Liberalized"
  major_providers: ["Skype", "Zoom", "Teams", "WhatsApp"]
  number_porting: "Allows VoIP numbers from fixed operators"

satellite:
  providers: ["Hispasat", "Eutelsat"]
  coverage: "Spain, Portugal, Latin America"
  
5g:
  rollout_status: "Advanced"
  coverage_population: "75%"
  major_cities: "Madrid, Barcelona, Valencia, Seville covered"
  operators: ["Movistar", "Vodafone", "Orange", "MásMóvil"]

telecom_regulator:
  name: "CNMC"
  website: "https://www.cnmc.es"
  responsibilities: ["Competition", "Spectrum", "Consumer protection"]

notes: >
  Espanha tem um dos mercados de telecomunicações mais competitivos da UE,
  com 4 grandes operadores e dezenas de MVNOs. O country code +34 é curto
  e fácil de memorizar. A portabilidade numérica é instantânea (1 dia).
  O Bizum é integrado com números de celular para pagamentos instantâneos.
  5G cobre 75% da população, com Meta (WhatsApp) e Google (Duo) sendo
  os apps de chamadas VOIP mais usados.
