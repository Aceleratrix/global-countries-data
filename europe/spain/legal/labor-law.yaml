# Espanha - Labor Law (Estatuto dos Trabalhadores)
# Fonte: Ministerio de Trabajo y Economía Social

country: "Spain"
iso_code: "ES"

employment_contracts:
  types:
    - name: "Indefinido (Permanent)"
      description: "Contrato sem prazo determinado"
      max_probation: "6 months"
      
    - name: "Temporal (Temporary)"
      description: "Máximo 24 meses em 36 meses"
      max_duration: "24 months"
      
    - name: "Formación (Training)"
      description: "Para jovens até 30 anos"
      max_duration: "2 years"

working_hours:
  max_weekly_hours: 40
  max_daily_hours: 9
  rest_between_shifts: "12 hours"
  weekly_rest: "1.5 days minimum"
  night_work_limit: "8 hours/day"

minimum_wage:
  year_2024: "€1,134/month (14 pagamentos)"
  annual_equivalent: "€15,876"
  coverage: "All sectors"

overtime:
  max_per_year: 80
  compensation: "Pay or time off"
  night_shift_premium: "25-50%"

vacation:
  minimum_days: 30
  public_holidays: 14
  annual_leave_accrual: "2.5 days/month"

termination:
  probation_period: "6 months (indefinite contracts)"
  severance_permanent: "33 days/year worked (max 24 months)"
  severance_temporary: "12 days/year worked"
  notice_period: "15-30 days"

social_security:
  employee_rate: "6.35%"
  employer_rate: "23.60%"
  unemployment_coverage: "70% salário (6 months)"

remote_work:
  law: "Ley 10/2021"
  rights:
    - "Right to disconnect"
    - "Reimbursement of expenses"
    - "Prior written agreement"
  maximum_remote: "No limit (100% remote allowed)"

non_compete:
  max_duration: "6 months (employees)"
  max_duration_executives: "2 years"
  compensation_required: true
  compensation_min: "50% salary during restriction"

strikes:
  legal_requirements:
    - "Pre-notice 5 days"
    - "Minimum services maintained"
  protection: "No retaliation allowed"

unions:
  major_unions:
    - "CCOO (Comisiones Obreras)"
    - "UGT (Unión General de Trabajadores)"
  collective_bargaining_coverage: "80%"

notes: >
  Espanha reformou profundamente sua legislação trabalhista em 2022-2023,
  aumentando direitos de trabalhadores e restringindo contratos temporários.
  A "Ley de Teletrabajo" é uma das mais avançadas da UE, garantindo
  desconexão digital e reembolso de despesas para trabalho remoto.
