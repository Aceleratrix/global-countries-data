# Espanha - Internet Law (Proteção de Dados)
# Fonte: AEPD (Agencia Española de Protección de Datos)

country: "Spain"
iso_code: "ES"
data_protection_authority: "AEPD"
website: "https://www.aepd.es"

laws:
  - name: "LOPDGDD (Ley Orgánica 3/2018)"
    description: "Adaptação espanhola do GDPR"
    effective_date: "2018-12-05"
    gdpr_alignment: "complete"
    
  - name: "LSSI-CE (Ley 34/2002)"
    description: "Serviços da Sociedade da Informação e Comércio Eletrônico"
    effective_date: "2002-07-11"
    
  - name: "RGPD (Reglamento UE 2016/679)"
    description: "Regulamento Geral de Proteção de Dados da UE"
    effective_date: "2018-05-25"

data_protection:
  dpo_required:
    public_authorities: true
    large_scale_monitoring: true
    large_scale_special_categories: true
    threshold_employees: 250
    
  penalties:
    max_administrative_fine:
      tier_1: "€10M ou 2% faturamento global"
      tier_2: "€20M ou 4% faturamento global"
      
  rights:
    access: true
    rectification: true
    erasure: true
    portability: true
    objection: true
    automated_decision_making: true

e_commerce:
  cookie_consent: "explicit"
  privacy_policy_required: true
  data_breach_notification: "72 hours"
  commercial_communications: "opt-in"
  
domain_registration:
  registry: "RED.es"
  requirements:
    - "NIF/NIE para residentes"
    - "Passaporte + NIE para estrangeiros"
  average_price: "€12-25/ano"

ai_regulation:
  eu_ai_act_status: "adopted"
  high_risk_systems: "regulated"
  transparency_requirements: "mandatory"
  
notes: >
  Espanha possui um dos regimes de proteção de dados mais rigorosos da UE.
  A AEPD é uma das autoridades de proteção mais ativas, com multas
  frequentes para grandes tech companies. O país é referência em
  implementação de IA ética na UE.
