# Banking System Overview
system:
  type: "Universal banking model"
  regulator: "Banco de España (Central Bank)"
  supervisor: "European Central Bank (ECB) for significant institutions"
  deposit_guarantee: "€100,000 per depositor (Fondo de Garantía de Depósitos)"
  official_url: "https://www.bde.es"

