# Espanha - Banks (Sistema Bancário)
# Fonte: Banco de España

country: "Spain"
iso_code: "ES"
currency: "EUR"

central_bank:
  name: "Banco de España"
  website: "https://www.bde.es"
  governor: "Pablo Hernández de Cos"
  role: "National central bank, part of Eurosystem"

banking_system:
  total_assets: "€3.2T"
  number_of_banks: 150
  concentration: "High (top 5 = 70% market share)"
  regulation: "Eurosystem + Banco de España"

major_banks:
  - name: "Banco Santander"
    headquarters: "Santander, Spain"
    assets: "€1.7T worldwide"
    market_cap: "$70B"
    global_rank: 15
    retail_presence: ["Spain", "UK", "Brazil", "Mexico", "USA"]
    digital_banking: "Openbank (digital-only subsidiary)"
    
  - name: "BBVA (Banco Bilbao Vizcaya Argentaria)"
    headquarters: "Bilbao, Spain"
    assets: "€730B worldwide"
    market_cap: "$50B"
    global_rank: 35
    retail_presence: ["Spain", "Mexico", "Turkey", "South America"]
    digital_banking: "BBVA Spain app (4.8★)"
    
  - name: "CaixaBank"
    headquarters: "Valencia, Spain"
    assets: "€600B"
    market_cap: "$35B"
    domestic_market_share: "25%"
    focus: "Retail & SMEs"
    digital_users: "18M"
    
  - name: "Sabadell"
    headquarters: "Barcelona, Spain"
    assets: "€250B"
    market_cap: "$8B"
    focus: "Business banking"
    international: "UK (TSB Bank)"
    
  - name: "Bankinter"
    headquarters: "Madrid, Spain"
    assets: "€100B"
    market_cap: "$6B"
    focus: "Digital-first banking"
    innovation: "AI-powered personal finance"

digital_banks:
  - name: "Openbank (Santander)"
    customers: "6M"
    features: ["Zero fees", "AI chatbot", "Crypto trading"]
    
  - name: "Revolut Spain"
    customers: "3M"
    features: ["Multi-currency", "Crypto", "Stocks"]
    
  - name: "N26 Spain"
    customers: "2M"
    features: ["German banking license", "Spaces (sub-accounts)"]

payment_methods:
  credit_cards:
    market_share: "30%"
    major_issuers: ["Visa", "Mastercard", "American Express"]
  debit_cards:
    market_share: "60%"
  digital_wallets:
    - name: "Bizum"
      users: "25M"
      transactions_per_year: "2B"
      coverage: "95% of Spanish adults"
    - name: "Apple Pay"
      adoption: "40%"
    - name: "Google Pay"
      adoption: "35%"
  cash_usage: "12% (declining rapidly)"

fintech_ecosystem:
  unicorns:
    - "Flywire (payments)"
    - "Spotahome (proptech)"
  notable_startups:
    - "Cobee (employee benefits)"
    - "Creditas (lending)"
    - "Rocket图 (mortgage marketplace)"
    
regulatory_sandbox:
  name: "Proyecto de Sandbox Financiero"
  launched: 2021
  participants: 50+
  focus: "Open banking, crypto, AI lending"

open_banking:
  psd2_compliance: "Full"
  apis_available: true
  major_providers: ["BBVA API", "Santander API", "CaixaBank API"]
  
notes: >
  Espanha tem um dos sistemas bancários mais consolidados da Europa, com
  bancos globais como Santander e BBVA. O Bizum é o meio de pagamento
  instantâneo mais bem-sucedido da Europa (mais que Apple Pay na Espanha).
  O país é líder em open banking na UE, com APIs abertas desde 2019.
  CaixaBank é o maior banco de varejo domesticamente, com 25% de market share.
