# Espanha - Tax Codes (Sistema Fiscal)
# Fonte: Agencia Tributaria (AEAT)

country: "Spain"
iso_code: "ES"
currency: "EUR"

tax_identification:
  personal:
    name: "NIF (Número de Identificación Fiscal)"
    format: "8 dígitos + 1 letra (ex: 12345678A)"
    issue_authority: "Agencia Tributaria"
    
  corporate:
    name: "CIF (Código de Identificación Fiscal)"
    format: "Letra + 8 dígitos (ex: A12345678)"
    issue_authority: "Agencia Tributaria"
    
  foreign:
    name: "NIE (Número de Identidad de Extranjero)"
    format: "X + 7 dígitos + letra (ex: X1234567L)"
    required_for: "Foreign residents, businesses"

corporate_income_tax:
  standard_rate: 25
  small_business_rate: 15  # Faturamento < €1M
  newly_created_companies: 15  # Primeiros 2 anos lucrativos
  penalties_rate: 30  # Empresas "zombie"/sem atividade real
  
vat:
  standard_rate: 21
  reduced_rate: 10  # Alimentos, transporte, hotéis
  super_reduced_rate: 4  # Alimentos básicos, livros, medicamentos
  registration_threshold: "€0 (obrigatório para todas empresas)"
  
personal_income_tax:
  name: "IRPF (Impuesto sobre la Renta de las Personas Físicas)"
  brackets_2024:
    - bracket: "€0 - €12,450"
      rate: 19
    - bracket: "€12,451 - €20,200"
      rate: 24
    - bracket: "€20,201 - €35,200"
      rate: 30
    - bracket: "€35,201 - €60,000"
      rate: 37
    - bracket: "€60,001 - €300,000"
      rate: 45
    - bracket: "€300,001+"
      rate: 47  # (Andaluzia, Catalunha têm taxas próprias)
      
  regional_variations: true
  regions_with_higher_rates: ["Cataluña", "Andalucía"]

payroll_taxes:
  employer_contribution: 23.60  # %
  employee_contribution: 6.35   # %
  unemployment_employer: 5.50
  unemployment_employee: 1.55
  overtime_surcharge: 3.00

withholding_taxes:
  dividends_domestic: 19
  dividends_foreign_eu: 0  # Com diretiva UE
  interest: 19
  royalties: 24
  professional_services: 15  # Workers independentes

tax_treaties:
  count: 95
  major_partners: ["Germany", "France", "Italy", "UK", "USA", "China"]
  double_taxation_relief: "Credit method"

tax_filing:
  corporate_deadline: "25 days after 6 months from fiscal year-end"
  personal_deadline: "April-June (previous year)"
  electronic_filing_mandatory: true
  penalties_late_filing: "1% per month + interest"

special_zones:
  canary_islands:
    corporate_tax_rate: 4  # ZEC (Zona Especial Canaria)
    vat: "IGIC 7% (instead of IVA)"
    
  ceuta_melilla:
    corporate_tax_rate: 15
    special_incentives: true

startup_incentives:
  law: "Ley de Startups (2022)"
  benefits:
    - "Corporate tax 15% for 4 years"
    - "Stock options tax exemption up to €50k"
    - "Fast-track visas for foreign talent"
    - "Reduced bureaucracy"

notes: >
  Espanha tem um dos sistemas fiscais mais complexos da UE, com variações
  regionais significativas (17 Comunidades Autônomas). A "Ley de Startups"
  de 2022 criou um regime especial para atrair empresas de tecnologia.
  O IVA (VAT) espanhol tem 3 taxas, sendo a padrão de 21% uma das mais
  altas da Europa. O NIF é obrigatório para todas as transações comerciais.
