# Espanha - AI & Cloud Services (Tecnologia)
# Fonte: Ministry of Economic Affairs, CNMC

country: "Spain"
iso_code: "ES"

cloud_adoption:
  market_size_2024: "$5.2B"
  growth_rate: "22% YoY"
  penetration: "65% enterprises"
  public_cloud_share: "70%"
  private_cloud_share: "30%"

major_providers:
  - name: "Microsoft Azure"
    region: "Azure Spain Central (Madrid)"
    market_share: "30%"
    data_centers: 2
    ai_services: ["Azure AI", "Copilot", "Cognitive Services"]
    
  - name: "Amazon Web Services (AWS)"
    region: "AWS Europe (Spain)"
    market_share: "28%"
    data_centers: 2
    ai_services: ["Bedrock", "SageMaker", "Rekognition"]
    
  - name: "Google Cloud Platform"
    region: "GCP Madrid"
    market_share: "18%"
    data_centers: 1
    ai_services: ["Vertex AI", "Gemini", "Document AI"]
    
  - name: "IBM Cloud"
    market_share: "8%"
    focus: "Enterprise, banking"
    ai_services: ["Watsonx", "Watson Assistant"]
    
  - name: "Oracle Cloud"
    market_share: "6%"
    focus: "Enterprise, government"

spanish_tech_hubs:
  - name: "Madrid"
    focus: ["Fintech", "Enterprise software", "AI startups"]
    unicorns: ["Glovo", "Cabify"]
    
  - name: "Barcelona"
    focus: ["Mobile tech", "IoT", "Design"]
    unicorns: ["Wallapop", "Typeform"]
    
  - name: "Valencia"
    focus: ["AgriTech", "Smart cities"]
    
  - name: "Bilbao"
    focus: ["Industrial tech", "Energy"]

ai_ecosystem:
  national_strategy: "España IA 2024-2027"
  investment: "€1.3B"
  priorities: ["Healthcare AI", "Smart cities", "Industrial AI"]
  
  research_centers:
    - "Barcelona Supercomputing Center (MareNostrum 5)"
    - "Madrid AI Institute"
    - "Vicomtech (Basque Country)"
    
  startups:
    - name: "Sherpa.ai"
      focus: "Privacy-preserving AI"
    - name: "Bitext"
      focus: "NLP, sentiment analysis"
    - name: "Fever"
      focus: "Event discovery AI"
      
  unicorns:
    - "Glovo (delivery, $2.5B valuation)"
    - "Cabify (mobility, $1.4B valuation)"

data_sovereignty:
  eu_data_act_compliance: true
  data_localization: "Recommended for public sector"
  schrems_ii_compliance: "Adequacy decision in place"
  
5g_rollout:
  status: "Advanced"
  coverage: "75% population"
  industrial_use_cases: ["Smart factories", "Port of Barcelona", "Connected cars"]

digital_government:
  strategy: "España Digital 2026"
  budget: "€20B (NextGenEU funds)"
  targets:
    - "100% digital services by 2026"
    - "90% e-invoicing adoption"
    - "10M digital skills trained"

spanish_language_ai:
  models:
    - "MarIA (BSC - Barcelona Supercomputing Center)"
    - "Spanish GPT models (multiple startups)"
  corpora: "Real Academia Española resources"
  market_size: "500M Spanish speakers worldwide"

notes: >
  Espanha está se posicionando como o hub de IA do sul da Europa, com
  investimentos massivos via fundos NextGenEU. O país sediará o primeiro
  supercomputador de IA da UE (MareNostrum 5 em Barcelona). Microsoft,
  Amazon e Google estabeleceram data centers locais para atender à
  demanda de soberania de dados da UE. O ecossistema de startups
  espanholas é vibrante, com 2 unicórnios no setor de IA/mobilidade.
