  name: "Estrategia Nacional de Inteligencia Artificial 2020-2025"
  budget_eur: 4300000000
  launched: 2020
  extended_to: 2025
  key_pillars:
    - "AI talent development (12,000 specialists)"
    - "Infrastructure (5 supercomputing centers)"
    - "Ethical AI & regulation"
    - "Sectoral adoption (health, transport, tourism)"
    - "Startups & entrepreneurship"
