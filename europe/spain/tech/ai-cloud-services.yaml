# AI Ethics & Regulation
ai_ethics:
  framework: "EU AI Act + Spanish AI Ethics Guidelines"
  authority: "AEPD (Data Protection Agency) + AES (Secretaría de Estado de Digitalización)"
  ethical_principles:
    - "Human agency and oversight"
    - "Technical robustness and safety"
    - "Privacy and data governance"
    - "Transparency and explainability"
    - "Diversity, non-discrimination, fairness"
    - "Societal and environmental wellbeing"
    - "Accountability"
  high_risk_ai_systems: "Registration required with AEPD"
  sandboxes: "Planned (2025) for AI testing in regulated sectors"

