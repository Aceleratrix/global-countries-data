    region: "spain-central (Madrid)"
    launched: 2023
    services: ["Virtual Machines", "Azure AI", "Cosmos DB", "OpenAI Service"]
    compliance: ["GDPR", "ENS High", "ISO 27001"]
    website: "https://azure.microsoft.com/es-es"
  
  - name: "Google Cloud"
    region: "europe-southwest1 (Madrid)"
    launched: 2023
    services: ["Compute Engine", "Vertex AI", "Cloud Storage"]
    compliance: ["GDPR", "ISO 27001"]
    website: "https://cloud.google.com"
  
  - name: "Oracle Cloud"
    region: "eu-madrid-1"
    launched: 2022
    services: ["OCI Compute", "Oracle AI"]
    compliance: ["GDPR"]
    website: "https://www.oracle.com/es/cloud"

