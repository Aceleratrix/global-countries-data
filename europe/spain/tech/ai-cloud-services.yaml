    region: "eu-south-2 (Spain/Madrid)"
    launched: 2022
    services: ["EC2", "S3", "RDS", "Lambda", "Bedrock (AI)"]
    compliance: ["GDPR", "ENS (Esquema Nacional de Seguridad)"]
    website: "https://aws.amazon.com/es"
  
