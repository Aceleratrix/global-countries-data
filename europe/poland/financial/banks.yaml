## Regulatory Authority#
banking_regulator: "ACPR (Autorité de Contrôle Prudentiel et de Résolution)"
website: "https://www.acpr.banque-france.fr"
role: "Banking + insurance supervision (joint with AMF for markets)"

## Cryptocurrency#
crypto_regulation:
  status: "Legal, no ban"
  registration: "Mandatory with AMF (Digital Asset Service Providers - DASP)"
  
  top_exchanges_france:
    - "Coinhouse (French, regulated)"
    - "Paymium (French, Bitcoin pioneer)"
    - "Binance (global, limited French services)"
    - "Kraken (US-based, available)"
    
  crypto_adoption: "4.5M users (7% of population)"
  yearly_volume_eur: 45_000_000_000  # 2025

## Payment APIs (Open Banking)#
open_banking:
  framework: "PSD2 (EU Directive) + DSP2 (French transposition)"
  implementation: "Strong Customer Authentication (SCA) mandatory"
  
  major_providers:
    - "Stripe (dominant for e-commerce)"
    - "PayPlug (French, acquired by PayZen)"
    - "Mangopay (French, marketplace specialist)"
    - "Lyra Network (Toulouse-based, omnichannel)"
    
  api_access: "Open Banking APIs (XS2A) - mandatory for banks >€5M assets"

## Consumer Credit#
consumer_credit:
  regulation: "Loi Lagarde (2010) - responsible lending"
  max_apr_percent: 21.36  # (usury cap, varies by loan type)
  
  top_lenders:
    - "BNP Paribas Personal Finance (Cetelem)"
    - "Crédit Agricole Consumer Finance"
    - "Société Générale Consumer Finance"
    - "La Banque Postale Consumer Finance"
    
  buy_now_pay_later: "Divid (French leader), Alma (Warsaw-based)"

## Investment & Savings#
savings_products:
  - name: "Livret A (储蓄账户)"
    rate_percent: 3.0
    limit_eur: 22_950
    tax_free: true
    users: 55_000_000
    note: "Most popular savings account (state-regulated rate)"
    
  - name: "LDDS (Livret de Développement Durable et Solidaire)"
    rate_percent: 3.0
    limit_eur: 12_000
    tax_free: true
    note: "Sustainable development savings"
    
  - name: "PEL (Plan Épargne Logement - Housing Savings)"
    rate_percent: 1.0-2.5
    limit_eur: 61_200
    note: "Housing purchase savings (state bonus)"
    
  - name: "Assurance Vie (人寿保险)"
    assets_eur: 1_900_000_000_000
    tax_advantage: "Favorable (after 8 years, 23% tax on gains)"
    note: "Most popular investment vehicle in Poland"

