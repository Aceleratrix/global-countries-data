# Banks & Payment Systems - Poland#

## Central Bank#
central_bank: "Banque de Poland (法兰西银行)"
website: "https://www.banque-france.fr"
governor: "François Villeroy de Galhau"
role: "Monetary policy, financial stability, banking supervision"

## IBAN Format#
iban:
  format: "PLkk BBBB BGGG GGCC CCCC CCCC KK"
  length: 27
  example: "PL76 3000 6000 0112 3456 7890 123"
  validation_regex: "^PL\\d{2}\\d{4}\\d{4}\\d{4}\\d{4}\\d{4}\\d{2}$"
  sepa_compliant: true

