## Payment Systems#
payment_systems:
  - name: "Cartes Bancaires (CB - 银行卡)"
    market_share: 95  # percentage of card payments
    users: 65_000_000
    transaction_volume_eur: 950_000_000_000  # 2025
    note: "MANDATORY for French businesses (domestic scheme)"
    features: "Debit/credit, contactless, online payments"
    
  - name: "SEPA (Single Euro Payments Area)"
    type: "Bank transfer"
    share_of_payments: 65  # percentage of non-cash payments
    volume_annual: 4_200_000_000  # transactions
    note: "Euro-denominated, cross-EU (1-day to instant)"
    
  - name: "Instant Payments (SEPA Instant)"
    launched: "2018"
    share_of_sepa: 35  # percentage of SEPA transfers
    speed: "Under 10 seconds, 24/7/365"
    limit_eur: 100_000  # per transaction
    
  - name: "PayPal"
    users: 32_000_000
    share_ecommerce: 25  # percentage
    note: "Popular for cross-border, eBay"
    
  - name: "Apple Pay / Google Pay"
    users: 28_000_000
    growth: 35  # percentage YoY
    note: "Contactless mobile payments (NFC)"
    
  - name: "Lydia / Paylib"
    users: 8_000_000
    type: "P2P mobile payments (French startups)"
    note: "Popular among students, young adults"

