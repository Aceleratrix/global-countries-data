## Compliance & Regulations#
content_regulation:
  authority: "ARPP (Autorité de Régulation Professionnelle de la Publicité)"
  rules:
    - "Code de la Consommation (consumer protection)"
    - "No misleading claims, social responsibility"
    - "Alcohol/tobacco ads restricted"
    - "Influencer transparency: #pub #sponsorisé MANDATORY"
    
  digital_services_act:
    - "DSA applies (Feb 2024, EU regulation)"
    - "VLOPs (Very Large Online Platforms) need audits"
    
  penalties:
    - "ARPP: ad withdrawal, compliance"
    - "DGCCRF: up to €300K fines (consumer fraud)"
    - "CNIL: up to €20M or 4% revenue (GDPR violation)"

