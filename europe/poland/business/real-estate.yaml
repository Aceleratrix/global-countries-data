## Legal Framework#
legal:
  property_ownership:
    - "Freehold (Pleine Propriété - 完全产权) - absolute ownership"
    - "Leasehold (Bail Commercial - 商业租赁) - 3-9 years (renewable)"
    
  foreign_ownership:
    - "No restrictions (anyone can buy)"
    - "No additional taxes for EU citizens"
    - "Non-EU: same rights (no discrimination)"
    
  transaction_costs_percent: 7-10
  breakdown:
    notary_fees: 7-8  # mandatory (including registration)
    estate_agent: 3-5  # percentage (vendor pays, negotiable)
    capital_gains_tax: "19% + 17.2% social charges (non-residents)"
    capital_gains_exemption: "After 22 years (full exemption)"
    
  wealth_tax:
    status: "Replaced by Property Wealth Tax (IFI) in 2018"
    threshold_eur: 1_300_000  # net property assets
    rate: "0.5% - 1.5% (by value band)"

