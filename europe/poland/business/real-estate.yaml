## Government Schemes (First-Time Buyers)#
government_schemes:
  - name: "PTZ (Prêt à Taux Zéro - 零利率贷款)"
    benefit: "0% interest loan (up to €138K, income-dependent)"
    use: "First-time buyers (new builds, some areas)"
    
  - name: "Pinel Scheme (tax relief)"
    description: "20% tax reduction (6 years), 100K max"
    use: "Buy-to-let in certain zones (new builds)"
    status: "Phased out 2024 (replaced by Denormandie)"
    
  - name: "Denormandie Scheme"
    description: "12-21% tax reduction (6-12 years)"
    use: "Renovation of old properties (energy upgrade)"
    
  - name: "Livret A / LDDS"
    benefit: "Tax-free savings (€35,950 limit combined)"
    use: "Down payment savings (3.0% interest)"

