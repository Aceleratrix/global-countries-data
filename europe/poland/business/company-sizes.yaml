# Company Sizes & Types - Poland#

## Company Size Classifications#
classification_standard: "INSEE (National Institute of Statistics) + EU definition"

### Micro Enterprises (TPE - Très Petites Entreprises)#
micro_enterprises:
  - category: "Auto-entrepreneur (自雇 - 自雇经营者)"
    employees: "0-9 (usually 1)"
    turnover_eur: "< €176,200 (services) or < €352,400 (retail)"
    count: 2_100_000
    share_percent: 53.8
    note: "Simplified regime, flat tax (12.8% or 22%)"
    
  - category: "Micro-enterprise (non-auto)"
    employees: "1-9"
    turnover_eur: "< €2M"
    balance_sheet_eur: "< €2M"
    count: 1_200_000
    share_percent: 30.8

### Small & Medium Enterprises (PME - Petites et Moyennes Entreprises)#
smes:
  - category: "Small Enterprise (Petite Entreprise)"
    employees: "10-49"
    turnover_eur: "€2M - €10M"
    balance_sheet_eur: "€2M - €10M"
    count: 400_000
    share_percent: 10.3
    
  - category: "Medium Enterprise (Moyenne Entreprise)"
    employees: "50-249"
    turnover_eur: "€10M - €50M"
    balance_sheet_eur: "€10M - €43M"
    count: 45_000
    share_percent: 1.2

### Large Enterprises (GE - Grandes Entreprises)#
large_enterprises:
  employees: "250+"
  turnover_eur: "> €50M"
  balance_sheet_eur: "> €43M"
  count: 7_200
  share_percent: 0.2

total_smes: 3_900_000
employment_sme: 14_200_000  # 66% of total private sector employment

## Company Types (Legal Forms)#
company_types:
  - name: "SAS (Société par Actions Simplifiée - 简化股份公司)"
    min_directors: 1
    max_shareholders: "Unlimited"
    min_capital: "€1 (recommended €1,000+)"
    use_case: "Startups, scale-ups, foreign subsidiaries"
    count: 450_000
    note: "Flexible governance, popular for innovation"
    
  - name: "SARL (Société à Responsabilité Limitée - 有限责任公司)"
    min_directors: 1
    max_shareholders: 100
    min_capital: "€1 (recommended €1,000+)"
    use_case: "SMEs, family businesses, traditional companies"
    count: 1_500_000
    note: "Most common form for SMEs"
    
  - name: "SA (Société Anonyme - 股份有限公司)"
    min_directors: 3
    min_shareholders: 2 (or 7 for listed)
    min_capital: "€37,000 (at least 50% paid up)"
    use_case: "Large companies, IPO-ready"
    count: 12_000
    note: "Listed companies, corporate governance strict"
    
  - name: "Auto-entrepreneur (自雇)"
    features: "Single owner, simplified accounting, flat tax"
    registration: "Online via URSSAF (free)"
    use_case: "Freelancers, consultants, small traders"
    count: 2_100_000
    
  - name: "EURL (Entreprise Unipersonnelle à Responsabilité Limitée)"
    features: "Single-person SARL"
    min_capital: "€1 (recommended €1,000+)"
    use_case: "Solo entrepreneurs wanting limited liability"
    count: 250_000
    
  - name: "SNC (Société en Nom Collectif - 普通合伙)"
    min_partners: 2
    features: "Joint unlimited liability"
    use_case: "Family businesses, small partnerships"
    count: 35_000

## Foreign Investment Vehicles#
foreign_investment:
  - type: "French Subsidiary (SAS/SARL/SA)"
    description: "French-registered company, owned by foreign parent"
    fdi_route: "Automatic (no restrictions in most sectors)"
    timeline: "1-2 weeks (SAS most popular for foreigners)"
    
  - type: "Branch Office (Succursale)"
    description: "French branch of foreign company"
    registration: "With RCS (Registre du Commerce et des Sociétés)"
    use_case: "Banks, insurance (regulated sectors)"
    
  - type: "Representative Office"
    description: "Liaison office (no trading allowed)"
    use_case: "Market research, pre-entry"

