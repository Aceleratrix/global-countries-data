## Registration Process#
business_registration:
  authority: "Greffe du Tribunal de Commerce (RCS)"
  online_platform: "Guichet-entreprises.fr"
  timeline: "3-7 days (online), 2-3 weeks (post)"
  
steps:
  - "Company name check (INPI - intellectual property office)"
  - "Register directors, shareholders, registered office"
  - "Draft statutes (statuts)"
  - "Deposit capital in blocked account (if required)"
  - "Publish formation notice in legal gazette (BODACC)"
  - "File with RCS (Registre du Commerce)"
  - "VAT registration (if >€85K turnover)"
  - "URSSAF registration (payroll, social charges)"

costs:
  registration_fee: "€200-500 (by company type)"
  legal_notice: "€150-300 (BODACC publication)"
  capital_deposit: "€0-37,000 (by company type)"

## Tax & Compliance#
tax_filing:
  corporate_tax: "Online via impots.gouv.fr (3 months after year-end)"
  vat: "Monthly or quarterly (impots.gouv.fr)"
  social_charges: "Monthly/quarterly (URSSAF)"
  
required_filings:
  annual_accounts: "Must file with Greffe within 7 months of year-end"
  tax_return: "CVAE (business value-add tax), CFE (property tax)"
  consolidated_accounts: "For groups (EU parent + subsidiaries)"

## SIREN & SIRET Numbers#
siren_siret:
  siren:
    description: "9-digit unique identifier (company level)"
    format: "123 456 789"
    use: "All official documents, tax filings"
    
  siret:
    description: "14-digit identifier (establishment level)"
    format: "123 456 789 01234"
    use: "Invoices, payroll, establishment-specific filings"
    
  issuance: "Automatic at registration (INSEE)"
  timeline: "Same day (online registration)"

