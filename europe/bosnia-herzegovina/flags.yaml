flag_description: "Three equal horizontal bands of blue (top), yellow, and green with a white diamond shape centered on the flag. The diamond contains the coat of arms of Bosnia and Herzegovina."
adopted_date: "1998-02-04"
colors:
  - "Blue"
  - "Yellow"
  - "Green"
  - "White"
symbolism: "Blue represents the sky, yellow represents the sun/minerals, green represents the land, white diamond represents peace. The coat of arms features three gold fleurs-de-lis (symbol of Bosniaks) and two white stripes (symbol of Croats and Serbs)."
aspect_ratio: "1:2"
