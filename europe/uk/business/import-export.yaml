## New Free Trade Agreements (Post-Brexit)#
ftas:
  - name: "UK-EU Trade and Cooperation Agreement (TCA)"
    effective: "2021-01-01"
    benefits: "Zero tariffs/quotas (with Rules of Origin)"
    
  - name: "UK-Australia FTA"
    effective: "2023-05-31"
    benefits: "Phased tariff elimination (5-15 years)"
    
  - name: "UK-New Zealand FTA"
    effective: "2023-05-31"
    benefits: "Phased tariff elimination"
    
  - name: "CPTPP (Comprehensive Progressive Trans-Pacific Partnership)"
    joined: "2023-07-16"
    members: "Japan, Canada, Australia, Mexico, etc. (11 countries)"
    benefits: "Market access across Pacific Rim"
    
  - name: "UK-Singapore Digital Economy Agreement (DEA)"
    effective: "2022-06-14"
    benefits: "Digital trade facilitation"

## Import Requirements#
import_licensing:
  general_rule: "No license for most goods (open trade regime)"
  restricted_goods:
    - "Firearms & ammunition"
    - "Narcotics & controlled drugs"
    - "Certain chemicals (dual-use)"
    - "Endangered species (CITES)"
    - "Food & agricultural products (health certificates)"

## Documentation#
required_documents:
  - "Customs Declaration (CDS - Customs Declaration Service)"
  - "Commercial Invoice"
  - "Packing List"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (for FTA benefits)"
  - "EORI Number (Economic Operator Registration & Identification)"
  - "SPS Certificate (for food/plants/animals)"

## EORI Number#
eori:
  description: "12-character identifier (GB + 9 digits + suffix)"
  format: "GB123456789000"
  use: "All customs declarations (MANDATORY since Brexit)"
  application: "Online via HMRC (gov.uk)"
  timeline: "3-5 working days"

## Export Controls#
export_controls:
  authority: "Department for Business and Trade (DBT)"
  controlled_items:
    - "Dual-use items (military + civilian)"
    - "Military equipment (Strategic Export Control Lists)"
    - "Torture goods (restricted)"
    - "Cultural goods (over 50 years old)"
    
  export_licenses:
    - "Standard Individual Export Licence (SIEL)"
    - "Open General Export Licence (OGEL) - for low-risk"
    - "Open Individual Export Licence (OIEL)"

