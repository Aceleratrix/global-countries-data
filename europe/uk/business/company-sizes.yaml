## Registration Process#
business_registration:
  authority: "Companies House (公司注册局)"
  online_platform: "Companies House WebFiling"
  timeline: "24 hours (online), 5-10 days (post)"
  
steps:
  - "Company name check (availability)"
  - "Register directors, shareholders, registered office"
  - "Memorandum + Articles of Association"
  - "Pay £12 (online) or £40 (post)"
  - "Corporation Tax registration (within 3 months)"
  - "VAT registration (if turnover >£85K)"
  - "PAYE registration (if hiring employees)"

## Tax & Compliance#
tax_filing:
  corporation_tax: "Online via HMRC (12 months after year-end)"
  vat: "Quarterly (MTD - Making Tax Digital)"
  paye: "Monthly/quarterly (employer duties)"
  
companies_house_requirements:
  annual_confirmation_statement: "Every 12 months (£13 online)"
  annual_accounts: "9 months after year-end (for Ltd/PLC)"

## Unique Taxpayer Reference (UTR)#
utr:
  description: "10-digit unique identifier (mandatory for all companies)"
  format: "12345 67890"
  use: "All tax filings, HMRC correspondence"
  penalty: "Failure to quote = £100 penalty"

