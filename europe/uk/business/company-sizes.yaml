# Company Sizes & Types - United Kingdom#

## Company Size Classifications#
classification_standard: "Companies House + FSB (Federation of Small Businesses)"

### Small and Medium Enterprises (SMEs)#
sme_definition:
  - category: "Micro Enterprise"
    employees: "0-9"
    turnover_gbp: "< £2M"
    balance_sheet_total: "< £2M"
    count: 5_600_000
    share_percent: 96.0
    
  - category: "Small Enterprise"
    employees: "10-49"
    turnover_gbp: "£2M - £10M"
    balance_sheet_total: "£2M - £10M"
    count: 210_000
    share_percent: 3.6
    
  - category: "Medium Enterprise"
    employees: "50-249"
    turnover_gbp: "£10M - £50M"
    balance_sheet_total: "£10M - £43M"
    count: 24_000
    share_percent: 0.4

### Large Enterprises#
large_enterprises:
  employees: "250+"
  turnover_gbp: "> £50M"
  balance_sheet_total: "> £43M"
  count: 7_000
  share_percent: 0.1

total_smes: 5_834_000
employment_sme: 16_800_000  # 61% of total private sector employment

## Company Types (Legal Forms)#
company_types:
  - name: "Private Limited Company (Ltd - 私人有限公司)"
    min_directors: 1
    max_shareholders: "Unlimited (but usually <50 for SMEs)"
    min_capital: "£1 (nominal value)"
    use_case: "Most common for SMEs, startups"
    count: 4_800_000
    
  - name: "Public Limited Company (PLC - 公共有限公司)"
    min_directors: 2
    min_shareholders: 2
    min_capital: "£50,000 (at least 25% paid up)"
    use_case: "Listed companies, IPO-ready"
    count: 7_500
    
  - name: "Limited Liability Partnership (LLP)"
    min_partners: 2
    features: "Limited liability, flexible profit sharing"
    use_case: "Professional services (law, accounting, consulting)"
    count: 45_000
    
  - name: "Sole Trader (个体经营者)"
    features: "Single owner, unlimited liability"
    registration: "With HMRC (not Companies House)"
    use_case: "Freelancers, small shops, consultants"
    count: 3_500_000  # not all registered
    
  - name: "Partnership (普通合伙)"
    min_partners: 2
    max_partners: "No limit"
    features: "Joint liability (unlimited)"
    use_case: "Small professional firms, family businesses"
    count: 85_000
    
  - name: "Community Interest Company (CIC)"
    purpose: "Social enterprises, community benefit"
    taxation: "Asset lock, some tax advantages"
    use_case: "Social enterprises, charities with trading"
    count: 25_000

## Foreign Investment Vehicles#
foreign_investment:
  - type: "UK Subsidiary (Ltd/PLC)"
    description: "UK-registered company, owned by foreign parent"
    fdi_route: "Automatic (no restrictions in most sectors)"
    timeline: "1-2 weeks"
    
  - type: "Branch Office"
    description: "UK branch of foreign company"
    registration: "With Companies House + HMRC"
    use_case: "Banks, insurance (regulated sectors)"
    
  - type: "Representative Office"
    description: "Liaison office (no trading allowed)"
    use_case: "Market research, pre-entry"

