# Phone & Telecom Formats - United Kingdom

## Country Code
country_calling_code: "+44"
international_prefix: "00"
trunk_prefix: "0"
e164_format: true

## Mobile Phone Format
mobile_format:
  pattern: "+44 7XXX XXX XXX"
  length: 10  # digits (after removing leading 0)
  example: "+44 7700 900123"
  regex: "^(\\+44)?7\\d{9}$"
  
mobile_prefixes:
  - prefix: "07XXX"
    operators: ["EE", "O2", "Vodafone", "Three", "Tesco Mobile", "Giffgaff"]
    note: "All UK mobile numbers start with 07XXX"

## Landline Format
landline_format:
  pattern: "+44 (area code) XXX XXXX"
  area_code_length: 2-5  # varies by region
  local_number_length: 4-8
  example: "+44 20 7946 0123"  # London
  regex: "^(\\+44)?(1\\d{8,9}|2\\d{8,9})$"
  
major_city_codes:
  london: "20"
  birmingham: "121"
  manchester: "161"
  glasgow: "141"
  liverpool: "151"
  edinburgh: "131"
  cardiff: "29"
  belfast: "28"

## Toll-Free Numbers
toll_free:
  prefixes: ["0800", "0808"]
  format: "+44 800 XXX XXXX"
  note: "Free to caller from all UK landlines and mobiles"
  availability: "Available to businesses via telecom operators"

## Special Service Numbers
emergency:
