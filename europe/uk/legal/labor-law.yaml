  - "Redundancy: half-1.5 weeks pay/year (max £19,290 payout)"
  - "Maternity: 52 weeks leave, SMP £184.03/week (26 weeks service)"
  - "Zero-hours contracts: controversial, being reformed (2024-2026)"
  - "Notice period: 1 week - 12 weeks (by tenure)"
  - "Non-compete: enforceable if reasonable (6-12 months typical)"
  - "Skilled Worker Visa: £38,700 min salary (from April 2024)"
