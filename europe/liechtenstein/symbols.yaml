# National Symbols
flag_description: "Two equal horizontal stripes (blue top, red bottom) with a gold crown centered on the blue stripe"
coat_of_arms: "Gold crown above a gold eagle with a red shield, surrounded by ermine fur and gold lettering 'Fürstentum Liechtenstein'"
national_anthem: "Oben am jungen Rhein (High on the Young Rhine)"
national_animal: "None official (Golden eagle is commonly associated)"
national_flower: "Edelweiss (unofficial)"
national_colors: "Blue, red, gold"
royal_motto: "Für Gott, Fürst und Vaterland (For God, Prince and Fatherland)"
