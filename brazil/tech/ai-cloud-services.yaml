# Incentivos Fiscais para IA/Tech
tax_incentives:
  - name: "Lei do Bem (Lei 11.196/2005)"
    description_pt: "Incentivos para P&D em tecnologia (abatimento de IR)"
    description_en: "R&D incentives for technology (corporate tax relief)"
    benefit_percent: "60-80% de abatimento em P&D"
    benefit_en: "60-80% relief on R&D expenses"
    eligible_activities_pt: ["Desenvolvimento de software", "Pesquisa em IA", "Inovação"]
    eligible_activities_en: ["Software development", "AI research", "Innovation"]
    
  - name: "Startups Law (Lei 14.195/2021)"
    description_pt: "Quadro legal para startups (redução de burocracia)"
    description_en: "Legal framework for startups (reduced bureaucracy)"
    benefits_pt: ["Registro simplificado", "Contratos com governo", "Stock options"]
    benefits_en: ["Simplified registration", "Government contracts", "Stock options"]
    
  - name: "Innovation Zones (Zonas de Inovação)"
    description_pt: "Regiões com benefícios fiscais para tech (ex: Porto Digital - PE)"
    description_en: "Regions with tax benefits for tech (e.g., Porto Digital - PE)"
    examples_pt: ["Porto Digital (Recife)", "San Pedro Valley (BH)", "São Paulo Tech Hub"]
    examples_en: ["Porto Digital (Recife)", "San Pedro Valley (BH)", "São Paulo Tech Hub"]

