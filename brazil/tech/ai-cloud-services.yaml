# Provedores de GPU para Treinamento de Modelos
gpu_providers:
  - provider: "AWS EC2 (P instances)"
    gpus_available: ["NVIDIA A100", "V100", "T4"]
    pricing_usd_hour: [0.40, 32.77]  # T4 to A100
    spot_instances: true
    region: "sa-east-1"
    
  - provider: "Google Cloud (A2 machines)"
    gpus_available: ["NVIDIA A100", "T4"]
    pricing_usd_hour: [0.35, 28.50]
    preemptible: true
    region: "southamerica-east1"
    
  - provider: "Azure (NC/NV series)"
    gpus_available: ["NVIDIA A100", "K80", "T4"]
    pricing_usd_hour: [0.40, 29.00]
    region: "Brazil South"
    
  - provider: "Lambda Labs"
    description_pt: "GPU cloud especializado (sem região no Brasil)"
    description_en: "Specialized GPU cloud (no Brazil region)"
    gpus_available: ["NVIDIA H100", "A100", "RTX 4090"]
    latency_to_br_ms: 150

