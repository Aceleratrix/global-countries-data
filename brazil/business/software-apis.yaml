    website: "https://developers.b2wmarketplace.com.br"
    type: "Marketplace API"
    marketplaces_pt: ["Americanas", "Submarino", "Shoptime"]
    marketplaces_en: ["Americanas", "Submarino", "Shoptime"]
    api_features_pt: ["Catálogo", "Pedidos", "Estoque", "Preços"]
    api_features_en: ["Catalog", "Orders", "Inventory", "Pricing"]
    
  - name: "Magalu API"
    website: "https://www.magalu.com.br/dev"
    type: "Marketplace API"
    features_pt: ["Gestão de pedidos", "Estoque", "Preços", "Fulfillment"]
    features_en: ["Order management", "Inventory", "Pricing", "Fulfillment"]
    
  - name: "Mercado Livre API"
    website: "https://developers.mercadolivre.com.br"
    type: "Marketplace API"
    market_share_percent: 65.0
    api_features_pt: ["Publicaão de itens", "Gestão de pedidos", "Perguntas", "Envios"]
    api_features_en: ["Item listing", "Order management", "Questions", "Shipping"]

# KYC e Verificação de Identidade (Para Onboarding)
kyc_services:
  - provider: "Serpro (Governo Federal)"
    service: "Consulta CPF/CNPJ"
    website: "https://www.serpro.gov.br"
    api_available: true
    use_cases_pt: ["Verificação de identidade", "Validação de documentos"]
    use_cases_en: ["Identity verification", "Document validation"]
    cost_per_query_brl: 0.50
    
  - provider: "Serasa Experian"
    service: "Serasa Consumidor / Serasa Empresas"
    website: "https://www.serasa.com.br"
    api: "https://developers.serasa.com.br"
    features_pt: ["Score de crédito", "Consulta CPF/CNPJ", "Anti-fraude"]
    features_en: ["Credit score", "CPF/CNPJ query", "Anti-fraud"]
    
  - provider: "DocuSign/Verify"
    service: "Verificação de Documentos"
    website: "https://www.docusign.com.br/verify"
    features_pt: ["Verificação de ID", "Selfie check", "Comprovação de endereço"]
    features_en: ["ID verification", "Selfie check", "Address proof"]
    
  - provider: "Unico (antiga Catho ID)"
    service: "Reconhecimento facial e documental"
    website: "https://unico.io"
    api: "https://docs.unico.io"
    features_pt: ["FaceAuth", "DocumentAuth", "Pix com biometria"]
    features_en: ["FaceAuth", "DocumentAuth", "PIX with biometrics"]

# Cobrança e Recuperação de Crédito
debt_collection:
  - name: "Serasa Limpa Nome"
    website: "https://www.serasa.com.br/limpa-nome"
    type: "Negociação de dívidas"
    api: false
    use_for_business_pt: "Recuperação de crédito de clientes"
    use_for_business_en: "Customer credit recovery"
    
  - name: "SPC Brasil"
    website: "https://www.spcbrasil.org.br"
    type: "Consulta de crédito"
    api: "https://www.spcbrasil.org.br/desenvolvedores"
    features_pt: ["Score de crédito", "Alertas de inadimplência"]
    features_en: ["Credit score", "Default alerts"]
    
  - name: "Recovery\" (Boleto recovery)"
    website: "https://www.recovery.com.br"
    type: "Recuperação de boletos vencidos"
    integration_pt: ["Boleto", "PIX", "Cartão"]
    integration_en: ["Boleto", "PIX", "Credit Card"]

