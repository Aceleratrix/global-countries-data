version: 1.0.0
country: brazil
last_updated: 2026-04-30
description: "Softwares de gestão, contabilidade e ERPs para empresas brasileiras"

# Softwares de Contabilidade (Integração Fiscal)
accounting_software:
  - name: "ContaAzul"
    website_pt: "https://www.contaazul.com"
    website_en: "https://www.contaazul.com/en"
    type: "Cloud ERP"
    target: "Micro e Pequenas Empresas (ME/EPP)"
    features_pt: ["Emissão de NF-e/NFS-e", "Contabilidade automática", "PIX", "Boleto"]
    features_en: ["NF-e/NFS-e issuance", "Automatic accounting", "PIX", "Boleto"]
    api: "https://developers.contaazul.com"
    pricing_brl_month: [99, 299, 599]
    
  - name: "Bling"
    website: "https://www.bling.com.br"
    type: "Cloud ERP"
    target: "E-commerce e Varejo"
    features_pt: ["Integração com Marketplaces", "NF-e", "Estoque", "PIX"]
    features_en: ["Marketplace integration", "NF-e", "Inventory", "PIX"]
    api: "https://developers.bling.com.br"
    pricing_brl_month: [129, 269, 499]
    
  - name: "Tiny ERP"
    website: "https://www.tiny.com.br"
    type: "Cloud ERP"
    target: "E-commerce"
    features_pt: ["Multi-loja", "Integração Mercado Livre", "NF-e", "Bling"]
    features_en: ["Multi-store", "Mercado Livre integration", "NF-e", "Bling"]
    api: "https://developers.tiny.com.br"
    pricing_brl_month: [199, 399, 699]
    
  - name: "Omie"
    website: "https://www.omie.com.br"
    type: "Cloud ERP"
    target: "Pequenas e Médias Empresas"
    features_pt: ["Financeiro", "Fiscal", "Vendas", "CRM"]
    features_en: ["Financial", "Fiscal", "Sales", "CRM"]
    api: "https://developers.omie.com.br"
    pricing_brl_month: [89, 199, 399]
    
  - name: "eNotas"
    website: "https://www.enotas.com.br"
    type: "NFS-e Specialized"
    target: "Prestadores de Serviço"
    features_pt: ["Emissão de NFS-e", "API REST", "Multi-cidade"]
    features_en: ["NFS-e issuance", "REST API", "Multi-city"]
    api: "https://docs.enotas.com.br"
    pricing_brl_month: [49, 99, 199]

# ERPs para Médias e Grandes Empresas
enterprise_erps:
  - name: "SAP Brasil"
    website: "https://www.sap.com/brazil"
    type: "Enterprise ERP"
    target: "Grandes Empresas"
    modules_pt: ["FI (Financeiro)", "CO (Controladoria)", "SD (Vendas)", "MM (Materiais)"]
    modules_en: ["FI (Finance)", "CO (Controlling)", "SD (Sales)", "MM (Materials)"]
    cloud_version: "SAP S/4HANA Cloud"
    implementation_partners_pt: ["Accenture", "Deloitte", "EY", "PwC"]
    implementation_partners_en: ["Accenture", "Deloitte", "EY", "PwC"]
    
  - name: "TOTVS (Protheus/Linxx)"
    website: "https://www.totvs.com.br"
    type: "Enterprise ERP"
    target: "Médias e Grandes Empresas"
    market_share_percent: 45.0
    modules_pt: ["Financeiro", "Compras", "Estoque", "Fiscal", "RH"]
    modules_en: ["Financial", "Purchasing", "Inventory", "Fiscal", "HR"]
    cloud_version: "TOTVS Cloud"
    
  - name: "Oracle NetSuite"
    website: "https://www.netsuite.com.br"
    type: "Cloud ERP"
    target: "Médias Empresas"
    features_pt: ["Financeiro", "CRM", "E-commerce", "Suporte multi-moeda"]
    features_en: ["Financial", "CRM", "E-commerce", "Multi-currency support"]
    pricing_usd_month: [999, 2000, 4000]

# Softwares de Gestão de E-commerce
