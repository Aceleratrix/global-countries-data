description: "Portes de empresa e classificação segundo a legislação brasileira"

# Definições de porte de empresa (Lei Complementar 123/2006 e Lei 14.195/2021)
# Fonte: Sebrae, Receita Federal

company_sizes:
  - size: "micro"
    name_pt: "Microempresa (ME)"
    name_en: "Micro Enterprise"
    revenue_brl_annual:
      max: 360000
      max_usd: 72000
    revenue_monthly_brl:
      max: 30000
    employees:
      max: 9
      typical_range: [1, 5]
    tax_regime: "SIMPLES NACIONAL"
    tax_rate_range_percent: [6.0, 14.8]
    cnae_restrictions: false
    benefits:
      - "Simplificação tributária"
      - "Menos obrigações acessórias"
      - "Abertura mais rápida"
    percentage_of_total_percent: 53.0  # % das empresas brasileiras
    
  - size: "small"
    name_pt: "Empresa de Pequeno Porte (EPP)"
    name_en: "Small Business"
    revenue_brl_annual:
      min: 360000.01
      max: 3600000
      max_usd: 720000
    revenue_monthly_brl:
      min: 30000.01
      max: 300000
    employees:
      min: 10
      max: 99
      typical_range: [10, 50]
    tax_regime: "SIMPLES NACIONAL"
    tax_rate_range_percent: [6.0, 14.8]
    cnae_restrictions: false
    benefits:
      - "Simplificação tributária"
      - "Acesso a linhas de crédito especiais"
    percentage_of_total_percent: 28.0
    
  - size: "medium"
    name_pt: "Média Empresa"
    name_en: "Medium Enterprise"
    revenue_brl_annual:
      min: 3600000.01
      max: 78000000
      max_usd: 15600000
    revenue_monthly_brl:
      min: 300000.01
      max: 6500000
    employees:
      min: 100
      max: 499
      typical_range: [100, 300]
    tax_regime: ["LUCRO PRESUMIDO", "LUCRO REAL"]
    tax_rate_range_percent: [11.3, 34.0]
    cnae_restrictions: false
    benefits:
      - "Acesso a mercado de capitais"
      - "Crédito corporativo"
    percentage_of_total_percent: 14.0
    
  - size: "large"
    name_pt: "Grande Empresa"
    name_en: "Large Enterprise"
    revenue_brl_annual:
      min: 78000000.01
      max: null  # Sem limite
      min_usd: 15600000
    revenue_monthly_brl:
      min: 6500000.01
      max: null
    employees:
      min: 500
      typical_range: [500, 10000]
    tax_regime: ["LUCRO REAL"]
    tax_rate_range_percent: [25.0, 34.0]
    cnae_restrictions: false
    benefits:
      - "Abertura de capital (IPO)"
      - "Acesso a dívida internacional"
    percentage_of_total_percent: 5.0
    
  - size: "mei"
    name_pt: "Microempreendedor Individual (MEI)"
    name_en: "Individual Microentrepreneur"
    revenue_brl_annual:
      max: 81000
      max_usd: 16200
    revenue_monthly_brl:
      max: 6750
    employees:
      max: 0  # Não pode ter funcionários registrados (apenas autônomo)
    tax_regime: "SIMPLES NACIONAL - MEI"
    tax_rate_fixed_brl_month: 75.00  # Valor fixo mensal (~US$ 15)
    cnae_restrictions: true  # Apenas atividades permitidas
    benefits:
      - "Imposto fixo e baixo"
      - "Sem burocracia"
      - "Acesso a INSS"
    percentage_of_total_percent: 47.0  # Dos novos CNPJs

