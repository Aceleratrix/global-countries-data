# Métodos de pagamento aceitos
payment_methods:
  - name: "PIX"
    type: "instant_payment"
    mandatory_for_business: true
    operating_hours: "24/7"
    limit_per_transaction_brl: null  # Sem limite
    limit_daily_brl: 20000  # Limite padrão, ajustável
    fees_merchant_percent: 0.0  # Gratuito para lojistas
    qr_code: true
    key_types:
      - "CPF"
      - "CNPJ"
      - "Email"
      - "Telefone"
      - "Chave Aleatória (UUID)"
    api_integration: true
    regulatory: "Banco Central do Brasil"
    launched: "2020-11-16"
    
  - name: "Boleto Bancário"
    type: "slip"
    mandatory_for_business: false
    processing_time_hours: "24-72"
    fees_merchant_percent: 1.5  # Varia por banco
    barcode: true
    digital_boleto: true
    expiration_days: 3  # Padrão, configurável
    regulation: "FEBRABAN"
    
  - name: "Cartão de Crédito"
    type: "credit_card"
    mandatory_for_business: false
    brands:
      - "Visa"
      - "Mastercard"
      - "Elo"
      - "American Express"
      - "Hipercard"
    installments_allowed: true
    max_installments: 12
    fees_merchant_percent: 3.5  # Varia 2-5%
    debit_card_allowed: true
    
  - name: "Débito Automático"
    type: "direct_debit"
    mandatory_for_business: false
    bank_account_required: true
    authorization: "Cliente deve autorizar"
    
  - name: "Transferência Bancária (TED/DOC)"
    type: "bank_transfer"
    mandatory_for_business: false
    operating_hours: "06:00-22:00"  # Dias úteis
    same_day: true
    fees: "Varia por banco"
    
  - name: "Dinheiro em Espécie"
    type: "cash"
    mandatory_for_business: false
    reporting_threshold_brl: 10000  # Deve ser reportado ao fisco

