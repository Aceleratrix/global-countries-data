# History data for Ethiopia
country: Ethiopia
key_dates:
  - year: 1974
    event: Overthrow of Emperor Haile Selassie, end of monarchy
  - year: 1987
    event: Establishment of People's Republic of Ethiopia
  - year: 1991
    event: EPRDF takes power, transitional government formed
  - year: 1995
    event: Current Federal Democratic Republic constitution adopted
  - year: 2018
    event: Abiy Ahmed becomes Prime Minister, reforms launched
  - year: 2020
    event: Tigray War begins
  - year: 2022
    event: Tigray peace agreement signed
notable_fact: One of the only two African countries never fully colonized (alongside Liberia)