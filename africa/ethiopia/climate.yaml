    temperature_range: "10-20°C"
    rainfall: "1200-2000mm annually"
  - zone: "Warm highlands"
    elevation: "1500-2400m"
    temperature_range: "15-25°C"
    rainfall: "800-1200mm annually"
  - zone: "Lowlands"
    elevation: "Below 1500m"
