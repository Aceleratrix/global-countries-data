# Tourism data for Gabon
country: Gabon
tourist_arrivals_annual: ~200000 (pre-pandemic)
main_attractions:
  - Loango National Park (surfing hippos, elephants on beach)
  - Lopé National Park (UNESCO World Heritage Site)
  - Ivindo National Park (waterfalls, rainforests)
  - Libreville (capital city, beaches)
  - Port-Gentil (oil hub, beaches)
visa_policy: Visa on arrival for many countries, e-visa available
tourism_contribution_percent_gdp: ~3%
best_time_to_visit: June to September (dry season)
