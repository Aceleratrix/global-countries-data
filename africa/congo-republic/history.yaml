country: Republic of Congo
colonial_period: French Congo (1882-1960)
independence: 1960-08-15
key_events:
  - 1963: overthrow of President Fulbert Youlou
  - 1968: Marien Ngouabi takes power, establishes socialist state
  - 1977: Ngouabi assassinated
  - 1992: multiparty elections, Pascal Lissouba elected
  - 1997: Civil war, Denis Sassou-Nguesso returns to power
  - 2002: New constitution adopted
  - 2015: Constitutional referendum allowing Sassou-Nguesso to run for third term
  - 2021: Anatole Collinet Makosso appointed Prime Minister
