country: Republic of Congo
national_symbols:
  flag: Green, yellow, red horizontal stripes with red star in center
  anthem: La Congolaise
  animal: Okapi (unofficial)
  bird: African grey parrot (unofficial)
cuisine: Cassava, plantains, yams, fish, bushmeat; palm wine, ginger beer
music: Soukous, rumba, traditional drumming
festivals:
  - Independence Day (Aug 15)
  - Labour Day (May 1)
  - Youth Day (Apr 16)
sports:
  - Football (most popular)
  - Basketball
  - Athletics
