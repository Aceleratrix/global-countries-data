key_events:
  - "1480s: Maravi Kingdom established (origin of Chewa people)"
  - "1859: David Livingstone explores Lake Malawi"
  - "1891: British declare protectorate of Nyasaland"
  - "1953-1963: Part of Federation of Rhodesia and Nyasaland"
  - "1964-07-06: Independence as Malawi, Hastings Kamuzu Banda becomes prime minister"
  - "1966: Declared republic, Banda becomes president for life"
  - "1994: First multiparty elections, Bakili Muluzi elected president"
  - "2020: Lazarus Chakwera wins presidential election (rerun after court annulled 2019 result)"
