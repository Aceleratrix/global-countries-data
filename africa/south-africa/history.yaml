key_events:
  - "1652: Dutch East India Company establishes Cape Colony"
  - "1806: British take control of Cape Colony"
  - "1910: Union of South Africa formed (British dominion)"
  - "1948: Apartheid system introduced"
  - "1961: Becomes republic, leaves Commonwealth"
  - "1990: Nelson Mandela released from prison"
  - "1994: First democratic elections, Mandela becomes president"
  - "2010: Hosts FIFA World Cup"