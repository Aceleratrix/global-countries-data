# Government Data for Tunisia
government_type: Unitary semi-presidential constitutional republic
head_of_state: President (Kais Saied, 2019-present)
head_of_government: Prime Minister (Ahmed Hachani, 2023-present)
administrative_divisions: 24 governorates
independence: 1956-03-20 (from France)
legal_system: Mixed legal system based on French civil law and Islamic law
