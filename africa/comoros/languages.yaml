country: Comoros
languages_official:
  - Comorian (Shikomori): Bantu language with Arabic influence, spoken by ~95% of population
  - French: Administrative, educational, and business language (inherited from colonial rule)
  - Arabic: Religious and formal contexts, taught in schools
dialects:
  - Ngazidja (Grande Comore)
  - Mwali (Mohéli)
  - Ndzwani (Anjouan)
literacy_rate: 77.8% (2023 est)