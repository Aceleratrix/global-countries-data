country: Comoros
government_type: Federal presidential republic
independence: 1975 (from France)
constitution: Adopted 2001
executive:
  - President (head of state and government)
  - Vice Presidents (3, representing each main island)
legislative:
  - Assembly of the Union (33 seats)
  - Island assemblies (each with local legislative power)
judicial: Supreme Court, Court of Appeals, local courts