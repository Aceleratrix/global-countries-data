# Angola History
key_events:
  - "1483: Portuguese arrive and begin colonization"
  - "1575: Founding of Luanda by Portuguese settlers"
  - "1951: Angola becomes an overseas province of Portugal"
  - "1961: Start of the Angolan War of Independence"
  - "1975-11-11: Independence from Portugal; start of Angolan Civil War"
  - "2002-04-04: End of Angolan Civil War after death of UNITA leader Jonas Savimbi"
  - "2010: New constitution adopted, establishing presidential republic"
  - "2017: João Lourenço elected president, succeeding José Eduardo dos Santos"
major_conflicts:
  - "Angolan War of Independence (1961-1974)"
  - "Angolan Civil War (1975-2002)"