pre_colonial_era:
  - "1000 BCE: Songhai Empire expands into western Niger"
  - "1000 CE: Hausa city-states established (Zinder, Maradi)"
  - "1400s: Tuareg confederations dominate north"
  - "1800s: Sokoto Caliphate extends influence to southwest Niger"
colonial_era:
  - "1900: French establish Military Territory of Niger"
  - "1922: Becomes French colony as part of French West Africa"
  - "1946: Granted status of French overseas territory"
  - "1958: Becomes autonomous republic within French Community"
independence_era:
  - "1960-08-03: Full independence, Hamani Diori becomes first president"
  - "1974-04-15: Military coup led by Seyni Kountché"
  - "1987: Kountché dies, Ali Saibou succeeds"
  - "1993: First multiparty elections, Mahamane Ousmane elected president"
  - "1996-01-27: Military coup led by Ibrahim Baré Maïnassara"
  - "1999-04-09: Maïnassara assassinated, Mamadou Tandja elected"
  - "2010-02-18: Military coup, Tandja ousted"
  - "2011: Mahamadou Issoufou elected president"
  - "2021-04-02: Mohamed Bazoum inaugurated (first peaceful transfer)"
  - "2023-07-26: Military coup deposes Bazoum, CNSP established"