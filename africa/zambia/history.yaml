name: Zambia
pre_colonial_history: Inhabited by Bantu-speaking peoples for centuries
colonial_period: British protectorate (Northern Rhodesia) from 1924 to 1964
independence: 24 October 1964, renamed Zambia
post_independence: Single-party rule until 1991, multi-party democracy since 1991
key_events:
  - 1964: Independence from the United Kingdom
  - 1991: First multi-party elections
  - 2021: Hakainde Hichilema elected president
