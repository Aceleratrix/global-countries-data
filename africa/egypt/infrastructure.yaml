country: Egypt
transport:
  - Suez Canal (major global shipping route)
  - Cairo Metro (first in Africa, 3 lines)
  - 8 international airports (including Cairo International)
  - 4,800 km of railways
energy:
  - Natural gas (primary electricity source, ~80%)
  - Aswan High Dam (hydroelectric, 2.1 GW capacity)
telecom:
  - Mobile penetration: ~95%
  - Internet penetration: ~70%
  - 5G launched in 2022
