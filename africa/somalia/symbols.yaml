# Somalia National Symbols Data
flag:
  description: Light blue field with a white five-pointed star in center
  adopted: 1954-10-12
  ratio: 2:3
national_anthem: "Qolobaa Calankeed" (Arise, O Flag of the Country)
  adopted: 2000
national_emblem: Central shield with leopard, two spears, palm leaves, olive branches
national_animal: Leopard
national_bird: Kori bustard
national_tree: Camel thorn (Acacia bussei)
national_color: Light blue
