history:
  - year: 1956
    event: "Sudan gains independence from UK/Egypt; South Sudanese marginalized in new state"
  - year: 1983
    event: "Second Sudanese Civil War begins (lasts until 2005)"
  - year: 2005
    event: "Comprehensive Peace Agreement (CPA) signed, autonomous Government of Southern Sudan formed"
  - year: 2011
    event: "Independence referendum (98.83% vote for secession), July 9 independence declared"
  - year: 2013
    event: "Civil war breaks out between SPLM factions"
  - year: 2018
    event: "Revitalized Peace Agreement signed"
  - year: 2020
    event: "Transitional Government of National Unity formed"
