pre_colonial: "Inhabited by African populations, used as a stopover for trade before Portuguese arrival"
colonial_period: "Portuguese colonization from 1462, major slave trade hub"
independence_movement: "PAIGC (African Party for the Independence of Guinea and Cape Verde) led struggle"
independence_date: "1975-07-05"
post_independence: "Single-party rule until 1990, multiparty democracy established in 1991"
key_events:
  - "1981: PAIGC splits into separate parties for Guinea-Bissau and Cape Verde"
  - "2001: First peaceful transfer of power between parties"
  - "2013: Official name change from Cape Verde to Cabo Verde"