country: Cabo Verde
government_type: Semi-presidential representative democratic republic
independent_since: 1975-07-05
former_colony: Portugal
capital: Praia
administrative_divisions: 22 municipalities (concelhos)
head_of_state: President
head_of_government: Prime Minister
legislature: National Assembly (Assembleia Nacional), 72 seats
political_parties:
  - African Party for the Independence of Cabo Verde (PAICV)
  - Movement for Democracy (MPD)
  - Democratic and Independent Cape Verdean Union (UCID)
elections:
  presidential: Every 5 years
  legislative: Every 5 years
sovereignty: Full member of UN, African Union, ECOWAS, CPLP
