country: Cabo Verde
official_language: Portuguese
national_language: Kabuverdianu (Creole)
other_languages:
  - English (taught in schools)
  - French (taught in schools)
religion_majority: Roman Catholic
cultural_traditions:
  - Morna music (UNESCO Intangible Cultural Heritage)
  - Coladeira dance
  - Carnival celebrations
  - Feast of Saint John (São João)
national_symbols:
  - Flag: Blue, white, red, yellow with 10 stars
  - Coat of arms: Circle with 10 stars, palm branch, anchor, and torch
  - National anthem: "Cântico da Liberdade"
cuisine:
  - Seafood (tuna, lobster)
  - Cachupa (stew with corn, beans, meat)
  - Grogue (sugarcane spirit)
