## Influencer Marketing (KOL/KOC)
kol_marketing:
  tiers:
    - "Top KOLs (头部KOL): 10M+ followers, ¥1M+ per post"
    - "Mid-tier KOLs (腰部KOL): 1M-10M, ¥100K-1M per post"
    - "Micro KOCs (KOC - 关键意见消费者): <1M, ¥10K-100K per post"
    
  platforms:
    - "Xiaohongshu (lifestyle, beauty, fashion)"
    - "Douyin (short video, live commerce)"
    - "Weibo (news, trends, events)"
    - "Bilibili (tech, gaming, education)"
    
  costs:
    top_kol_mention: "¥500K - ¥5M per campaign"
    live_commerce_commission: "10-30% of sales"

## Search Engines (Baidu Dominates)
search_engines:
  - name: "Baidu (百度)"
    market_share: 65
    features: "Search ads (Baidu Phoenix Nest), Baijiahao content"
  - name: "Bing China (必应)"
    market_share: 18
    features: "International content, English search"
  - name: "360 Search (360搜索)"
    market_share: 10
  - name: "Sogou (搜狗)"
    market_share: 5
    owner: "Tencent (acquired 2021)"

## Email Marketing (Less Relevant)
email_usage:
  penetration: 45  # percentage (much lower than West)
  popular_providers:
    - "QQ Mail (腾讯邮箱) - 1.2B accounts"
    - "163 Mail (网易邮箱) - 300M accounts"
    - "Gmail (blocked, requires VPN)"
  business_use: "WeChat Work (企业微信) preferred over email"

## Content Marketing
content_platforms:
  - name: "WeChat Official Accounts (微信公众号)"
    users: 1_200_000_000
    use: "Long-form content, brand storytelling"
  - name: "Zhihu (知乎 - Quora-like)"
    users: 250_000_000
    use: "Professional Q&A, thought leadership"
  - name: "Baijiahao (百家号 - Baidu)"
    users: 400_000_000
    use: "SEO, content distribution"
  - name: "Toutiao (今日头条 - ByteDance)"
    users: 350_000_000
    use: "News, algorithm-recommended content"

## Live Commerce (Major Trend)
live_commerce:
  market_size_usd: 600_000_000_000  # $600B (2025)
  platforms:
    - "Taobao Live (阿里直播) - 500M viewers"
    - "Douyin Live (抖音直播) - 400M viewers"
    - "Kuaishou Live (快手直播) - 200M viewers"
    - "JD Live (京东直播) - 100M viewers"
  conversion_rate: 8-15  # percentage (much higher than traditional e-commerce)
  top_streamers: "Austin Li (李佳琦), Viya (薇娅), Crazy Brother Yang (疯狂小杨哥)"

## Super Apps Integration
super_apps:
  - name: "WeChat (微信)"
    features: "Chat, Moments, Mini-programs, WeChat Pay, Official Accounts"
    marketing_use: "Mini-programs (light apps), CRM, loyalty programs"
  - name: "Alipay (支付宝)"
    features: "Payments, Mini-programs, credit score (Zhima), gov services"
    marketing_use: "Mini-programs, membership programs"
  - name: "Meituan (美团)"
    features: "Food delivery, local services, hotel booking"
    marketing_use: "Local business advertising, deals"

## Compliance & Censorship
content_regulation:
  authority: "CAC (Cyberspace Administration of China)"
  rules:
    - "Content must comply with 'socialist core values'"
    - "Sensitive topics blocked (politics, religion, ethnicity)"
    - "Real-name registration for all platforms"
    - "Content moderation mandatory (pre-publication review)"
    - "AI-generated content must be labeled"
    
  prohibited_content:
    - "Political dissent, criticism of government"
    - "Pornography, gambling, violence"
    - "Ethnic/religious separatism"
    - "False news, misinformation"
    
  penalties:
    - "Account suspension/deletion"
    - "Fines: ¥100K - ¥10M"
    - "Platform shutdown (for repeat violations)"
    - "Criminal liability (severe cases)"

