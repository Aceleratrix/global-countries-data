# Digital Marketing Landscape - China

## Market Overview
population_online: 1_089_000_000  # 77% internet penetration
smartphone_penetration: 119  # percentage (multi-SIM)
social_media_users: 1_100_000_000
ecommerce_penetration: 85  # percentage of internet users

## Top Social Media Platforms (All Domestic)
platforms:
  - name: "WeChat (微信)"
    users: 1_300_000_000
    business_relevance: "CRITICAL - super app (chat, pay, mini-programs)"
    features: "Moments (social feed), Official Accounts, Mini-programs"
    
  - name: "Douyin (抖音 - TikTok China)"
    users: 750_000_000
    business_relevance: "HIGH - short video, live commerce"
    features: "Live streaming, shoppable videos, influencer marketing"
    
  - name: "Weibo (微博)"
    users: 580_000_000
    business_relevance: "HIGH - Twitter-like microblogging"
    features: "Trending topics, KOL marketing, news dissemination"
    
  - name: "Kuaishou (快手)"
    users: 350_000_000
    business_relevance: "MEDIUM - short video (lower-tier cities)"
    features: "Live commerce, rural market focus"
    
  - name: "Xiaohongshu/RED (小红书)"
    users: 300_000_000
    business_relevance: "HIGH for lifestyle/fashion/beauty"
    features: "User-generated reviews, influencer marketing"
    
  - name: "Bilibili (哔哩哔哩)"
    users: 320_000_000
    business_relevance: "HIGH for Gen Z, gaming, tech"
    features: "Long-form video, ACG (anime/comic/game) community"

## Blocked Western Platforms
blocked_in_china:
  - "Facebook, Instagram, WhatsApp, Messenger"
  - "Twitter/X, Reddit, Discord"
  - "YouTube, TikTok (international)"
  - "Google (search, Gmail, YouTube, Maps)"
  - "Most Western social platforms require VPN"

