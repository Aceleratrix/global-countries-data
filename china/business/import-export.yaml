## Customs & Tariffs
customs_authority: "General Administration of Customs (GACC - 海关总署)"
website: "https://www.customs.gov.cn"

tariff_structure:
  average_tariff_percent: 7.4
  wto_committments: "Industrial goods: 0-10%, Agricultural: 0-65%"
  
  categories:
    - "Most Favored Nation (MFN): Standard rates"
    - "FTA preferential rates: Lower for FTA partners"
    - "GSP (Generalized System of Preferences): For developing countries"

## Free Trade Agreements (FTAs)
active_ftas:
  - "ASEAN-China FTA (ACFTA) - 2002"
  - "China-Australia FTA (ChAFTA) - 2015"
  - "China-South Korea FTA (CKFTA) - 2015"
  - "RCEP (Regional Comprehensive Economic Partnership) - 2022"
  - "China-Switzerland FTA - 2014"
  - "China-Pakistan FTA (CPFTA) - 2007"
  - "And many more (22+ FTAs covering 30+ countries)"

## Import Requirements
import_licensing:
  general_rule: "No license for most goods (open trade regime)"
  restricted_goods:
    - "Certain chemicals (dual-use)"
    - "Radioactive materials"
    - "Some agricultural products (quotas)"
    - "Cultural relics, endangered species"
    - "Certain high-tech (semiconductor equipment)"

## Documentation
required_documents:
  - "Commercial Invoice (商业发票)"
  - "Packing List (装箱单)"
  - "Bill of Lading / Air Waybill"
  - "Certificate of Origin (原产地证书)"
  - "Import License (进口许可证) - if required"
  - "Customs Declaration Form (报关单)"
  - "CCC Certificate (China Compulsory Certification) - for 22 product categories"

## CCC Certification (China Compulsory Certification)
ccc_emark:
  description: "Mandatory for 22 categories (electronics, auto parts, etc.)"
  authority: "CNCA (Certification and Accreditation Administration)"
  process: "Testing + factory audit + certification"
  timeline: "2-4 months"
  cost_usd: "5,000-30,000 (by product)"
  products_requiring_ccc:
    - "Electrical wires, switches, home appliances"
    - "IT equipment, telecom terminals"
    - "Automotive parts (tires, brakes, lights)"
    - "Children's toys, safety equipment"

## Export Controls
export_controls:
  authority: "MOFCOM (Ministry of Commerce - 商务部)"
  controlled_items:
    - "Dual-use items (military + civilian)"
    - "Rare earths (China supplies 60% globally)"
    - "Certain high-tech (semiconductors, AI chips)"
    - "Cultural relics"
    - "Strategic minerals"
    
  export_licenses:
    - "Dual-use export license (军民两用物项出口许可证)"
    - "Rare earth export quota (稀土出口配额)"
    - "General export license (一般出口许可证)"

