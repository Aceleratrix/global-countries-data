common_incoterms:
  - "FOB (Free on Board) - most common for sea freight"
  - "CIF (Cost, Insurance, Freight)"
  - "EXW (Ex Works)"
  - "DDP (Delivered Duty Paid) - e-commerce"
  - "FCA (Free Carrier)"

