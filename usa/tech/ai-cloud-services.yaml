# NLP Services (Silicon Valley Companies Dominate)
nlp_services:
  - provider: "Google Cloud Natural Language (Mountain View, CA)"
    features: ["Sentiment analysis", "Entities", "Syntax", "Classication"]
    language_support: ["en-US", "es-US", "zh-US", 50+ languages]
    api: "https://cloud.google.com/natural-language"
    pricing: "$1 per 1000 units"
    
  - provider: "AWS Comprehend (Seattle, WA)"
    features: ["Text analysis", "Entity extraction", "PII detection"]
    language_support: ["en-US", "es-US", 12+ languages]
    api: "https://aws.amazon.com/comprehend/"
    pricing: "$0.0001 per unit"
    
  - provider: "Azure Text Analytics (Redmond, WA)"
    features: ["Sentiment analysis", "Key phrase extraction", "PII"]
    language_support: ["en-US", "es-US", 20+ languages]
    api: "https://azure.microsoft.com/products/ai-services/text-analytics/"
    
  - provider: "OpenAI GPT-4/3.5 API (San Francisco, CA)"
    features: ["Advanced reasoning", "Summarization", "Classification", "Extraction"]
    language_support: ["en-US", "es-US", "fr-US", 50+ languages]
    api: "https://platform.openai.com/docs"
    pricing: "$5/1M input tokens (GPT-4o)"

