# Tax Incentives for AI/Tech
tax_incentives:
  - name: "Federal R&D Tax Credit (IRC Section 41)"
    description: "Tax credit for R&D expenses"
    credit_rate_percent: [13.0, 20.0]  # Of qualified research expenses
    applies_to: ["C-Corps", "S-Corps", "Partnerships", "LLCs"]
    ai_ml_eligible: true
    use_cases: ["Software development", "AI model training", "Algorithm development", "Prototyping"]
    silicon_valley_companies_claiming: ["Google", "Meta", "Apple", "Netflix"]
    
  - name: "Qualified Small Business Stock (QSBS) - IRC Section 1202"
    description: "Capital gains exclusion for startup stock"
    capital_gains_exclusion_percent: 100.0  # Up to $10M or 10x basis
    holding_period_years: 5
    applies_to: "C-Corps with < $50M assets at issuance"
    tech_benefit: "Founders/early employees pay $0 capital gains on stock sale"
    silicon_valley_usage_percent: 85.0  # Most startups use this
    
  - name: "California Competes with CA Innovation Hub (iHub) Tax Credits"
    description: "State-level incentives for tech in California"
    benefits: ["Sales tax exclusions on equipment", "Hiring credits"]
    silicon_valley_specific: true
    
  - name: "Texas Enterprise Zone Program (Austin - Silicon Hills)"
    description: "State tax incentives for job creation in TX"
    benefits: ["Franchise tax credits", "Sales tax refunds"]
    austin_tech_usage: "Tesla, Oracle, Dell use these"

