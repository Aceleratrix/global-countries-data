# Time Zones (6 Zones)
time_zones:
  - name: "Eastern Time (ET)"
    standard: "UTC-5"
    daylight: "UTC-4 (EDT)"
    states: ["NY", "FL", "GA", "NC", "SC", "VA", "WV", "DC", "ME", "NH", "VT", "MA", "RI", "CT", "NJ", "PA", "DE", "MD"]
    major_cities: ["New York", "Miami", "Atlanta", "Washington DC"]
    
  - name: "Central Time (CT)"
    standard: "UTC-6"
    daylight: "UTC-5 (CDT)"
    states: ["TX", "IL", "AL", "MS", "LA", "AR", "MO", "IA", "WI", "TN", "KY", "MN", "OK"]
    major_cities: ["Chicago", "Dallas", "Houston", "New Orleans"]
    
  - name: "Mountain Time (MT)"
    standard: "UTC-7"
    daylight: "UTC-6 (MDT)"
    states: ["MT", "WY", "UT", "CO", "NM", "ID (part)", "AZ (no DST)"]
    major_cities: ["Denver", "Phoenix (no DST)"]
    
  - name: "Pacific Time (PT)"
    standard: "UTC-8"
    daylight: "UTC-7 (PDT)"
    states: ["CA", "WA", "OR", "NV (part)"]
    major_cities: ["Los Angeles", "San Francisco", "Seattle", "Portland"]
    note: "Silicon Valley (San Francisco Bay Area) - UTC-8"
    
  - name: "Alaska Time (AKT)"
    standard: "UTC-9"
    daylight: "UTC-8 (AKDT)"
    states: ["AK"]
    
  - name: "Hawaii-Aleutian Time (HAT)"
    standard: "UTC-10"
    daylight: "No daylight saving"
    states: ["HI", "AK (Aleutian Islands)"]

