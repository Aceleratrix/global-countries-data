# Silicon Valley Specific: Startup Growth Stages
silicon_valley_startup_stages:
  - stage: "Pre-Seed / Idea Stage"
    capital_usd: [0, 500000]
    employees: [1, 3]
    entity_type: "LLC (early) or C-Corp (if expecting VC)"
    burn_rate_usd_month: [5000, 20000]
    focus: "MVP, product-market fit"
    
  - stage: "Seed"
    capital_usd: [500000, 3000000]
    employees: [3, 15]
    entity_type: "C-Corp (Delaware)"
    burn_rate_usd_month: [20000, 100000]
    focus: "Product development, early traction"
    
  - stage: "Series A"
    capital_usd: [3000000, 15000000]
    employees: [15, 100]
    entity_type: "C-Corp (Delaware)"
    burn_rate_usd_month: [100000, 500000]
    focus: "Scaling, go-to-market"
    
  - stage: "Series B, C, D..."
    capital_usd: [15000000, 500000000]
    employees: [100, 2000]
    entity_type: "C-Corp (Delaware)"
    burn_rate_usd_month: [500000, 10000000]
    focus: "Growth, profitability, IPO prep"
    
  - stage: "IPO / Public"
    capital_usd: "Public markets ($100M+ raises)"
    employees: [2000, 100000+]
    entity_type: "Public C-Corp"
    focus: "Quarterly earnings, public shareholders"

