description: "Company sizes, types, and business structures for US AI First businesses"

# Company Types (Business Entities)
company_types:
  - type: "Sole Proprietorship"
    description: "Single owner, no legal separation from owner"
    formation: "None required (default for individuals)"
    pros: ["Simple", "No formation cost", "Pass-through taxation"]
    cons: ["Unlimited personal liability", "Hard to raise capital"]
    tax_form: "Schedule C (Form 1040)"
    best_for: "Freelancers, consultants, side hustles"
    silicion_valley_usage: "Rare for tech (liability risk)"
    
  - type: "Limited Liability Company (LLC)"
    description: "Hybrid: liability protection + pass-through taxation"
    formation: "File Articles of Organization with Secretary of State"
    cost_usd: [50, 500]  # Varies by state
    pros: ["Limited liability", "Flexible taxation (can elect S-Corp)", "Less paperwork than C-Corp"]
    cons: ["Self-employment tax (15.3%)", "State annual fees"]
    tax_form: ["Schedule C (disregarded)", "Form 1120-S (S-Corp election)"]
    best_for: "Small businesses, consultants, early-stage startups"
    silicion_valley_usage: "Common for early-stage startups, contractors"
    delaware_franchise_tax_usd: 300  # Minimum
    
  - type: "C-Corporation (C-Corp)"
    description: "Standard corporation, double taxation (corporate + dividends)"
    formation: "File Articles of Incorporation, adopt bylaws, issue stock"
    cost_usd: [100, 1000]  # Varies by state
    pros: ["Limited liability", "Easy to raise venture capital", "Stock options for employees", "Unlimited shareholders"]
    cons: ["Double taxation", "More paperwork (Form 1120)", "Formalities (board meetings, minutes)"]
    tax_form: "Form 1120"
    best_for: "Startups seeking VC funding, high-growth companies"
    silicion_valley_usage: "Standard for venture-backed startups (90%+ of VC deals)"
    delaware_franchise_tax_usd: [400, 200000]  # Based on authorized shares
    note: "66% of Fortune 500 incorporated in DE for business-friendly courts"
    
  - type: "S-Corporation (S-Corp)"
    description: "Pass-through taxation, limited to 100 shareholders"
    formation: "Form 2553 (IRS election) after incorporating"
    cost_usd: [100, 1000]  # Same as C-Corp formation
    pros: ["No double taxation", "Self-employment tax savings (salary vs. distribution)", "Limited liability"]
    cons: ["100 shareholder limit", "US citizens/residents only", "One class of stock only"]
    tax_form: "Form 1120-S + K-1"
    best_for: "Profitable small businesses, avoiding double taxation"
    silicion_valley_usage: "Used by profitable startups to save on payroll taxes"
    shareholder_limit: 100
    
  - type: "B-Corporation (B-Corp)"
    description: "Certification for social/environmental mission (not a tax status)"
    formation: "Certification by B Lab (must meet standards)"
    cost_usd: [2000, 50000]  # Certification + legal fees
    pros: ["Brand differentiation", "Mission-driven", "Attracts impact investors"]
    cons: ["Certification process", "Ongoing reporting", "Not a tax status (files as C-Corp or B-Corp)"]
    tax_form: "Same as underlying entity (usually C-Corp)"
    best_for: "Social enterprises, impact startups"
    silicion_valley_usage: "Used by some mission-driven startups (e.g., Patagonia, Ben & Jerry's not tech)"
    
  - type: "Non-Profit Corporation (501(c)(3))"
    description: "Tax-exempt for charitable/educational purposes"
    formation: "Form 1023 (IRS), state charitable registration"
    pros: ["Tax-exempt status", "Donations are tax-deductible", "Grant eligibility"]
    cons: ["No political lobbying", "Public disclosure of Form 990", "Strict compliance"]
    tax_form: "Form 990"
    best_for: "Charities, educational organizations, research institutes"
    silicion_valley_usage: "Used by AI research labs (e.g., some research orgs), open-source foundations"

